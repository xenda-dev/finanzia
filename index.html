<html lang="es" data-theme="auto">
<head>
<script>(function(){try{var s=JSON.parse(localStorage.getItem("finanziaState3")||"{}");var t=s.theme||"auto";var e=t==="auto"?(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"):t;document.documentElement.setAttribute("data-theme",e);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanzIA">
<meta name="theme-color" content="#0D1B2A">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<title>FinanzIA</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
<div id="overlay" onclick="closeDrawer()"></div>
<nav id="drawer">
  <!-- Profile header -->
  <div class="drawer-header" onclick="navigate('configuracion');closeDrawer()">
    <div class="drawer-profile">
      <div class="drawer-avatar" id="drawer-avatar">👤</div>
      <div class="drawer-profile-info">
        <div class="drawer-profile-name" id="drawer-profile-name">Mi Perfil</div>
        <div class="drawer-profile-email" id="drawer-profile-email">Toca para configurar</div>
      </div>
    </div>
  </div>
  <!-- Navigation -->
  <div class="drawer-nav">
    <button class="drawer-item" data-page="dashboard" id="dmi-dashboard" onclick="navigate('dashboard');closeDrawer()"><div class="drawer-item-icon">🏠</div><span>Inicio</span></button>
    <div style="height:1px;background:var(--border);margin:6px 20px"></div>
    <button class="drawer-group-portal" onclick="navigate('grp-midinero');closeDrawer()">
      <div style="display:flex;align-items:center;gap:12px"><div class="drawer-item-icon">💰</div><span>Mi Dinero</span></div>
      <span style="color:var(--text3);font-size:22px;font-weight:200;line-height:1">›</span>
    </button>
    <button class="drawer-group-portal" onclick="navigate('grp-planificacion');closeDrawer()">
      <div style="display:flex;align-items:center;gap:12px"><div class="drawer-item-icon">📅</div><span>Planificación</span></div>
      <span style="color:var(--text3);font-size:22px;font-weight:200;line-height:1">›</span>
    </button>
    <button class="drawer-group-portal" onclick="navigate('inversiones');closeDrawer()">
      <div style="display:flex;align-items:center;gap:12px"><div class="drawer-item-icon">📈</div><span>Inversiones</span></div>
      <span style="color:var(--text3);font-size:22px;font-weight:200;line-height:1">›</span>
    </button>
    <button class="drawer-group-portal" onclick="navigate('analisis');closeDrawer()">
      <div style="display:flex;align-items:center;gap:12px"><div class="drawer-item-icon">📊</div><span>Reportes</span></div>
      <span style="color:var(--text3);font-size:22px;font-weight:200;line-height:1">›</span>
    </button>
    <button class="drawer-group-portal" onclick="navigate('grp-herramientas');closeDrawer()">
      <div style="display:flex;align-items:center;gap:12px"><div class="drawer-item-icon">🔧</div><span>Herramientas</span></div>
      <span style="color:var(--text3);font-size:22px;font-weight:200;line-height:1">›</span>
    </button>
    <div style="height:1px;background:var(--border);margin:6px 20px"></div>
    <button class="drawer-item" data-page="configuracion" id="dmi-configuracion" onclick="navigate('configuracion');closeDrawer()"><div class="drawer-item-icon">⚙️</div><span>Configuración</span></button>
  </div>
  <!-- Footer -->
  <div class="drawer-footer">
    <div class="drawer-footer-brand"><span style="color:var(--text)">Finanz</span><span style="color:var(--primary)">IA</span></div>
    <div class="drawer-footer-version">v3.3 · Datos locales</div>
  </div>
</nav>
<div class="header">
  <!-- Solo dashboard: menú hamburguesa -->
  <button onclick="openDrawer()" id="header-menu" style="width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <!-- Demás pantallas: flecha atrás -->
  <button onclick="goBack()" id="header-back" style="display:none;width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--text);align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <!-- Brand solo en dashboard -->
  <div id="header-brand" style="display:flex;align-items:center;flex:1">
    <span style="color:var(--text);font-weight:800;font-size:17px">Finanz</span><span style="color:var(--primary);font-weight:800;font-size:17px">IA</span>
  </div>
  <!-- Título centrado en demás pantallas -->
  <div id="header-title" style="display:none;font-size:16px;font-weight:700;color:var(--text);flex:1;text-align:center"></div>
  <!-- Controles solo en dashboard -->
  <div class="header-right" id="header-controls">
    <div class="currency-toggle" id="currency-toggle">
      <button class="cur-btn active" data-cur="PLN" onclick="setCurrency('PLN')">PLN</button>
      <button class="cur-btn" data-cur="COP" onclick="setCurrency('COP')">COP</button>
    </div>
    <button class="btn-icon" onclick="toggleTheme()" title="Cambiar tema" style="font-size:14px" id="theme-btn">🌙</button>
  </div>
  <!-- Espaciador derecho en demás pantallas (para centrar el título) -->
  <div id="header-spacer" style="display:none;width:36px;flex-shrink:0"></div>
</div>
<div id="main">
  <div id="page-dashboard" class="page active"></div>
  <div id="page-movimientos" class="page"></div>
  <div id="page-cuentas" class="page"></div>
  <div id="page-presupuestos" class="page"></div>
  <div id="page-metas" class="page"></div>
  <div id="page-pagos" class="page"></div>
  <div id="page-deudas" class="page"></div>
  <div id="page-analisis" class="page"></div>
  <div id="page-categorias" class="page"></div>
  <div id="page-configuracion" class="page"></div>
  <div id="page-herramientas" class="page"></div>
  <div id="page-calculadora" class="page"></div>
  <div id="page-simulador" class="page"></div>
  <div id="page-estrategia" class="page"></div>
  <div id="page-cambio" class="page"></div>
  <div id="page-listas" class="page"></div>
  <div id="page-inversiones" class="page"></div>
  <div id="page-simuladores" class="page"></div>
  <div id="page-test" class="page"></div>
  <div id="page-grp-midinero" class="page"></div>
  <div id="page-grp-planificacion" class="page"></div>
  <div id="page-suscripciones" class="page"></div>
  <div id="page-grp-herramientas" class="page"></div>
  <div id="page-jubilacion" class="page"></div>
  <div id="page-emergencia" class="page"></div>
  <div id="page-inflacion" class="page"></div>
  <div id="page-rentabilidad" class="page"></div>
  <div id="page-mis-cuentas" class="page"></div>
  <div id="page-cuentas-grupo" class="page"></div>
  <div id="page-form-cuenta" class="page"></div>
  <div id="page-cuenta-detalle" class="page"></div>
  <div id="page-amortizacion" class="page"></div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" data-page="dashboard">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
  </button>
  <button class="nav-item" data-page="movimientos">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>Movimientos
  </button>
  <button class="nav-fab" onclick="openTransactionModal();">＋</button>
  <button class="nav-item" data-page="mis-cuentas" onclick="navigate('mis-cuentas')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Cuentas
  </button>
  <button class="nav-item" data-page="presupuestos">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Presupuestos
  </button>
</nav>
<div id="modal-root">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-sheet" id="modal-sheet"></div>
</div>
<div id="confirm-root">
  <div class="confirm-backdrop"></div>
  <div class="confirm-dialog">
    <div class="confirm-icon" id="confirm-icon">⚠️</div>
    <div class="confirm-title" id="confirm-title">¿Eliminar?</div>
    <div class="confirm-msg" id="confirm-msg">Esta acción no se puede deshacer.</div>
    <div class="confirm-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger btn-sm" id="confirm-ok" onclick="runConfirm()">Confirmar</button>
    </div>
  </div>
</div>
<div id="toast"></div>
</div>

<script src="/storage.js"></script>
<script src="/finance.js"></script>
<script src="/ui.js"></script>
<script src="/app.js"></script>
</body>
</html>
