<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{
  --bg:#0A0F1E;--surface:#111827;--surface2:#1A2235;--surface3:#222D42;
  --border:#1F2D40;--text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;
  --card-shadow:0 4px 24px rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#F0F4FF;--surface:#FFFFFF;--surface2:#F1F5F9;--surface3:#E2E8F0;
  --border:#CBD5E1;--text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --card-shadow:0 2px 12px rgba(0,0,0,.08);
}
:root{
  --primary:#00D4AA;--primary2:#00B896;--secondary:#7461EF;
  --danger:#EF4444;--warning:#F59E0B;--success:#10B981;--info:#3B82F6;
  --radius:16px;--radius-sm:10px;--radius-lg:24px;
  --nav-h:68px;--header-h:60px;
  --font:'Helvetica Neue',Arial,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;transition:background .3s,color .3s}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg);z-index:50;flex-shrink:0;border-bottom:1px solid var(--border);gap:8px}
.header-title{font-size:18px;font-weight:800;letter-spacing:-.5px;white-space:nowrap}
.header-title span{color:var(--primary)}
.btn-icon{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;border:1px solid var(--border)}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.page{display:none;padding:16px 16px calc(var(--nav-h) + 24px);min-height:100%}
#page-herramientas{padding:0;overflow:hidden}
.page.active{display:block}
.bottom-nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:none;background:none;color:var(--text3);cursor:pointer;transition:.2s;flex:1;font-size:10px;font-family:var(--font)}
.nav-item.active{color:var(--primary)}
.nav-icon{width:22px;height:22px}
.nav-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,212,170,.5);font-size:26px;line-height:1;flex-shrink:0;margin-top:-16px}
#drawer{position:fixed;top:0;left:-290px;width:290px;height:100%;background:var(--surface);z-index:200;transition:.3s ease;overflow-y:auto;padding-bottom:40px}
#drawer.open{left:0;box-shadow:4px 0 32px rgba(0,0,0,.6)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:190;opacity:0;pointer-events:none;transition:.3s}
#overlay.active{opacity:1;pointer-events:all}
.drawer-header{padding:52px 16px 16px;background:linear-gradient(160deg,var(--surface2),var(--surface));border-bottom:1px solid var(--border);flex-shrink:0;cursor:pointer}
.drawer-profile{display:flex;align-items:center;gap:12px}
.drawer-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;border:2px solid var(--primary)}
.drawer-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.drawer-profile-info{flex:1;min-width:0}
.drawer-profile-name{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drawer-profile-email{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.drawer-nav{flex:1;overflow-y:auto;padding-bottom:8px}
.drawer-footer{padding:10px 20px 16px;border-top:1px solid var(--border);text-align:center;flex-shrink:0}
.drawer-footer-brand{font-size:14px;font-weight:800;color:var(--primary)}
.drawer-footer-brand span{color:var(--primary)}
.finanzIA-logo{display:inline-flex;align-items:center;gap:6px}
.finanzIA-logo svg{flex-shrink:0}
.drawer-footer-version{font-size:10px;color:var(--text3);margin-top:2px}
.drawer-group-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text3);padding:14px 20px 4px;text-transform:uppercase}
.dgl-collapsible{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding-right:16px;user-select:none}
.dgl-collapsible:hover{color:var(--text2)}
.dgl-arrow{font-size:12px;transition:transform .2s;display:inline-block}
.drawer-group-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding-right:16px}
.drawer-group-toggle:hover{color:var(--text2)}
.dgl-arrow{font-size:9px;transition:transform .2s}
.dgl-arrow.collapsed{transform:rotate(-90deg)}

  language:'', weekStart:'', _catTab:'gasto', notifPrefs:{}, numFormat:'auto', currencies:[], profile:{name:'',email:'',photo:''},
  shoppingLists:[], investments:[], accounts:[], transactions:[], categories:[], subcategories:[],

  analysisYear:new Date().getFullYear(),

};

function loadState(){
  try{
    const saved=localStorage.getItem('finanziaState3');
    if(saved){const p=JSON.parse(saved);Object.assign(S,p);}
    else{S.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));S.subcategories=JSON.parse(JSON.stringify(DEFAULT_SUBS));}
  }catch(e){S.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));S.subcategories=JSON.parse(JSON.stringify(DEFAULT_SUBS));}
  // Migrate: if categories use old IDs (c1,c2...) replace with new DEFAULT_CATS
  const needsCatReset=!S.categories||!S.categories.length||S.categories.length>30||(S.categories[0]&&S.categories[0].id&&S.categories[0].id.match(/^c\d+$/))||!!(S.categories.find(function(cat){return cat.name==='Bonificaciones'||cat.name==='Paquete TV/Internet/Teléfono';}));
  if(needsCatReset){S.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));S.subcategories=JSON.parse(JSON.stringify(DEFAULT_SUBS));}
  // Ensure protected Efectivo account exists
  // FIRST: migrate legacy efectivo-default
  const legacyEf=S.accounts.find(a=>a.id==='efectivo-default');
  if(legacyEf){
    if(!S.accounts.find(a=>a.id==='efectivo-PLN')){
      legacyEf.id='efectivo-PLN';legacyEf.currency='PLN';
      legacyEf.protected=true;legacyEf.subtype='efectivo';legacyEf.subAccounts=[];
    } else {
      S.accounts=S.accounts.filter(a=>a.id!=='efectivo-default');
    }
  }
  // THEN: ensure one Efectivo per configured currency
  const curs=S.currencies&&S.currencies.length?S.currencies:[];
  if(!curs.length){return;} // no currencies yet — efectivo accounts created when user sets up profile
  curs.forEach(cur=>{
    const efId='efectivo-'+cur;
    const efAcc=S.accounts.find(a=>a.id===efId);
    if(!efAcc){
      S.accounts.unshift({id:efId,name:'Efectivo',type:'activo',subtype:'efectivo',currency:cur,bankEntity:'',initialBalance:0,icon:'💵',color:'#10B981',protected:true,subAccounts:[]});
    } else {
      efAcc.protected=true;efAcc.subtype='efectivo';efAcc.subAccounts=[];
    }
  });
  // Remove any duplicate efectivos (same currency, keep first)
  const seenEf=new Set();
  S.accounts=S.accounts.filter(a=>{
    if(a.subtype!=='efectivo')return true;
    const key='ef-'+a.currency;
    if(seenEf.has(key))return false;
    seenEf.add(key);return true;
  });
  if(!S.movFilter)S.movFilter={tab:'todos',search:'',dateFrom:'',dateTo:'',catId:'',accountId:'',payMethod:''};
  if(!S.analysisPeriod)S.analysisPeriod='Mensual';
  if(!S.analysisYear)S.analysisYear=new Date().getFullYear();
  if(!S.analysisPeriodSub)S.analysisPeriodSub='anual';if(!S.analysisYear)S.analysisYear=new Date().getFullYear();
  if(!S.exchangeRate)S.exchangeRate={PLN_COP:1200,COP_PLN:0.000833,lastUpdated:''};
  if(!S.theme)S.theme='auto';
  // language and weekStart stay empty until user chooses
  // currencies stay empty until user sets up profile
  applyThemeMode();
  // Update drawer profile
  updateDrawerProfile();
}
function toggleDrawerGroup(groupId, labelEl){
  var el=document.getElementById(groupId);
  if(!el)return;
  var isCollapsed=el.style.display==='none';
  el.style.display=isCollapsed?'block':'none';
  var arrow=labelEl?labelEl.querySelector('.dgl-arrow'):null;
  if(arrow)arrow.style.transform=isCollapsed?'rotate(0deg)':'rotate(-90deg)';
}
function updateDrawerProfile(){
  const name=S.profile&&S.profile.name?S.profile.name:'Mi Perfil';
  const email=S.profile&&S.profile.email?S.profile.email:'Toca para configurar';
  const photo=S.profile&&S.profile.photo?S.profile.photo:'';
  const nameEl=document.getElementById('drawer-profile-name');
  const emailEl=document.getElementById('drawer-profile-email');
  const avatarEl=document.getElementById('drawer-avatar');
  if(nameEl)nameEl.textContent=name;
  if(emailEl)emailEl.textContent=email;
  if(avatarEl){
    if(photo){avatarEl.innerHTML=`<img src="${photo}" alt="foto">`;}
    else{const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);avatarEl.innerHTML=`<span style="font-size:16px;font-weight:700;color:white">${initials!=='MI'?initials:'👤'}</span>`;}
  }
}

function applyThemeMode(){
  let effective=S.theme;
  if(S.theme==='auto'){
    effective=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  }
  document.documentElement.setAttribute('data-theme',effective);
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=effective==='dark'?'☀️':'🌙';
}
function buildNumFormatCaps(){
  var opts=[['auto','Automático'],['2','Con decimales'],['0','Sin decimales']];
  var cur=S.numFormat||'auto';
  return opts.map(function(o){
    var isOn=cur===o[0];
    return '<button onclick="setNumFormat(\''+o[0]+'\')" style="flex:1;padding:8px 4px;border-radius:50px;border:none;background:'+(isOn?'var(--primary)':'transparent')+';color:'+(isOn?'white':'var(--text2)')+';font-size:12px;font-weight:'+(isOn?'700':'500')+';cursor:pointer;font-family:var(--font);transition:.15s">'+o[1]+'</button>';
  }).join('');
}
function buildNumFormatExample(){
  var n=1500000;
  var d=S.numFormat==='0'?0:2;
  try{
    var meta=getCurrencyMeta(S.currency||'COP');
    var str=n.toLocaleString(meta.locale,{minimumFractionDigits:d,maximumFractionDigits:d});
    return meta.pos==='before'?meta.sym+str:str+' '+meta.sym;
  }catch(e){return n.toFixed(d);}
}
function setNumFormat(val){
  S.numFormat=val;
  saveState();
  renderPage('configuracion');
}
function setTheme(val){
  S.theme=val;
  applyThemeMode();
  togglePPick('theme-picker');
  saveState();
  renderPage('configuracion');
}
function toggleTheme(){
  const effective=S.theme==='auto'
    ?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')
    :S.theme;
  setTheme(effective==='dark'?'light':'dark');
}

// EXCHANGE RATE
// ════════════════════════════════════════════════════════════
async function fetchExchangeRate(){
  try{
    const curs=S.currencies||[];
    if(curs.length<2){
      const el=document.getElementById('exchange-widget');
      if(el)renderExchangeWidget(el);
      return;
    }
    const base=curs[0];
    const r=await fetch(`https://open.er-api.com/v6/latest/${base}`);
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(d.rates){
      if(!S.exchangeRate)S.exchangeRate={};
      S.exchangeRate.base=base;
      S.exchangeRate.rates=d.rates;
      S.exchangeRate.lastUpdated=new Date().toLocaleString('es');
      saveState();
      const el=document.getElementById('exchange-widget');
      if(el)renderExchangeWidget(el);
    }
  }catch(e){
    const el=document.getElementById('exchange-widget');
    if(el)renderExchangeWidget(el);
  }
}

function renderExchangeWidget(el){
  if(!el)return;
  const curs=S.currencies||[];
  if(curs.length<2){
    el.innerHTML=`<div class="exchange-widget-row"><span style="font-size:14px">💱</span><span style="font-size:11px;color:var(--text2)">Para ver tipo de cambio, selecciona 2 monedas en <button onclick="navigate('configuracion')" style="background:none;border:none;color:var(--primary);font-weight:700;cursor:pointer;font-family:var(--font);font-size:11px">Configuración</button></span></div>`;
    return;
  }
  const r=S.exchangeRate||{};
  if(!r.rates||!r.base){
    el.innerHTML=`<div class="exchange-widget-row"><span>💱</span><span style="font-size:12px;color:var(--text2)">⏳ Consultando tipo de cambio...</span></div>`;
    return;
  }
  // Get the two selected currencies  
  const cur1=S.currency;
  const cur2=curs.find(c=>c!==cur1)||curs[0];
  // Calculate rates from base
  const base=r.base;
  const rates=r.rates;
  let rate1to2,rate2to1;
  if(cur1===base){
    rate1to2=rates[cur2]||1;
  } else if(cur2===base){
    rate1to2=1/(rates[cur1]||1);
  } else {
    // Cross rate
    rate1to2=(rates[cur2]||1)/(rates[cur1]||1);
  }
  rate2to1=rate1to2?1/rate1to2:0;
  const m1=getCurrencyMeta(cur1);
  const m2=getCurrencyMeta(cur2);
  const r1str=rate1to2>=1?rate1to2.toLocaleString('es',{maximumFractionDigits:4}):rate1to2.toFixed(6);
  const r2str=rate2to1>=1?rate2to1.toLocaleString('es',{maximumFractionDigits:4}):rate2to1.toFixed(6);
  el.innerHTML=`
    <div class="exchange-widget-row">
      <span style="font-size:13px">💱</span>
      <span style="font-size:12px;color:var(--text)">1 <strong>${cur1}</strong> = <strong style="color:var(--primary)">${r1str} ${cur2}</strong></span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px">(1 ${cur2} = ${r2str} ${cur1})</span>
    </div>
    <div class="exchange-widget-time">${r.lastUpdated?'🕐 '+r.lastUpdated:'⏳ Sin datos'}</div>`;
}

function buildCurrencyOptions(selected){
  const curs=S.currencies&&S.currencies.length?S.currencies:[];
  if(!curs.length)return '<option value="">Sin moneda</option>';
  if(curs.length===1)return `<option value="${curs[0]}">${curs[0]}</option>`;
  return curs.map(c=>`<option value="${c}" ${c===selected?'selected':''}>${c}</option>`).join('');
}
function getCurrencyMeta(code){return CURRENCY_META[code]||{sym:code,locale:'en-US',pos:'before'};}
function fmt(amount,cur){
  const code=cur||S.currency||'';
  const n=parseFloat(amount)||0;
  // Determine decimals: user preference overrides currency default
  const noDec=(['JPY','KRW','CLP','PYG'].includes(code));
  let decimals;
  if(S.numFormat==='0')decimals=0;
  else if(S.numFormat==='2')decimals=2;
  else decimals=noDec?0:2; // auto (default)
  if(!code)return n.toLocaleString('es-CO',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  const meta=getCurrencyMeta(code);
  let numStr;
  try{numStr=n.toLocaleString(meta.locale,{minimumFractionDigits:decimals,maximumFractionDigits:decimals});}
  catch(e){numStr=n.toFixed(decimals);}
  return meta.pos==='before'?meta.sym+numStr:numStr+' '+meta.sym;
}

function resolveAccId(id){

function bankBadge(bankId,cur,size=44,acc){

    const emoji=acc?(acc.subtype==='efectivo'?'💵':acc.subtype==='digital'?'📱':acc.subtype==='inversion'?'📈':acc.icon||'🏦'):'🏦';

function getBalance(accountId){
  const acc=getAcc(accountId);if(!acc)return 0;
  let bal=parseFloat(acc.initialBalance)||0;
  // Sub-account balances only for activos
  if(acc.type==='activo'&&acc.subAccounts&&acc.subAccounts.length){
    acc.subAccounts.forEach(s=>bal+=(parseFloat(s.balance)||0));
  }
  const isPasivo=acc.type==='pasivo';
  S.transactions.filter(t=>t.currency===(acc.currency||S.currency)).forEach(t=>{
    const amt=parseFloat(t.amount)||0;
    if(t.type==='transferencia'){
      // Transfers: each side handled exactly once
      if(t.accountId===accountId)bal-=amt;
      else if(t.toAccountId===accountId){
        if(isPasivo)bal-=amt; // payment reduces debt
        else bal+=amt;
      }
    } else if(t.accountId===accountId){
      if(!isPasivo){
        if(t.type==='ingreso')bal+=amt;
        else if(t.type==='gasto')bal-=amt;
      } else {
        // Pasivo: gasto (purchase) ADDS to debt, ingreso (payment) REDUCES it
        if(t.type==='gasto')bal+=amt;
        else if(t.type==='ingreso')bal-=amt;
      }
    }
  });
  return bal;
}
function getTotalBalance(){
  return S.accounts.filter(a=>a.type==='activo'&&(a.currency||S.currency)===S.currency).reduce((s,a)=>s+getBalance(a.id),0);
}
function getNetWorth(){
  const assets=S.accounts.filter(a=>a.type==='activo'&&(a.currency||S.currency)===S.currency).reduce((s,a)=>s+getBalance(a.id),0);
  const liabilities=S.accounts.filter(a=>a.type==='pasivo'&&(a.currency||S.currency)===S.currency).reduce((s,a)=>s+Math.abs(getBalance(a.id)),0);
  return{assets,liabilities,net:assets-liabilities};
}

function getAnalysisPeriodRange(){
  const yr=S.analysisYear||new Date().getFullYear();
  const sub=S.analysisPeriodSub||'anual';
  const from=new Date(yr,0,1,0,0,0,0);
  const to=new Date(yr,11,31,23,59,59,999);
  if(sub==='anual'){return{from,to};}
  if(sub==='q1'){return{from:new Date(yr,0,1),to:new Date(yr,2,31,23,59,59)};}
  if(sub==='q2'){return{from:new Date(yr,3,1),to:new Date(yr,5,30,23,59,59)};}
  if(sub==='q3'){return{from:new Date(yr,6,1),to:new Date(yr,8,30,23,59,59)};}
  if(sub==='q4'){return{from:new Date(yr,9,1),to:new Date(yr,11,31,23,59,59)};}
  if(sub==='sem1'){return{from:new Date(yr,0,1),to:new Date(yr,5,30,23,59,59)};}
  if(sub==='sem2'){return{from:new Date(yr,6,1),to:new Date(yr,11,31,23,59,59)};}
  if(sub==='7d'){const f=new Date();f.setDate(f.getDate()-7);return{from:f,to:new Date()};}
  if(sub==='30d'){const f=new Date();f.setDate(f.getDate()-30);return{from:f,to:new Date()};}
  if(sub==='90d'){const f=new Date();f.setDate(f.getDate()-90);return{from:f,to:new Date()};}
  // Month: '01'-'12'
  const m=parseInt(sub)-1;
  if(!isNaN(m)&&m>=0&&m<=11){
    const daysInMonth=new Date(yr,m+1,0).getDate();
    return{from:new Date(yr,m,1,0,0,0),to:new Date(yr,m,daysInMonth,23,59,59)};
  }
  return{from,to};
}
function getPeriodRange(period){
  const now=new Date();const from=new Date();const to=new Date();
  to.setHours(23,59,59,999);
  switch(period){
    case'Diario':from.setHours(0,0,0,0);break;
    case'Semanal':from.setDate(now.getDate()-7);break;
    case'Quincenal':from.setDate(now.getDate()-15);break;
    case'Mensual':from.setDate(1);from.setHours(0,0,0,0);break;
    case'Bimestral':from.setMonth(now.getMonth()-2,1);break;
    case'Trimestral':from.setMonth(now.getMonth()-3,1);break;
    case'Semestral':from.setMonth(now.getMonth()-6,1);break;
    case'Anual':from.setMonth(0,1);from.setHours(0,0,0,0);break;
    default:from.setDate(1);from.setHours(0,0,0,0);
  }
  return{from,to};
}

function getMonthTotals(period){
  period=period||'Mensual';
  const{from,to}=getPeriodRange(period);
  const txs=S.transactions.filter(t=>{
    const d=new Date(t.date);
    return t.currency===S.currency&&d>=from&&d<=to;
  });
  // Exclude internal transfers: transactions whose description starts with 'Ahorro →'/'Ahorro:' or are paired transfers
  // Exclude internal movements from INCOME (keep goal savings as EXPENSE - user is correct)
  const isInternalIncome=(t)=>{
    if(!t.description)return false;
    const d=t.description;
    // These are internal credits that don't represent real new money coming in
    return d.startsWith('Ahorro:')||d.startsWith('AUTO:')||d.startsWith('Abono:');
  };
  // Exclude from expense: only the paying side of debt payments (the income to the debt account)
  // Goal savings expenses (Ahorro →) ARE real expenses - user is correct
  const isInternalExpense=(t)=>{
    if(!t.description)return false;
    const d=t.description;
    return d.startsWith('Pago deuda:')||d.startsWith('AUTO:');
  };
  const inc=txs.filter(t=>t.type==='ingreso'&&!isInternalIncome(t)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const exp=txs.filter(t=>t.type==='gasto'&&!isInternalExpense(t)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  return{inc,exp};
}

function getBudgetSpent(b){
  const now=new Date();
  return S.transactions.filter(t=>t.type==='gasto'&&t.categoryId===b.categoryId&&
    (!b.subcategoryId||t.subcategoryId===b.subcategoryId)&&
    t.currency===(b.currency||S.currency)&&
    (()=>{const d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();})()
  ).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
}

function daysUntil(dateStr){
  if(!dateStr)return 999;
  const d=new Date(dateStr);const now=new Date();
  d.setHours(0,0,0,0);now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

  if(Notification.permission==='denied'){

function checkAutoPayments(){

  S.scheduledPayments.forEach(p=>{
    if(p.isAuto&&p.nextDate===today){
      const alreadyDone=S.transactions.some(t=>t.description==='AUTO:'+p.id&&t.date===today);
      if(!alreadyDone){
        const tx={id:uid(),type:'gasto',accountId:p.accountId||'',categoryId:p.categoryId||'',subcategoryId:p.subcategoryId||'',amount:p.amount,currency:p.currency||S.currency,date:today,description:'AUTO:'+p.id,paymentMethod:''};
        S.transactions.push(tx);
        sendNotif('💳 Pago automático',`${p.name} — ${fmt(p.amount,p.currency||S.currency)}`);
        advancePayment(p);
        toast('Auto-pago: '+p.name);
      }
    }
    if(p.nextDate<=today&&!p.isAuto){
      sendNotif('⚠️ Pago pendiente',`${p.name} venció el ${p.nextDate}`);
    }
  });
  saveState();
}
function advancePayment(p){
  const d=new Date(p.nextDate);
  const freq=p.frequency;
  if(freq==='Diario')d.setDate(d.getDate()+1);
  else if(freq==='Semanal')d.setDate(d.getDate()+7);
  else if(freq==='Quincenal')d.setDate(d.getDate()+15);
  else if(freq==='Mensual')d.setMonth(d.getMonth()+1);
  else if(freq==='Bimestral')d.setMonth(d.getMonth()+2);
  else if(freq==='Trimestral')d.setMonth(d.getMonth()+3);
  else if(freq==='Semestral')d.setMonth(d.getMonth()+6);
  else if(freq==='Anual')d.setFullYear(d.getFullYear()+1);
  p.nextDate=d.toISOString().split('T')[0];
}

// REGLA 50/30/20
// ════════════════════════════════════════════════════════════
function renderRule502030(){
  const{inc}=getMonthTotals();
  if(inc<=0)return`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="card-title" style="margin:0">📊 Regla 50/30/20</div>
      <div style="font-size:10px;color:var(--text3)">este mes</div>
    </div>
    <div style="font-size:12px;color:var(--text2);padding:8px 0">Registra ingresos este mes para ver tu distribución ideal vs. real.</div>
  </div>`;

  // Classify transactions by nature
  const txs=S.transactions.filter(t=>{
    const d=new Date(t.date);const now=new Date();
    return t.currency===S.currency&&t.type==='gasto'&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  let nec=0,des=0,aho=0;
  txs.forEach(t=>{
    const cat=getCat(t.categoryId);
    const nature=cat?cat.nature:'deseos';
    const amt=parseFloat(t.amount)||0;
    if(nature==='necesidades')nec+=amt;
    else if(nature==='deseos')des+=amt;
    else if(nature==='ahorros')aho+=amt;
  });

  const idealNec=inc*0.5, idealDes=inc*0.3, idealAho=inc*0.2;
  const rows=[
    {label:'🔴 NECESIDADES',ideal:idealNec,real:nec,idealPct:50,color:'#EF4444'},
    {label:'🟡 DESEOS',ideal:idealDes,real:des,idealPct:30,color:'#F59E0B'},
    {label:'🟢 AHORROS',ideal:idealAho,real:aho,idealPct:20,color:'#10B981'},
  ];

  const rowsHtml=rows.map(r=>{
    const realPct=inc>0?Math.round(r.real/inc*100):0;
    const diff=r.ideal-r.real;
    const over=diff<0;
    const obsLabel=over?`⚠ +${fmt(Math.abs(diff))}`:diff===0?'✓ Exacto':`✓ −${fmt(diff)}`;
    const obsColor=over?'var(--danger)':'var(--success)';
    const barPct=Math.min(100,r.ideal>0?Math.round(r.real/r.ideal*100):0);
    const barColor=over?'var(--danger)':realPct>=r.idealPct*0.9?'var(--success)':'var(--warning)';
    return`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:12px;font-weight:700">${r.label}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;text-align:center">
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">IDEAL</div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">${r.idealPct}%</div>
          <div style="font-size:10px;color:var(--text2)">${fmt(r.ideal)}</div>
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">REAL</div>
          <div style="font-size:12px;font-weight:700;color:${r.color}">${realPct}%</div>
          <div style="font-size:10px;color:var(--text2)">${fmt(r.real)}</div>
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">OBSERVACIÓN</div>
          <div style="font-size:11px;font-weight:700;color:${obsColor}">${obsLabel}</div>
          <div style="font-size:10px;color:var(--text2)">${over?'Excedido':'Disponible'}</div>
        </div>
      </div>
      <div style="height:8px;background:var(--surface3);border-radius:99px;overflow:hidden">
        <div style="height:100%;border-radius:99px;background:${barColor};width:${barPct}%;transition:width .4s"></div>
      </div>
    </div>`;
  }).join('');

  const necPct=inc>0?Math.round(nec/inc*100):0;
  const desPct=inc>0?Math.round(des/inc*100):0;
  const ahoPct=inc>0?Math.round(aho/inc*100):0;
  const necOK=necPct<=50,desOK=desPct<=30,ahoOK=ahoPct>=20;

  const collapsedHtml=`<div style="display:flex;gap:12px;align-items:center;margin-top:4px">
    <div style="display:flex;align-items:center;gap:4px"><span style="color:${necOK?'var(--success)':'var(--danger)'}">🔴</span><span style="font-size:11px;font-weight:700;color:${necOK?'var(--success)':'var(--danger)'}">${necPct}%</span></div>
    <div style="display:flex;align-items:center;gap:4px"><span style="color:${desOK?'var(--success)':'var(--warning)'}">🟡</span><span style="font-size:11px;font-weight:700;color:${desOK?'var(--success)':'var(--warning)'}">${desPct}%</span></div>
    <div style="display:flex;align-items:center;gap:4px"><span style="color:${ahoOK?'var(--success)':'var(--danger)'}">🟢</span><span style="font-size:11px;font-weight:700;color:${ahoOK?'var(--success)':'var(--danger)'}">${ahoPct}%</span></div>
    <span style="font-size:10px;color:var(--text3);margin-left:4px">${necOK&&desOK&&ahoOK?'✓ Todo OK':'⚠ Revisar'}</span>
  </div>`;

  return`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleRule502030()">
      <div class="card-title" style="margin:0">📊 Regla 50/30/20</div>
      <span id="rule-arrow" style="color:var(--text3);font-size:12px;transition:transform .2s">▼</span>
    </div>
    <div id="rule-collapsed" style="display:none">${collapsedHtml}</div>
    <div id="rule-expanded">
      <div style="font-size:10px;color:var(--text3);margin:4px 0 12px">Ingresos del mes: <strong style="color:var(--text)">${fmt(inc)}</strong></div>
      ${rowsHtml}
    </div>
  </div>`;
}
function toggleRule502030(){
  const exp=document.getElementById('rule-expanded');
  const col=document.getElementById('rule-collapsed');
  const arrow=document.getElementById('rule-arrow');
  if(!exp||!col)return;
  const isOpen=exp.style.display!=='none';
  exp.style.display=isOpen?'none':'block';
  col.style.display=isOpen?'flex':'none';
  if(arrow)arrow.style.transform=isOpen?'rotate(-90deg)':'';
}

function txRow(t){
  const cat=getCat(t.categoryId);const sub=getSub(t.subcategoryId);const acc=getAcc(t.accountId);
  const icon=t.type==='transferencia'?'↔️':(cat?cat.icon:'📦');

  const sign=t.type==='ingreso'?'+':t.type==='gasto'?'−':'↔';
  const cls=t.type==='ingreso'?'inc':t.type==='gasto'?'exp':'tra';
  const name=t.type==='transferencia'?`${getAcc(t.accountId)?.name||'?'} → ${getAcc(t.toAccountId)?.name||'?'}`:(cat?cat.name:'Sin categoría');
  const subName=sub?sub.name:(acc?acc.name:'');
  return`<div class="tx-item" onclick="openModal('viewTx',{id:'${t.id}'})">

}

            <button style="flex:1;min-width:70px;padding:9px 6px;border-radius:10px;border:none;background:rgba(255,255,255,.2);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)" onclick="event.stopPropagation();editAcc('${a.id}')">✏️ Editar</button>

// PRESUPUESTOS
// ════════════════════════════════════════════════════════════
function renderBudgetGroups(budgets){
  // Group budgets by category
  const groups={};
  budgets.forEach(b=>{
    const catId=b.categoryId||'none';
    if(!groups[catId])groups[catId]=[];
    groups[catId].push(b);
  });
  return Object.entries(groups).map(([catId,grpBudgets])=>{
    const cat=getCat(catId);
    const totalAmt=grpBudgets.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
    const totalSpent=grpBudgets.reduce((s,b)=>s+getBudgetSpent(b),0);
    const totalPct=Math.min(100,totalAmt>0?Math.round(totalSpent/totalAmt*100):0);
    const color=totalPct>=90?'var(--danger)':totalPct>=70?'var(--warning)':'var(--primary)';
    const bColor=grpBudgets[0].color||'var(--primary)';
    const hasMultiple=grpBudgets.length>1||(grpBudgets.length===1&&grpBudgets[0].subcategoryId);
    const gId='bgrp-'+catId;
    return`<div class="card" style="border-left:4px solid ${bColor};margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer" onclick="${hasMultiple?`document.getElementById('${gId}').classList.toggle('hidden');this.querySelector('.bgrp-arrow').textContent=document.getElementById('${gId}').classList.contains('hidden')?'▶':'▼'`:`openModal('budget',{id:'${grpBudgets[0].id}'})`}">
        <div style="width:40px;height:40px;border-radius:10px;background:${bColor}22;display:flex;align-items:center;justify-content:center;font-size:20px">${cat?cat.icon:'📦'}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700">${cat?cat.name:'Sin categoría'}</div>
          <div style="font-size:11px;color:var(--text2)">${grpBudgets.length} presupuesto${grpBudgets.length>1?'s':''} · ${grpBudgets[0].currency||S.currency}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge" style="background:${color}22;color:${color}">${totalPct}%</span>
          ${hasMultiple?`<span class="bgrp-arrow" style="color:var(--text3);font-size:12px">▶</span>`:''}
        </div>
      </div>
      <div class="progress-bar" style="height:8px;margin-bottom:8px"><div class="progress-fill" style="width:${totalPct}%;background:${color}"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;text-align:center;margin-bottom:${hasMultiple?'8':'0'}px">
        <div><div style="color:var(--text2)">Gastado</div><div style="font-weight:700;color:var(--danger)">${fmt(totalSpent)}</div></div>
        <div><div style="color:var(--text2)">Restante</div><div style="font-weight:700;color:${totalAmt-totalSpent>=0?'var(--success)':'var(--danger)'}">${fmt(Math.max(0,totalAmt-totalSpent))}</div></div>
        <div><div style="color:var(--text2)">Límite</div><div style="font-weight:700">${fmt(totalAmt)}</div></div>
      </div>
      ${hasMultiple?`<div id="${gId}" class="hidden" style="border-top:1px solid var(--border);padding-top:8px">
        ${grpBudgets.map(b=>{
          const sub=getSub(b.subcategoryId);
          const bSpent=getBudgetSpent(b);
          const bPct=Math.min(100,b.amount>0?Math.round(bSpent/b.amount*100):0);
          const bColor2=bPct>=90?'var(--danger)':bPct>=70?'var(--warning)':'var(--primary)';
          return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openModal('budget',{id:'${b.id}'})">
            <span style="font-size:12px;flex:1;color:var(--text2)">${sub?sub.icon+' '+sub.name:'General'}</span>
            <span style="font-size:11px;color:var(--text2)">${fmt(bSpent)}/${fmt(b.amount)}</span>
            <span class="badge" style="background:${bColor2}22;color:${bColor2};font-size:10px">${bPct}%</span>
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}
function renderPresupuestos(){
  const budgets=S.budgets.filter(b=>(b.currency||S.currency)===S.currency);
  const totalLimit=budgets.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const totalSpent=budgets.reduce((s,b)=>s+getBudgetSpent(b),0);
  const totalPct=totalLimit>0?Math.min(100,Math.round(totalSpent/totalLimit*100)):0;
  const totalColor=totalPct>=90?'var(--danger)':totalPct>=70?'var(--warning)':'var(--primary)';

  return`
    ${budgets.length?`<div class="card" style="margin-bottom:12px">
      <div class="card-title">Resumen total de presupuestos</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><div style="font-size:12px;color:var(--text2)">Gastado</div><div style="font-size:18px;font-weight:800;color:var(--danger)">${fmt(totalSpent)}</div></div>
        <div style="text-align:right"><div style="font-size:12px;color:var(--text2)">Límite total</div><div style="font-size:18px;font-weight:800">${fmt(totalLimit)}</div></div>
      </div>
      <div class="progress-bar" style="height:10px;margin-bottom:6px"><div class="progress-fill" style="width:${totalPct}%;background:${totalColor}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2)">
        <span>Usado: <strong style="color:${totalColor}">${totalPct}%</strong></span>
        <span>Restante: <strong style="color:${totalLimit-totalSpent>=0?'var(--success)':'var(--danger)'}">${fmt(Math.max(0,totalLimit-totalSpent))}</strong></span>
      </div>
    </div>`:''}
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('budget',{})">+ ${t('newBudget')||'Nuevo presupuesto'}</button>
    </div>
    ${!budgets.length?'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Sin presupuestos</div><div class="empty-desc">Define límites por categoría</div></div>':renderBudgetGroups(budgets)}
  `;
}

// ════════════════════════════════════════════════════════════
// METAS
// ════════════════════════════════════════════════════════════
function renderMetas(){
  const goals=S.goals.filter(g=>(g.currency||S.currency)===S.currency);
  const totalSaved=goals.reduce((s,g)=>s+(parseFloat(g.current)||0),0);
  const totalTarget=goals.reduce((s,g)=>s+(parseFloat(g.target)||0),0);
  const motivMsg=(pct)=>{
    if(pct>=100)return{icon:'🏆',msg:'¡Meta alcanzada! Sigue así, eres increíble.',color:'var(--success)'};
    if(pct>=80)return{icon:'🔥',msg:'¡Casi llegás! Estás en la recta final.',color:'var(--warning)'};
    if(pct>=50)return{icon:'💪',msg:'¡Vas a la mitad! Cada peso cuenta.',color:'var(--info)'};
    if(pct>=25)return{icon:'🌱',msg:'Buen comienzo, estás construyendo tu futuro.',color:'var(--primary)'};
    return{icon:'🚀',msg:'Acaba de comenzar. ¡El primer paso ya está dado!',color:'var(--text2)'};
  };
  return`
    ${goals.length>0?`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><div style="font-size:12px;color:var(--text2)">Total ahorrado</div><div style="font-size:14px;font-weight:800;color:var(--success)">${fmt(totalSaved)}</div></div>
        <div style="text-align:right"><div style="font-size:12px;color:var(--text2)">Objetivo total</div><div style="font-size:20px;font-weight:800">${fmt(totalTarget)}</div></div>
      </div>
      <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${Math.min(100,totalTarget>0?Math.round(totalSaved/totalTarget*100):0)}%;background:var(--primary)"></div></div>
    </div>`:''}
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('goal',{})">+ ${t('newGoal')||'Nueva meta'}</button>
    </div>
    ${!goals.length?'<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">Sin metas</div><div class="empty-desc">Define tus objetivos de ahorro</div></div>':
    goals.map(g=>{
      const rawPct=g.target>0?Math.round(g.current/g.target*100):0;
      const barPct=Math.min(100,rawPct);
      const exceeded=rawPct>=100;
      const remaining=Math.max(0,g.target-g.current);
      const days=(!exceeded&&g.deadline)?daysUntil(g.deadline):null;
      const monthly=days&&days>0?remaining/(days/30):0;
      const gColor=g.color||'var(--primary)';
      const acc=getAcc(g.accountId);
      const motiv=motivMsg(rawPct);
      return`<div class="goal-card" style="border-left:4px solid ${gColor}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px" onclick="openModal('goal',{id:'${g.id}'})">
          <div style="width:44px;height:44px;border-radius:12px;background:${gColor}22;display:flex;align-items:center;justify-content:center;font-size:24px">${g.icon||'🎯'}</div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700">${g.name}</div>
            <div style="font-size:11px;color:var(--text2)">${g.deadline&&!exceeded?'Meta: '+g.deadline+' ·':''} ${acc?'📌 '+acc.name:''}</div>
          </div>
          <span class="badge" style="background:${motiv.color}22;color:${motiv.color}">${rawPct}%</span>
        </div>
        <div class="progress-bar" style="height:10px;margin-bottom:8px;position:relative">
          <div class="progress-fill" style="width:${barPct}%;background:${gColor}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px">
          <span>Ahorrado: <strong style="color:var(--text)">${fmt(g.current,g.currency)}</strong></span>
          <span>Meta: <strong style="color:var(--text)">${fmt(g.target,g.currency)}</strong></span>
        </div>
        <div style="background:${motiv.color}11;border-left:3px solid ${motiv.color};border-radius:4px;padding:8px 10px;margin-bottom:10px;font-size:12px;color:${motiv.color}">
          ${motiv.icon} ${motiv.msg}${exceeded&&g.current>g.target?` (¡Superaste la meta en ${fmt(g.current-g.target,g.currency)}!)`:''}</div>
        ${(!exceeded&&monthly>0)?`<div style="font-size:11px;color:var(--text2);margin-bottom:10px">💡 Necesitas ${fmt(monthly,g.currency)}/mes para llegar a tiempo (${days}d restantes)</div>`:''}
        <button class="btn btn-success btn-sm" style="width:100%" onclick="openModal('addToGoal',{id:'${g.id}'})">+ Agregar ahorro</button>
      </div>`;
    }).join('')}
  `;
}

// ════════════════════════════════════════════════════════════
// PAGOS PROGRAMADOS
// ════════════════════════════════════════════════════════════
function renderPagos(){
  return`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('payment',{})">+ ${t('newPayment')||'Nuevo pago'}</button>
    </div>
    ${!S.scheduledPayments.length?'<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-title">Sin pagos programados</div><div class="empty-desc">Programa tus pagos recurrentes</div></div>':
    S.scheduledPayments.map(p=>{
      const days=daysUntil(p.nextDate);
      const cat=getCat(p.categoryId);
      const borderColor=days<0?'var(--danger)':days===0?'var(--warning)':days<=3?'#F59E0B88':(p.color||'var(--border)');
      let statusClass='';let statusBadge='';
      if(days<0){statusClass='sched-overdue';statusBadge=`<span class="badge badge-danger">Vencido hace ${Math.abs(days)}d</span>`;}
      else if(days===0){statusClass='sched-today';statusBadge=`<span class="badge badge-warning">⚡ HOY</span>`;}
      else if(days<=3){statusClass='sched-soon';statusBadge=`<span class="badge badge-warning">En ${days}d</span>`;}
      else{statusBadge=`<span class="badge badge-info">En ${days}d</span>`;}
      return`<div class="sched-item ${statusClass}" style="border-left:4px solid ${borderColor}" onclick="openModal('payment',{id:'${p.id}'})">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:${days<=3?'10px':'0'}">
          <div style="width:44px;height:44px;border-radius:12px;background:${cat?cat.color+'22':'#64748B22'};display:flex;align-items:center;justify-content:center;font-size:22px">${cat?cat.icon:'🔔'}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700">${p.name}</div>
            <div style="font-size:11px;color:var(--text2)">${p.frequency} · ${p.nextDate} ${p.isAuto?'· 🤖 Auto':''}</div>
          </div>
          <div style="text-align:right">${statusBadge}<div style="font-size:16px;font-weight:700;color:var(--danger);margin-top:4px">${fmt(p.amount,p.currency)}</div></div>
        </div>
        ${days<=5?`<button class="btn btn-primary btn-sm" style="width:100%" onclick="event.stopPropagation();registerPaymentManual('${p.id}')">✓ Registrar pago${days===0?' HOY':days<0?' (vencido)':' ('+days+'d)'}</button>`:''}
      </div>`;
    }).join('')}
  `;
}

function registerPaymentManual(id){
  const p=S.scheduledPayments.find(x=>x.id===id);if(!p)return;
  const tx={id:uid(),type:'gasto',accountId:p.accountId||'',categoryId:p.categoryId||'',subcategoryId:p.subcategoryId||'',amount:p.amount,currency:p.currency||S.currency,date:todayStr(),description:p.name,paymentMethod:''};
  S.transactions.push(tx);
  advancePayment(p);
  saveState();renderPage('pagos');toast('Pago registrado ✓');
}

// ════════════════════════════════════════════════════════════
function renderDeudas(){
  const pasivos=S.accounts.filter(a=>a.type==='pasivo'&&(a.currency||S.currency)===S.currency);
  const totalDebt=pasivos.reduce((s,a)=>s+Math.abs(getBalance(a.id)),0);

  return`
    ${pasivos.length?`<div class="balance-card" style="margin-bottom:16px;cursor:default">
      <div class="balance-label">Total deudas (${S.currency})</div>
      <div class="balance-amount" style="color:#FF8080">${fmt(totalDebt)}</div>
      <div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,.5)">${pasivos.length} ${pasivos.length===1?'deuda':'deudas'} registradas</div>
    </div>`:''}
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('account',{defaultType:'pasivo'})">+ ${t('newDebt')||'Nueva deuda'}</button>
    </div>
    ${!pasivos.length?'<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-title">Sin deudas en '+S.currency+'</div><div class="empty-desc">Las cuentas pasivas aparecerán aquí</div></div>':
    pasivos.map(a=>{
      const bal=Math.abs(getBalance(a.id));
      const b=getBank(a.bankEntity,a.currency||S.currency);
      const bColor=b?b.color:'#64748B';
      const subLabel=a.subtype==='tc'?'💳 Tarjeta Crédito':a.subtype==='credito'?'💰 Crédito':'🏦 Préstamo';
      const days=a.paymentDate?(()=>{const now=new Date();const d=new Date(now.getFullYear(),now.getMonth(),a.paymentDate);if(d<now)d.setMonth(d.getMonth()+1);return Math.round((d-now)/86400000);})():null;
      const dColor=days!==null?(days<=0?'var(--danger)':days<=5?'var(--warning)':'var(--text2)'):'var(--text2)';
      return`<div class="debt-card" style="border-left:4px solid ${bColor}" onclick="openModal('account',{id:'${a.id}'})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:12px">
            ${bankBadge(a.bankEntity,a.currency||S.currency,44,a)}
            <div><div style="font-size:15px;font-weight:700">${a.name}</div><div style="font-size:12px;color:var(--text2)">${subLabel} · ${a.currency||S.currency}</div>${b?`<div style="font-size:11px;color:var(--text3)">${b.name}</div>`:''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:15px;font-weight:800;color:var(--danger);word-break:break-all">${fmt(bal,a.currency||S.currency)}</div>
            ${days!==null?`<div style="font-size:11px;color:${dColor};font-weight:600">Pago: ${days<=0?'Vencido':days===1?'Mañana':days+'d'}</div>`:''}
          </div>
        </div>
        ${a.subtype==='tc'&&a.tcLimit?`<div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px"><span>Usado: ${fmt(bal,a.currency||S.currency)}</span><span>Límite: ${fmt(a.tcLimit,a.currency||S.currency)}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,a.tcLimit>0?Math.round(bal/a.tcLimit*100):0)}%;background:${a.tcLimit>0&&bal/a.tcLimit>0.8?'var(--danger)':'var(--warning)'}"></div></div></div>`:''}
        ${a.tae||a.cutDate||a.paymentDate||a.monthlyPayment?`<div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text2);flex-wrap:wrap">
          ${a.tae?`<span>TAE: ${a.tae}%</span>`:''}
          ${a.cutDate?`<span>Corte: día ${a.cutDate}</span>`:''}
          ${a.paymentDate?`<span>Pago: día ${a.paymentDate}</span>`:''}
          ${a.monthlyPayment?`<span>Cuota: ${fmt(a.monthlyPayment,a.currency||S.currency)}</span>`:''}
        </div>`:''}
        <button class="btn btn-primary btn-sm" style="width:100%;margin-top:12px" onclick="event.stopPropagation();openModal('debtPayment',{id:'${a.id}'})">💳 Registrar pago</button>
      </div>`;
    }).join('')}
  `;
}

// ANÁLISIS

function renderAnalisis(){
  const{from,to}=getAnalysisPeriodRange();
  const afTxs=S.transactions.filter(t=>{const d=new Date(t.date);return t.currency===S.currency&&d>=from&&d<=to;});
  const inc=afTxs.filter(t=>t.type==='ingreso').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const exp=afTxs.filter(t=>t.type==='gasto').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const savings=inc-exp;
  const savingsRate=inc>0?Math.round(savings/inc*100):0;

  const txsInPeriod=afTxs;
  const catExpenses={};
  txsInPeriod.filter(t=>t.type==='gasto').forEach(t=>{if(!catExpenses[t.categoryId])catExpenses[t.categoryId]=0;catExpenses[t.categoryId]+=parseFloat(t.amount)||0;});
  const sortedCats=Object.entries(catExpenses).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const totalExp=sortedCats.reduce((s,[,v])=>s+v,0);

  // Build 6 bars for mini chart — always show last 6 months regardless of filter
  const barCount=6;const bars=[];
  for(let i=barCount-1;i>=0;i--){
    const d=new Date();
    d.setMonth(d.getMonth()-i);
    const m=d.getMonth();const y=d.getFullYear();
    const mInc=S.transactions.filter(t=>t.type==='ingreso'&&t.currency===S.currency&&new Date(t.date).getMonth()===m&&new Date(t.date).getFullYear()===y).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    const mExp=S.transactions.filter(t=>t.type==='gasto'&&t.currency===S.currency&&new Date(t.date).getMonth()===m&&new Date(t.date).getFullYear()===y).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    bars.push({label:d.toLocaleString('es',{month:'short'}),inc:mInc,exp:mExp});
  }
  const maxVal=Math.max(...bars.map(b=>Math.max(b.inc,b.exp)),1);

  const barChart=`<div style="display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:6px">
    ${bars.map(b=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:90px">
        <div style="flex:1;background:var(--success);border-radius:3px 3px 0 0;height:${Math.max(2,Math.round(b.inc/maxVal*90))}px;opacity:.8"></div>
        <div style="flex:1;background:var(--danger);border-radius:3px 3px 0 0;height:${Math.max(2,Math.round(b.exp/maxVal*90))}px;opacity:.8"></div>
      </div>
      <div style="font-size:9px;color:var(--text3)">${b.label}</div>
    </div>`).join('')}
  </div>
  <div style="display:flex;gap:16px;font-size:11px"><span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--success);border-radius:2px;display:inline-block"></span>Ingresos</span><span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--danger);border-radius:2px;display:inline-block"></span>Gastos</span></div>`;

  let donutPaths='',legendItems='';
  if(sortedCats.length){
    let offset=0;const r=50,cx=60,cy=60,circ=2*Math.PI*r;
    sortedCats.forEach(([catId,val])=>{
      const cat=getCat(catId);const pct=totalExp>0?val/totalExp:0;const dash=pct*circ;
      const color=cat?cat.color:'#64748B';
      donutPaths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="18" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
      offset+=dash;
      legendItems+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px"><div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div><span style="flex:1">${cat?cat.icon+' '+cat.name:'Sin cat.'}</span><span style="font-weight:700">${totalExp>0?Math.round(val/totalExp*100):0}% · ${fmt(val)}</span></div>`;
    });
  }

  return`
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600">AÑO</div>
        <select class="form-select" style="font-size:14px" onchange="S.analysisYear=parseInt(this.value);saveState();renderPage('analisis')">${Array.from({length:8},(_,i)=>new Date().getFullYear()-i).map(y=>`<option value="${y}" ${y===(S.analysisYear||new Date().getFullYear())?'selected':''}>${y}</option>`).join('')}</select>
      </div>
      <div style="flex:2">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600">PERÍODO</div>
        <select class="form-select" style="font-size:14px" onchange="S.analysisPeriodSub=this.value;saveState();renderPage('analisis')">
          <option value="anual" ${(S.analysisPeriodSub||'anual')==='anual'?'selected':''}>Todo el año</option>
          <option value="sem1" ${(S.analysisPeriodSub)==='sem1'?'selected':''}>Semestre 1 (Ene-Jun)</option>
          <option value="sem2" ${(S.analysisPeriodSub)==='sem2'?'selected':''}>Semestre 2 (Jul-Dic)</option>
          <option value="q1" ${(S.analysisPeriodSub)==='q1'?'selected':''}>T1 (Ene-Mar)</option>
          <option value="q2" ${(S.analysisPeriodSub)==='q2'?'selected':''}>T2 (Abr-Jun)</option>
          <option value="q3" ${(S.analysisPeriodSub)==='q3'?'selected':''}>T3 (Jul-Sep)</option>
          <option value="q4" ${(S.analysisPeriodSub)==='q4'?'selected':''}>T4 (Oct-Dic)</option>
          <option value="01" ${(S.analysisPeriodSub)==='01'?'selected':''}>Enero</option>
          <option value="02" ${(S.analysisPeriodSub)==='02'?'selected':''}>Febrero</option>
          <option value="03" ${(S.analysisPeriodSub)==='03'?'selected':''}>Marzo</option>
          <option value="04" ${(S.analysisPeriodSub)==='04'?'selected':''}>Abril</option>
          <option value="05" ${(S.analysisPeriodSub)==='05'?'selected':''}>Mayo</option>
          <option value="06" ${(S.analysisPeriodSub)==='06'?'selected':''}>Junio</option>
          <option value="07" ${(S.analysisPeriodSub)==='07'?'selected':''}>Julio</option>
          <option value="08" ${(S.analysisPeriodSub)==='08'?'selected':''}>Agosto</option>
          <option value="09" ${(S.analysisPeriodSub)==='09'?'selected':''}>Septiembre</option>
          <option value="10" ${(S.analysisPeriodSub)==='10'?'selected':''}>Octubre</option>
          <option value="11" ${(S.analysisPeriodSub)==='11'?'selected':''}>Noviembre</option>
          <option value="12" ${(S.analysisPeriodSub)==='12'?'selected':''}>Diciembre</option>
          <option value="7d" ${(S.analysisPeriodSub)==='7d'?'selected':''}>Últimos 7 días</option>
          <option value="30d" ${(S.analysisPeriodSub)==='30d'?'selected':''}>Últimos 30 días</option>
          <option value="90d" ${(S.analysisPeriodSub)==='90d'?'selected':''}>Últimos 90 días</option>
        </select>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">Resumen · ${S.analysisYear||new Date().getFullYear()}</div>
      <div class="kpi-row" style="margin:0">
        <div class="kpi-card"><div class="kpi-label">Ingresos</div><div class="kpi-val" style="font-size:13px;color:var(--success)">${fmt(inc)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Gastos</div><div class="kpi-val" style="font-size:13px;color:var(--danger)">${fmt(exp)}</div></div>
        <div class="kpi-card"><div class="kpi-label">💸 Deudas</div><div class="kpi-val" style="font-size:13px;color:var(--danger)">${fmt(S.accounts.filter(a=>a.type==='pasivo'&&(a.currency||S.currency)===S.currency).reduce((s,a)=>s+Math.abs(getBalance(a.id)),0))}</div></div>
        <div class="kpi-card"><div class="kpi-label">💰 Ahorro</div><div class="kpi-val" style="font-size:12px;color:${savingsRate<=0?'var(--text2)':savingsRate>=20?'var(--success)':savingsRate>=10?'var(--warning)':'var(--danger)'}">${fmt(savings)}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${savingsRate<=0?'0%':savingsRate+'%'} del ingreso</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px"><div class="card-title">Evolución histórica</div>${barChart}</div>
    <div class="card"><div class="card-title">Gastos por categoría · ${S.analysisPeriodSub||'anual'} ${S.analysisYear||new Date().getFullYear()}</div>
    ${sortedCats.length?`<div style="display:flex;align-items:center;gap:16px">
      <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="none" stroke="var(--surface3)" stroke-width="18"/>${donutPaths}</svg>
      <div style="flex:1">${legendItems}</div>
    </div>`:'<div style="color:var(--text2);font-size:13px">Sin datos de gastos en este período</div>'}
    </div>
  `;
}

function closeCatPanel(){var el=document.getElementById('cat-panel-overlay');if(el)el.remove();if(S.currentPage==='configuracion')renderPage('configuracion');}
function openCatPanel(){
  const overlay=document.createElement('div');
  overlay.id='cat-panel-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:200;background:var(--surface);display:flex;flex-direction:column;overflow:hidden';
  const tab=S._catTab||'gasto';
  overlay.innerHTML=
    '<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'+
      '<button onclick="closeCatPanel()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;line-height:1">←</button>'+
      '<span style="font-size:17px;font-weight:800">Categorías</span>'+
      '<button class="btn btn-primary btn-sm" onclick="openModal(\'category\',{defaultType:S._catTab||\'gasto\'})">+ Nueva</button>'+
    '</div>'+
    '<div style="padding:12px 16px 8px;flex-shrink:0">'+
      '<div style="background:var(--surface2);border-radius:50px;padding:3px;display:flex;gap:2px">'+
        '<button id="catpnl-gasto" onclick="setCatTab(&apos;gasto&apos;)" style="flex:1;padding:9px 16px;border-radius:50px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:'+(tab==='gasto'?'var(--primary)':'transparent')+';color:'+(tab==='gasto'?'white':'var(--text2)')+';transition:.15s">GASTOS</button>'+
        '<button id="catpnl-ingreso" onclick="setCatTab(&apos;ingreso&apos;)" style="flex:1;padding:9px 16px;border-radius:50px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:'+(tab!=='gasto'?'var(--primary)':'transparent')+';color:'+(tab!=='gasto'?'white':'var(--text2)')+';transition:.15s">INGRESOS</button>'+
      '</div>'+
    '</div>'+
    '<div id="cat-panel-list" style="flex:1;overflow-y:auto;padding:0 16px 16px">'+renderCatList(tab)+'</div>';
  document.body.appendChild(overlay);
}
function setCatTab(tab){
  S._catTab=tab;
  // Update panel tab buttons
  const g=document.getElementById('catpnl-gasto');
  const i=document.getElementById('catpnl-ingreso');
  if(g){g.style.background=tab==='gasto'?'var(--primary)':'transparent';g.style.color=tab==='gasto'?'white':'var(--text2)';g.style.borderRadius='50px';}
  if(i){i.style.background=tab!=='gasto'?'var(--primary)':'transparent';i.style.color=tab!=='gasto'?'white':'var(--text2)';i.style.borderRadius='50px';}
  // Update list in panel
  const list=document.getElementById('cat-panel-list');
  if(list)list.innerHTML=renderCatList(tab);
}
function renderCatList(tab){
  const allCats=S.categories.filter(cat=>cat.type===tab||cat.type==='transferencia');
  if(!allCats.length)return'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>';
  // For gastos tab: group by nature
  let html='';
  if(tab==='gasto'){
    const groups=[
      {key:'necesidades',label:'🏠 Necesidades',color:'#EF4444'},
      {key:'deseos',label:'🎯 Deseos',color:'#F59E0B'},
      {key:'ahorros',label:'💰 Ahorros',color:'#00D4AA'},
      {key:'transferencia',label:'↔️ Transferencias',color:'#6366F1'},
    ];
    groups.forEach(g=>{
      let cats;
      if(g.key==='transferencia') cats=S.categories.filter(c=>c.type==='transferencia');
      else cats=S.categories.filter(c=>c.type==='gasto'&&c.nature===g.key);
      if(!cats.length)return;
      html+=`<div style="font-size:11px;font-weight:700;color:${g.color};text-transform:uppercase;letter-spacing:.6px;padding:10px 0 4px;border-bottom:1px solid ${g.color}33;margin-bottom:6px">${g.label}</div>`;
      html+=cats.map(cat=>renderCatItem(cat)).join('');
    });
    return html||'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>';
  }
  // For ingresos: group by incomeType
  if(tab==='ingreso'){
    var grpInc=[
      {key:'principal',label:'⭐ Principal',color:'#00D4AA'},
      {key:'secundario',label:'➕ Secundario',color:'#8B5CF6'},
    ];
    var grouped='';
    grpInc.forEach(function(g){
      var cats=allCats.filter(function(cat){return cat.type==='ingreso'&&(g.key==='principal'?(!cat.incomeType||cat.incomeType==='principal'):cat.incomeType===g.key);});
      if(!cats.length)return;
      grouped+='<div style="font-size:11px;font-weight:700;color:'+g.color+';text-transform:uppercase;letter-spacing:.6px;padding:10px 0 4px;border-bottom:1px solid '+g.color+'33;margin-bottom:6px">'+g.label+'</div>';
      grouped+=cats.map(function(cat){return renderCatItem(cat);}).join('');
    });
    return grouped||'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>';
  }
  return allCats.map(cat=>renderCatItem(cat)).join('');
}
function renderCatItem(cat){
    const subs=S.subcategories.filter(s=>s.categoryId===cat.id);
    const typeBadge=cat.type==='ingreso'?'badge-success':cat.type==='gasto'?'badge-danger':'badge-info';
    const catDomId='catg-'+cat.id;
    return`<div class="cat-group" style="border-left:4px solid ${cat.color||'var(--border)'}">
      <div class="cat-group-header" onclick="toggleCatGroup('${catDomId}',this)" style="cursor:pointer">
        <div class="cat-group-left">
          <div style="width:38px;height:38px;border-radius:10px;background:${cat.color||'#64748B'}22;display:flex;align-items:center;justify-content:center;font-size:18px">${cat.icon}</div>
          <div>
            <div style="font-size:13px;font-weight:700">${cat.name}</div>
            <span class="badge ${typeBadge}" style="font-size:9px">${cat.type==='ingreso'?'Ingreso':cat.type==='gasto'?'Gasto':'Transf.'}</span>
            ${subs.length?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${subs.length} subcats</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-text" style="font-size:12px" onclick="event.stopPropagation();openModal('subcategory',{categoryId:'${cat.id}'})">+ Sub</button>
          <button class="btn-del" onclick="event.stopPropagation();deleteCat('${cat.id}')">🗑</button>
          <span class="cat-arrow" style="color:var(--text3);font-size:12px">▶</span>
        </div>
      </div>
      <div id="${catDomId}" class="hidden">
        ${subs.length?`<div class="subcat-list">${subs.map(s=>`<div class="subcat-item"><span>${s.icon} ${s.name}</span><div style="display:flex;gap:4px"><button class="btn-text" style="font-size:11px" onclick="openModal('editSubcategory',{id:'${s.id}'})">✏️</button><button class="btn-del" onclick="deleteSub('${s.id}')">✕</button></div></div>`).join('')}</div>`:''}
      </div>
    </div>`;
}
function renderCategorias(){
  return`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('category',{})">+ ${t('newCategory')||'Nueva categoría'}</button>
    </div>
    ${!S.categories.length?'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>':
    S.categories.map(cat=>{
      const subs=S.subcategories.filter(s=>s.categoryId===cat.id);
      const typeBadge=cat.type==='ingreso'?'badge-success':cat.type==='gasto'?'badge-danger':'badge-info';
      const catDomId='catg-'+cat.id;
      return`<div class="cat-group" style="border-left:4px solid ${cat.color||'var(--border)'}">
        <div class="cat-group-header" onclick="toggleCatGroup('${catDomId}',this)" style="cursor:pointer">
          <div class="cat-group-left">
            <div style="width:38px;height:38px;border-radius:10px;background:${cat.color||'#64748B'}22;display:flex;align-items:center;justify-content:center;font-size:18px">${cat.icon}</div>
            <div>
              <div style="font-size:13px;font-weight:700">${cat.name}</div>
              <span class="badge ${typeBadge}" style="font-size:9px">${cat.type==='ingreso'?'Ingreso':cat.type==='gasto'?'Gasto':'Transf.'}</span>
              ${subs.length?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${subs.length} subcats</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn-text" style="font-size:12px" onclick="event.stopPropagation();openModal('subcategory',{categoryId:'${cat.id}'})">+ Sub</button>
            <button class="btn-del" onclick="event.stopPropagation();deleteCat('${cat.id}')">🗑</button>
            <span class="cat-arrow" style="color:var(--text3);font-size:12px">▶</span>
          </div>
        </div>
        <div id="${catDomId}" class="hidden">
          ${subs.length?`<div class="subcat-list">${subs.map(s=>`<div class="subcat-item"><span>${s.icon} ${s.name}</span><div style="display:flex;gap:4px"><button class="btn-text" style="font-size:11px" onclick="openModal('editSubcategory',{id:'${s.id}'})">✏️</button><button class="btn-del" onclick="deleteSub('${s.id}')">✕</button></div></div>`).join('')}</div>`:''}
        </div>
      </div>`;
    }).join('')}
  `;
}
function toggleCatGroup(id,header){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('hidden');
  const arrow=header.querySelector('.cat-arrow');
  if(arrow)arrow.textContent=el.classList.contains('hidden')?'▶':'▼';
}
function deleteCat(id){confirmDialog('🗑️','¿Eliminar categoría?','Se eliminarán sus subcategorías y los movimientos perderán la categoría.',()=>{S.categories=S.categories.filter(c=>c.id!==id);S.subcategories=S.subcategories.filter(s=>s.categoryId!==id);saveState();const cpnl=document.getElementById('cat-panel-list');if(cpnl)cpnl.innerHTML=renderCatList(S._catTab||'gasto');if(S.currentPage==='configuracion')renderPage('configuracion');else renderPage('categorias');toast('Eliminada');});}
function deleteSub(id){confirmDialog('🗑️','¿Eliminar subcategoría?','',()=>{S.subcategories=S.subcategories.filter(s=>s.id!==id);saveState();const cpnl=document.getElementById('cat-panel-list');if(cpnl)cpnl.innerHTML=renderCatList(S._catTab||'gasto');if(S.currentPage==='configuracion')renderPage('configuracion');else renderPage('categorias');toast('Eliminada');});}

function renderHerramientas(){
  setTimeout(function(){
    var msgs=document.getElementById('ai-messages');
    if(msgs&&aiHistory.length>0)msgs.scrollTop=msgs.scrollHeight;
  },50);
  var now=new Date();
  var hh=now.getHours().toString().padStart(2,'0');
  var mm=now.getMinutes().toString().padStart(2,'0');
  var timeStr=hh+':'+mm;
  var quickBtns=['📊 Salud financiera','💸 ¿En qué gasto más?','🎯 Mis metas','⚠️ Mis deudas'].map(function(q){
    return '<button class="ai-quick-btn" onclick="aiQuickQuestion(\'' + q + '\')">'+q+'</button>';
  }).join('');
  return '<div class="ai-chat-wrap">'
    +'<div class="ai-chat-header">'
      +'<div class="ai-chat-avatar">🤖</div>'
      +'<div class="ai-chat-info">'
        +'<div class="ai-chat-name">Emiliano</div>'
        +'<div class="ai-chat-status">💼 Wealth Manager · FinanzIA</div>'
      +'</div>'
    +'</div>'
    +'<div class="ai-messages" id="ai-messages">'
      +'<div class="ai-date-sep"><span>Hoy</span></div>'
      +'<div class="ai-msg ai-msg-bot">'
        +'<div>👋 ¡Hola! Soy <strong>Emiliano</strong>, tu Wealth Manager personal. Tengo acceso a tus datos financieros en tiempo real y puedo ayudarte con análisis, estrategias y consejos personalizados.<br><br>¿En qué te puedo ayudar hoy?<br><br><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">'+quickBtns+'</div></div>'
        +'<div class="ai-msg-time">'+timeStr+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="ai-input-bar">'
      +'<button class="ai-attach-btn" onclick="aiAttach()" title="Adjuntar">'
        +'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>'
      +'</button>'
      +'<div id="ai-input-div" class="ai-input-area" contenteditable="true" data-placeholder="Mensaje a Emiliano..." onkeydown="if(event.key===\'Enter\'&&(event.ctrlKey||event.metaKey)){event.preventDefault();sendAiMessage();}"></div>'
      +'<button class="ai-send-btn" id="ai-send-btn" onclick="aiSendOrRecord()">'
        +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v4M8 23h8"/></svg>'
      +'</button>'
    +'</div>'
    +'<input type="file" id="ai-file-input" accept="image/*,application/pdf" style="display:none" onchange="aiHandleAttachment(event)">'
  +'</div>';
}

function renderCalculadora(){

function calcLoan(){
  const P=parseFloat(document.getElementById('loan-amount')?.value)||0;
  const r=parseFloat(document.getElementById('loan-rate')?.value)||0;
  const n=parseInt(document.getElementById('loan-months')?.value)||0;
  const res=document.getElementById('loan-result');
  if(!P||!r||!n){if(res)res.style.display='none';return;}
  const rm=r/100/12;
  const cuota=rm===0?P/n:P*rm*Math.pow(1+rm,n)/(Math.pow(1+rm,n)-1);
  const total=cuota*n;
  const interest=total-P;
  if(res)res.style.display='block';
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('loan-cuota',fmt(cuota));set('loan-total',fmt(total));
  set('loan-interest',fmt(interest));set('loan-cost-pct',Math.round(interest/P*100)+'%');
  // Amortization table — show first 12 rows + last row
  const tbody=document.getElementById('loan-table-body');
  const note=document.getElementById('loan-table-note');
  if(tbody){
    let bal=P;const rows=[];
    for(let i=1;i<=n;i++){
      const intAmt=bal*rm;const capAmt=cuota-intAmt;bal-=capAmt;
      rows.push({i,cuota,cap:capAmt,int:intAmt,bal:Math.max(0,bal)});
    }
    tbody.innerHTML=rows.map(r=>`<tr style="border-bottom:1px solid var(--border)"><td style="text-align:right;padding:5px 6px;color:var(--text3)">${r.i}</td><td style="text-align:right;padding:5px 6px">${fmt(r.cuota)}</td><td style="text-align:right;padding:5px 6px;color:var(--success)">${fmt(r.cap)}</td><td style="text-align:right;padding:5px 6px;color:var(--danger)">${fmt(r.int)}</td><td style="text-align:right;padding:5px 6px;font-weight:600">${fmt(r.bal)}</td></tr>`).join('');
    if(note)note.textContent='Total: '+n+' cuotas';
    const dlBtn=document.getElementById('loan-download-btn-top');if(dlBtn)dlBtn.style.display='block';  }
}

function downloadLoanTable(){
  const P=parseFloat(document.getElementById('loan-amount')?.value)||0;
  const r=parseFloat(document.getElementById('loan-rate')?.value)||0;
  const n=parseInt(document.getElementById('loan-months')?.value)||0;
  if(!P||!r||!n)return;
  const rm=r/100/12;
  const cuota=rm===0?P/n:P*rm*Math.pow(1+rm,n)/(Math.pow(1+rm,n)-1);
  let bal=P;let csv='Cuota,Monto Cuota,Capital,Interés,Saldo\n';
  for(let i=1;i<=n;i++){
    const intAmt=bal*rm;const capAmt=cuota-intAmt;bal=Math.max(0,bal-capAmt);
    csv+=`${i},${cuota.toFixed(2)},${capAmt.toFixed(2)},${intAmt.toFixed(2)},${bal.toFixed(2)}\n`;
  }
  const a=document.createElement('a');

function calcSim(){
  const monthly=parseFloat(document.getElementById('sim-monthly')?.value)||0;
  const years=parseInt(document.getElementById('sim-years')?.value)||0;
  const rate=parseFloat(document.getElementById('sim-rate')?.value)||0;
  const res=document.getElementById('sim-result');
  if(!monthly||!years){if(res)res.style.display='none';return;}
  const rm=rate/100/12;
  const n=years*12;
  const total=rm===0?monthly*n:monthly*(Math.pow(1+rm,n)-1)/rm*(1+rm);
  const invested=monthly*n;
  const gains=total-invested;
  if(res)res.style.display='block';
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('sim-total',fmt(total));set('sim-invested',fmt(invested));
  set('sim-gains',fmt(gains));set('sim-mult',total>0?(total/invested).toFixed(2)+'x':'—');
  // Yearly bars
  const barsEl=document.getElementById('sim-bars');
  if(barsEl){
    const yr=[];for(let y=1;y<=Math.min(years,12);y++){const nn=y*12;const v=rm===0?monthly*nn:monthly*(Math.pow(1+rm,nn)-1)/rm*(1+rm);yr.push(v);}
    const maxV=Math.max(...yr);
    const formatK=(v)=>{if(v>=1000000)return(v/1000000).toFixed(1)+'M';if(v>=1000)return(v/1000).toFixed(0)+'K';return v.toFixed(0);};
    barsEl.innerHTML=yr.map((v,i)=>{const h=Math.max(20,Math.round(v/maxV*85));return`<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:7px;font-weight:700;color:var(--text2);margin-bottom:2px;text-align:center;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis">${formatK(v)}</div><div style="width:100%;background:linear-gradient(to top,var(--primary),var(--secondary));border-radius:3px 3px 0 0;height:${h}px;opacity:${0.45+0.55*(i+1)/yr.length}"></div><div style="font-size:8px;color:var(--text3);margin-top:2px">${i+1}a</div></div>`;}).join('');
  }
}

function calcCambioRow(idx){
  if(!window._cambioRows)return;
  var row=window._cambioRows[idx];
  if(!row)return;
  var from=row.from;
  var to=row.to;
  var amount=parseFloat(document.getElementById('cambio-amount')?.value)||0;
  window._cambioAmount=amount;
  // Hide result if incomplete
  var resHidden=document.getElementById('cambio-result-hidden-'+idx);
  if(!amount||!from||!to){
    row.result=null;
    if(resHidden)resHidden.innerHTML='';
    // hide visible result if exists
    var vis=document.getElementById('cambio-formula-'+idx);
    if(vis&&vis.parentElement)vis.parentElement.style.display='none';
    return;
  }
  var rates=S.exchangeRate&&S.exchangeRate.rates?S.exchangeRate.rates:{};
  var rate=1;
  if(from===to){rate=1;}
  else if(rates[to]&&rates[from]){rate=rates[to]/rates[from];}
  else if(rates[to]&&!rates[from]){rate=rates[to];}
  else if(!rates[to]&&rates[from]){rate=1/rates[from];}
  var result=amount*rate;
  var fmeta=getCurrencyMeta(from);var tmeta=getCurrencyMeta(to);
  function fmtL(v,meta){return meta.pos==='before'?meta.sym+v.toLocaleString('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2}):v.toLocaleString('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2})+' '+meta.sym;}
  function showResult(res,rateStr,live){
    var suffix=live?' · open.er-api.com ✓':' · Estimado';
    // Try to update existing DOM elements first
    var fEl=document.getElementById('cambio-formula-'+idx);
    var oEl=document.getElementById('cambio-output-'+idx);
    var rEl=document.getElementById('cambio-rate-'+idx);
    if(fEl&&oEl&&rEl){
      fEl.parentElement.style.display='';
      fEl.textContent=fmtL(amount,fmeta)+' =';
      oEl.textContent=fmtL(res,tmeta);
      rEl.textContent='1 '+from+' = '+rateStr.toFixed(4)+' '+to+suffix;
    } else {
      // Build inline into hidden placeholder
      var ph=document.getElementById('cambio-result-hidden-'+idx);
      if(ph){
        ph.innerHTML='<div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-top:10px;text-align:center">'
          +'<div style="font-size:12px;color:var(--text2)" id="cambio-formula-'+idx+'">'+fmtL(amount,fmeta)+' =</div>'
          +'<div style="font-size:26px;font-weight:800;color:var(--primary);margin:6px 0" id="cambio-output-'+idx+'">'+fmtL(res,tmeta)+'</div>'
          +'<div style="font-size:11px;color:var(--text3)" id="cambio-rate-'+idx+'">1 '+from+' = '+rateStr.toFixed(4)+' '+to+suffix+'</div>'
          +'</div>';
      }
    }
    row.result={formula:fmtL(amount,fmeta)+' =',output:fmtL(res,tmeta),rate:'1 '+from+' = '+rateStr.toFixed(4)+' '+to+suffix};
  }
  showResult(result,rate,false);
  // Always fetch live rate directly with 'from' as base
  if(from!==to){
    fetch('https://open.er-api.com/v6/latest/'+from)
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.rates&&data.rates[to]){
          var lr=data.rates[to];
          showResult(amount*lr,lr,true);
        }
      }).catch(function(){});
  }
}

              +'<span id="cambio-to-lbl-'+idx+'">'+toLabel+'</span>'

              +'<div style="padding:6px 8px;border-bottom:1px solid var(--border)"><input class="form-input" style="font-size:12px;padding:6px 10px" placeholder="Buscar moneda..." oninput="filterCambioPick('+q+'cambio-pick-to-'+idx+q+',this.value)"></div>'

function buildCambioPickItems(idx,side,selected){
  var q="'";
  var html='';
  ALL_CURRENCIES.forEach(function(cur){
    var meta=getCurrencyMeta(cur.code);
    var sel=cur.code===selected;
    html+='<div class="ppick-item" onclick="selectCambioCur('+q+idx+q+','+q+side+q+','+q+cur.code+q+')" data-val="'+cur.code+'" style="padding:10px 12px;cursor:pointer;background:'+(sel?'rgba(0,212,170,.12)':'')+';display:flex;align-items:center;gap:10px">'
      +'<input type="checkbox" '+(sel?'checked':'')+' disabled style="width:16px;height:16px;accent-color:var(--primary);flex-shrink:0;pointer-events:none">'
      +'<div style="flex:1">'
        +'<div style="font-size:14px;font-weight:700;color:'+(sel?'var(--primary)':'var(--text)')+'">'+cur.code+' <span style="color:var(--primary)">'+meta.sym+'</span></div>'
        +'<div style="font-size:11px;color:var(--text3)">'+cur.name+'</div>'
      +'</div>'
      +(sel?'<span style="color:var(--primary);font-size:16px">✓</span>':'')
      +'</div>';
  });
  return html;
}
function getCurName(code){
  var found=ALL_CURRENCIES.find(function(c){return c.code===code;});
  return found?found.name:code;
}
function toggleCambioPick(pickId,lblId){
  var el=document.getElementById(pickId);
  if(!el)return;
  var isOpen=el.style.display!=='none';
  // Close all other pickers first
  document.querySelectorAll('[id^="cambio-pick-"]').forEach(function(p){
    if(!p.id.endsWith('-list'))p.style.display='none';
  });
  el.style.display=isOpen?'none':'block';
  if(!isOpen){
    var inp=el.querySelector('input');
    if(inp){inp.value='';filterCambioPick(pickId,'');setTimeout(function(){inp.focus();},50);}
  }
}
function filterCambioPick(pickId,val){
  var listId=pickId+'-list';
  var list=document.getElementById(listId);
  if(!list)return;
  var v=val.toLowerCase();
  list.querySelectorAll('.ppick-item').forEach(function(item){
    if(!item.dataset.val){item.style.display='';return;}
    item.style.display=(item.textContent.toLowerCase().includes(v)||!v)?'':'none';
  });
}
function selectCambioCur(idx,side,code){
  idx=parseInt(idx);
  if(!window._cambioRows[idx])return;
  // Toggle: pressing already-selected deselects it
  if(window._cambioRows[idx][side]===code) code='';
  window._cambioRows[idx][side]=code;
  var pickId='cambio-pick-'+side+'-'+idx;
  var lblId='cambio-'+side+'-lbl-'+idx;
  var el=document.getElementById(pickId);
  var lbl=document.getElementById(lblId);
  if(el)el.style.display='none';
  if(lbl){
    if(code){lbl.innerHTML=buildCambioLblHtml(code);}
    else{lbl.innerHTML='<span style="font-size:14px;font-weight:600;color:var(--text3)">💱 Seleccionar</span>';}
  }
  calcCambioRow(idx);
}
