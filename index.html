function closeCatPanel(){var el=document.getElementById('cat-panel-overlay');if(el)el.remove();if(S.currentPage==='configuracion')renderPage('configuracion');}
function openCatPanel(){
  const overlay=document.createElement('div');
  overlay.id='cat-panel-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:200;background:var(--surface);display:flex;flex-direction:column;overflow:hidden';
  const tab=S._catTab||'gasto';
  overlay.innerHTML=
    '<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'+
      '<button onclick="closeCatPanel()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;line-height:1">←</button>'+
      '<span style="font-size:17px;font-weight:800">Categorías</span>'+
      '<button class="btn btn-primary btn-sm" onclick="openModal(\'category\',{defaultType:S._catTab||\'gasto\'})">+ Nueva</button>'+
    '</div>'+
    '<div style="padding:12px 16px 8px;flex-shrink:0">'+
      '<div style="background:var(--surface2);border-radius:50px;padding:3px;display:flex;gap:2px">'+
        '<button id="catpnl-gasto" onclick="setCatTab(&apos;gasto&apos;)" style="flex:1;padding:9px 16px;border-radius:50px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:'+(tab==='gasto'?'var(--primary)':'transparent')+';color:'+(tab==='gasto'?'white':'var(--text2)')+';transition:.15s">GASTOS</button>'+
        '<button id="catpnl-ingreso" onclick="setCatTab(&apos;ingreso&apos;)" style="flex:1;padding:9px 16px;border-radius:50px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:'+(tab!=='gasto'?'var(--primary)':'transparent')+';color:'+(tab!=='gasto'?'white':'var(--text2)')+';transition:.15s">INGRESOS</button>'+
      '</div>'+
    '</div>'+
    '<div id="cat-panel-list" style="flex:1;overflow-y:auto;padding:0 16px 16px">'+renderCatList(tab)+'</div>';
  document.body.appendChild(overlay);
}
function setCatTab(tab){
  S._catTab=tab;
  // Update panel tab buttons
  const g=document.getElementById('catpnl-gasto');
  const i=document.getElementById('catpnl-ingreso');
  if(g){g.style.background=tab==='gasto'?'var(--primary)':'transparent';g.style.color=tab==='gasto'?'white':'var(--text2)';g.style.borderRadius='50px';}
  if(i){i.style.background=tab!=='gasto'?'var(--primary)':'transparent';i.style.color=tab!=='gasto'?'white':'var(--text2)';i.style.borderRadius='50px';}
  // Update list in panel
  const list=document.getElementById('cat-panel-list');
  if(list)list.innerHTML=renderCatList(tab);
}
function renderCatList(tab){
  const allCats=S.categories.filter(cat=>cat.type===tab||cat.type==='transferencia');
  if(!allCats.length)return'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>';
  // For gastos tab: group by nature
  let html='';
  if(tab==='gasto'){
    const groups=[
      {key:'necesidades',label:'🏠 Necesidades',color:'#EF4444'},
      {key:'deseos',label:'🎯 Deseos',color:'#F59E0B'},
      {key:'ahorros',label:'💰 Ahorros',color:'#00D4AA'},
      {key:'transferencia',label:'↔️ Transferencias',color:'#6366F1'},
    ];
    groups.forEach(g=>{
      let cats;
      if(g.key==='transferencia') cats=S.categories.filter(c=>c.type==='transferencia');
      else cats=S.categories.filter(c=>c.type==='gasto'&&c.nature===g.key);
      if(!cats.length)return;
      html+=`<div style="font-size:11px;font-weight:700;color:${g.color};text-transform:uppercase;letter-spacing:.6px;padding:10px 0 4px;border-bottom:1px solid ${g.color}33;margin-bottom:6px">${g.label}</div>`;
      html+=cats.map(cat=>renderCatItem(cat)).join('');
    });
    return html||'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>';
  }
  // For ingresos: group by incomeType
  if(tab==='ingreso'){
    var grpInc=[
      {key:'principal',label:'⭐ Principal',color:'#00D4AA'},
      {key:'secundario',label:'➕ Secundario',color:'#8B5CF6'},
    ];
    var grouped='';
    grpInc.forEach(function(g){
      var cats=allCats.filter(function(cat){return cat.type==='ingreso'&&(g.key==='principal'?(!cat.incomeType||cat.incomeType==='principal'):cat.incomeType===g.key);});
      if(!cats.length)return;
      grouped+='<div style="font-size:11px;font-weight:700;color:'+g.color+';text-transform:uppercase;letter-spacing:.6px;padding:10px 0 4px;border-bottom:1px solid '+g.color+'33;margin-bottom:6px">'+g.label+'</div>';
      grouped+=cats.map(function(cat){return renderCatItem(cat);}).join('');
    });
    return grouped||'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>';
  }
  return allCats.map(cat=>renderCatItem(cat)).join('');
}
function renderCatItem(cat){
    const subs=S.subcategories.filter(s=>s.categoryId===cat.id);
    const typeBadge=cat.type==='ingreso'?'badge-success':cat.type==='gasto'?'badge-danger':'badge-info';
    const catDomId='catg-'+cat.id;
    return`<div class="cat-group" style="border-left:4px solid ${cat.color||'var(--border)'}">
      <div class="cat-group-header" onclick="toggleCatGroup('${catDomId}',this)" style="cursor:pointer">
        <div class="cat-group-left">
          <div style="width:38px;height:38px;border-radius:10px;background:${cat.color||'#64748B'}22;display:flex;align-items:center;justify-content:center;font-size:18px">${cat.icon}</div>
          <div>
            <div style="font-size:13px;font-weight:700">${cat.name}</div>
            <span class="badge ${typeBadge}" style="font-size:9px">${cat.type==='ingreso'?'Ingreso':cat.type==='gasto'?'Gasto':'Transf.'}</span>
            ${subs.length?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${subs.length} subcats</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-text" style="font-size:12px" onclick="event.stopPropagation();openModal('subcategory',{categoryId:'${cat.id}'})">+ Sub</button>
          <button class="btn-del" onclick="event.stopPropagation();deleteCat('${cat.id}')">🗑</button>
          <span class="cat-arrow" style="color:var(--text3);font-size:12px">▶</span>
        </div>
      </div>
      <div id="${catDomId}" class="hidden">
        ${subs.length?`<div class="subcat-list">${subs.map(s=>`<div class="subcat-item"><span>${s.icon} ${s.name}</span><div style="display:flex;gap:4px"><button class="btn-text" style="font-size:11px" onclick="openModal('editSubcategory',{id:'${s.id}'})">✏️</button><button class="btn-del" onclick="deleteSub('${s.id}')">✕</button></div></div>`).join('')}</div>`:''}
      </div>
    </div>`;
}
function renderCategorias(){
  return`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('category',{})">+ ${t('newCategory')||'Nueva categoría'}</button>
    </div>
    ${!S.categories.length?'<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin categorías</div></div>':
    S.categories.map(cat=>{
      const subs=S.subcategories.filter(s=>s.categoryId===cat.id);
      const typeBadge=cat.type==='ingreso'?'badge-success':cat.type==='gasto'?'badge-danger':'badge-info';
      const catDomId='catg-'+cat.id;
      return`<div class="cat-group" style="border-left:4px solid ${cat.color||'var(--border)'}">
        <div class="cat-group-header" onclick="toggleCatGroup('${catDomId}',this)" style="cursor:pointer">
          <div class="cat-group-left">
            <div style="width:38px;height:38px;border-radius:10px;background:${cat.color||'#64748B'}22;display:flex;align-items:center;justify-content:center;font-size:18px">${cat.icon}</div>
            <div>
              <div style="font-size:13px;font-weight:700">${cat.name}</div>
              <span class="badge ${typeBadge}" style="font-size:9px">${cat.type==='ingreso'?'Ingreso':cat.type==='gasto'?'Gasto':'Transf.'}</span>
              ${subs.length?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${subs.length} subcats</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn-text" style="font-size:12px" onclick="event.stopPropagation();openModal('subcategory',{categoryId:'${cat.id}'})">+ Sub</button>
            <button class="btn-del" onclick="event.stopPropagation();deleteCat('${cat.id}')">🗑</button>
            <span class="cat-arrow" style="color:var(--text3);font-size:12px">▶</span>
          </div>
        </div>
        <div id="${catDomId}" class="hidden">
          ${subs.length?`<div class="subcat-list">${subs.map(s=>`<div class="subcat-item"><span>${s.icon} ${s.name}</span><div style="display:flex;gap:4px"><button class="btn-text" style="font-size:11px" onclick="openModal('editSubcategory',{id:'${s.id}'})">✏️</button><button class="btn-del" onclick="deleteSub('${s.id}')">✕</button></div></div>`).join('')}</div>`:''}
        </div>
      </div>`;
    }).join('')}
  `;
}
function toggleCatGroup(id,header){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('hidden');
  const arrow=header.querySelector('.cat-arrow');
  if(arrow)arrow.textContent=el.classList.contains('hidden')?'▶':'▼';
}
function deleteCat(id){confirmDialog('🗑️','¿Eliminar categoría?','Se eliminarán sus subcategorías y los movimientos perderán la categoría.',()=>{S.categories=S.categories.filter(c=>c.id!==id);S.subcategories=S.subcategories.filter(s=>s.categoryId!==id);saveState();const cpnl=document.getElementById('cat-panel-list');if(cpnl)cpnl.innerHTML=renderCatList(S._catTab||'gasto');if(S.currentPage==='configuracion')renderPage('configuracion');else renderPage('categorias');toast('Eliminada');});}
function deleteSub(id){confirmDialog('🗑️','¿Eliminar subcategoría?','',()=>{S.subcategories=S.subcategories.filter(s=>s.id!==id);saveState();const cpnl=document.getElementById('cat-panel-list');if(cpnl)cpnl.innerHTML=renderCatList(S._catTab||'gasto');if(S.currentPage==='configuracion')renderPage('configuracion');else renderPage('categorias');toast('Eliminada');});}

function calcLoan(){
  const P=parseFloat(document.getElementById('loan-amount')?.value)||0;
  const r=parseFloat(document.getElementById('loan-rate')?.value)||0;
  const n=parseInt(document.getElementById('loan-months')?.value)||0;
  const res=document.getElementById('loan-result');
  if(!P||!r||!n){if(res)res.style.display='none';return;}
  const rm=r/100/12;
  const cuota=rm===0?P/n:P*rm*Math.pow(1+rm,n)/(Math.pow(1+rm,n)-1);
  const total=cuota*n;
  const interest=total-P;
  if(res)res.style.display='block';
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('loan-cuota',fmt(cuota));set('loan-total',fmt(total));
  set('loan-interest',fmt(interest));set('loan-cost-pct',Math.round(interest/P*100)+'%');
  // Amortization table — show first 12 rows + last row
  const tbody=document.getElementById('loan-table-body');
  const note=document.getElementById('loan-table-note');
  if(tbody){
    let bal=P;const rows=[];
    for(let i=1;i<=n;i++){
      const intAmt=bal*rm;const capAmt=cuota-intAmt;bal-=capAmt;

function downloadLoanTable(){
  const P=parseFloat(document.getElementById('loan-amount')?.value)||0;
  const r=parseFloat(document.getElementById('loan-rate')?.value)||0;
  const n=parseInt(document.getElementById('loan-months')?.value)||0;
  if(!P||!r||!n)return;
  const rm=r/100/12;
  const cuota=rm===0?P/n:P*rm*Math.pow(1+rm,n)/(Math.pow(1+rm,n)-1);
  let bal=P;let csv='Cuota,Monto Cuota,Capital,Interés,Saldo\n';
  for(let i=1;i<=n;i++){
    const intAmt=bal*rm;const capAmt=cuota-intAmt;bal=Math.max(0,bal-capAmt);
    csv+=`${i},${cuota.toFixed(2)},${capAmt.toFixed(2)},${intAmt.toFixed(2)},${bal.toFixed(2)}\n`;
  }
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='plan-pagos-prestamo.csv';a.click();
  toast('Plan descargado ✓');
}
function calcSim(){
  const monthly=parseFloat(document.getElementById('sim-monthly')?.value)||0;
  const years=parseInt(document.getElementById('sim-years')?.value)||0;
  const rate=parseFloat(document.getElementById('sim-rate')?.value)||0;
  const res=document.getElementById('sim-result');
  if(!monthly||!years){if(res)res.style.display='none';return;}
  const rm=rate/100/12;
  const n=years*12;
  const total=rm===0?monthly*n:monthly*(Math.pow(1+rm,n)-1)/rm*(1+rm);
  const invested=monthly*n;
  const gains=total-invested;
  if(res)res.style.display='block';
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('sim-total',fmt(total));set('sim-invested',fmt(invested));
  set('sim-gains',fmt(gains));set('sim-mult',total>0?(total/invested).toFixed(2)+'x':'—');
  // Yearly bars
  const barsEl=document.getElementById('sim-bars');
  if(barsEl){
    const yr=[];for(let y=1;y<=Math.min(years,12);y++){const nn=y*12;const v=rm===0?monthly*nn:monthly*(Math.pow(1+rm,nn)-1)/rm*(1+rm);yr.push(v);}
    const maxV=Math.max(...yr);
    const formatK=(v)=>{if(v>=1000000)return(v/1000000).toFixed(1)+'M';if(v>=1000)return(v/1000).toFixed(0)+'K';return v.toFixed(0);};
    barsEl.innerHTML=yr.map((v,i)=>{const h=Math.max(20,Math.round(v/maxV*85));return`<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:7px;font-weight:700;color:var(--text2);margin-bottom:2px;text-align:center;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis">${formatK(v)}</div><div style="width:100%;background:linear-gradient(to top,var(--primary),var(--secondary));border-radius:3px 3px 0 0;height:${h}px;opacity:${0.45+0.55*(i+1)/yr.length}"></div><div style="font-size:8px;color:var(--text3);margin-top:2px">${i+1}a</div></div>`;}).join('');
  }
}

function calcCambioRow(idx){
  if(!window._cambioRows)return;
  var row=window._cambioRows[idx];
  if(!row)return;
  var from=row.from;
  var to=row.to;
  var amount=parseFloat(document.getElementById('cambio-amount')?.value)||0;
  window._cambioAmount=amount;
  // Hide result if incomplete
  var resHidden=document.getElementById('cambio-result-hidden-'+idx);
  if(!amount||!from||!to){
    row.result=null;
    if(resHidden)resHidden.innerHTML='';
    // hide visible result if exists
    var vis=document.getElementById('cambio-formula-'+idx);
    if(vis&&vis.parentElement)vis.parentElement.style.display='none';
    return;
  }
  var rates=S.exchangeRate&&S.exchangeRate.rates?S.exchangeRate.rates:{};
  var rate=1;
  if(from===to){rate=1;}
  else if(rates[to]&&rates[from]){rate=rates[to]/rates[from];}
  else if(rates[to]&&!rates[from]){rate=rates[to];}
  else if(!rates[to]&&rates[from]){rate=1/rates[from];}
  var result=amount*rate;
  var fmeta=getCurrencyMeta(from);var tmeta=getCurrencyMeta(to);
  function fmtL(v,meta){return meta.pos==='before'?meta.sym+v.toLocaleString('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2}):v.toLocaleString('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2})+' '+meta.sym;}
  function showResult(res,rateStr,live){
    var suffix=live?' · open.er-api.com ✓':' · Estimado';
    // Try to update existing DOM elements first
    var fEl=document.getElementById('cambio-formula-'+idx);
    var oEl=document.getElementById('cambio-output-'+idx);
    var rEl=document.getElementById('cambio-rate-'+idx);
    if(fEl&&oEl&&rEl){
      fEl.parentElement.style.display='';
      fEl.textContent=fmtL(amount,fmeta)+' =';
      oEl.textContent=fmtL(res,tmeta);
      rEl.textContent='1 '+from+' = '+rateStr.toFixed(4)+' '+to+suffix;
    } else {
      // Build inline into hidden placeholder
      var ph=document.getElementById('cambio-result-hidden-'+idx);
      if(ph){
        ph.innerHTML='<div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-top:10px;text-align:center">'
          +'<div style="font-size:12px;color:var(--text2)" id="cambio-formula-'+idx+'">'+fmtL(amount,fmeta)+' =</div>'
          +'<div style="font-size:26px;font-weight:800;color:var(--primary);margin:6px 0" id="cambio-output-'+idx+'">'+fmtL(res,tmeta)+'</div>'
          +'<div style="font-size:11px;color:var(--text3)" id="cambio-rate-'+idx+'">1 '+from+' = '+rateStr.toFixed(4)+' '+to+suffix+'</div>'
          +'</div>';
      }
    }
    row.result={formula:fmtL(amount,fmeta)+' =',output:fmtL(res,tmeta),rate:'1 '+from+' = '+rateStr.toFixed(4)+' '+to+suffix};
  }
  showResult(result,rate,false);
  // Always fetch live rate directly with 'from' as base
  if(from!==to){
    fetch('https://open.er-api.com/v6/latest/'+from)
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.rates&&data.rates[to]){
          var lr=data.rates[to];
          showResult(amount*lr,lr,true);
        }
      }).catch(function(){});
  }
}

            +'<div style="padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="toggleCambioPick('+q+'cambio-pick-to-'+idx+q+','+q+'cambio-to-lbl-'+idx+q+')">'
              +'<span id="cambio-to-lbl-'+idx+'">'+toLabel+'</span>'
              +'<span style="color:var(--primary);font-size:9px">▼</span>'
            +'</div>'
            +'<div id="cambio-pick-to-'+idx+'" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--surface);border:1px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;box-shadow:0 6px 20px rgba(0,0,0,.25)">'
              +'<div style="padding:6px 8px;border-bottom:1px solid var(--border)"><input class="form-input" style="font-size:12px;padding:6px 10px" placeholder="Buscar moneda..." oninput="filterCambioPick('+q+'cambio-pick-to-'+idx+q+',this.value)"></div>'
              +'<div style="max-height:160px;overflow-y:auto" id="cambio-pick-to-'+idx+'-list">'+buildCambioPickItems(idx,'to',row.to)+'</div>'
            +'</div>'

}
function buildCambioPickItems(idx,side,selected){
  var q="'";
  var html='';
  ALL_CURRENCIES.forEach(function(cur){
    var meta=getCurrencyMeta(cur.code);
    var sel=cur.code===selected;
    html+='<div class="ppick-item" onclick="selectCambioCur('+q+idx+q+','+q+side+q+','+q+cur.code+q+')" data-val="'+cur.code+'" style="padding:10px 12px;cursor:pointer;background:'+(sel?'rgba(0,212,170,.12)':'')+';display:flex;align-items:center;gap:10px">'
      +'<input type="checkbox" '+(sel?'checked':'')+' disabled style="width:16px;height:16px;accent-color:var(--primary);flex-shrink:0;pointer-events:none">'
      +'<div style="flex:1">'
        +'<div style="font-size:14px;font-weight:700;color:'+(sel?'var(--primary)':'var(--text)')+'">'+cur.code+' <span style="color:var(--primary)">'+meta.sym+'</span></div>'
        +'<div style="font-size:11px;color:var(--text3)">'+cur.name+'</div>'
      +'</div>'
      +(sel?'<span style="color:var(--primary);font-size:16px">✓</span>':'')
      +'</div>';
  });
  return html;
}
function getCurName(code){
  var found=ALL_CURRENCIES.find(function(c){return c.code===code;});
  return found?found.name:code;
}
function toggleCambioPick(pickId,lblId){
  var el=document.getElementById(pickId);
  if(!el)return;
  var isOpen=el.style.display!=='none';
  // Close all other pickers first
  document.querySelectorAll('[id^="cambio-pick-"]').forEach(function(p){
    if(!p.id.endsWith('-list'))p.style.display='none';
  });
  el.style.display=isOpen?'none':'block';
  if(!isOpen){
    var inp=el.querySelector('input');
    if(inp){inp.value='';filterCambioPick(pickId,'');setTimeout(function(){inp.focus();},50);}
  }
}
function filterCambioPick(pickId,val){
  var listId=pickId+'-list';
  var list=document.getElementById(listId);
  if(!list)return;
  var v=val.toLowerCase();
  list.querySelectorAll('.ppick-item').forEach(function(item){
    if(!item.dataset.val){item.style.display='';return;}
    item.style.display=(item.textContent.toLowerCase().includes(v)||!v)?'':'none';
  });
}
function selectCambioCur(idx,side,code){
  idx=parseInt(idx);
  if(!window._cambioRows[idx])return;
  // Toggle: pressing already-selected deselects it
  if(window._cambioRows[idx][side]===code) code='';
  window._cambioRows[idx][side]=code;
  var pickId='cambio-pick-'+side+'-'+idx;
  var lblId='cambio-'+side+'-lbl-'+idx;
  var el=document.getElementById(pickId);
  var lbl=document.getElementById(lblId);
  if(el)el.style.display='none';
  if(lbl){
    if(code){lbl.innerHTML=buildCambioLblHtml(code);}
    else{lbl.innerHTML='<span style="font-size:14px;font-weight:600;color:var(--text3)">💱 Seleccionar</span>';}
  }
  calcCambioRow(idx);
}

// ESTRATEGIA DE DEUDAS

function calcEstrategia(){
  window._estrategiaExtra=document.getElementById('estrategia-extra')?.value||window._estrategiaExtra||'';
  window._estrategiaStart=document.getElementById('estrategia-start')?.value||window._estrategiaStart||'';
  var pg=document.getElementById('page-estrategia');
  if(pg)pg.innerHTML=renderEstrategia();
}
function setEstrategiaMetodo(m){
  window._estrategiaMetodo=m;
  // Persist inputs before re-render
  var ex=document.getElementById('estrategia-extra');
  var st=document.getElementById('estrategia-start');
  if(ex)window._estrategiaExtra=ex.value;
  if(st)window._estrategiaStart=st.value;
  var pg=document.getElementById('page-estrategia');
  if(pg)pg.innerHTML=renderEstrategia();
}
function renderEstrategia(){
  const debts=S.accounts.filter(a=>a.type==='pasivo'&&(a.currency||S.currency)===S.currency);
  if(!debts.length)return '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">¡Sin deudas!</div><div class="empty-desc">No tienes deudas registradas en '+S.currency+'</div></div>';

  const metodo=window._estrategiaMetodo||'';
  const extra=parseFloat((window._estrategiaExtra||'').toString().replace(/[^0-9.]/g,''))||0;
  const MESES_SHORT=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  var startStr=window._estrategiaStart||'';
  if(!startStr){var _n=new Date();startStr=_n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0');}
  var _sp=startStr.split('-').map(Number);
  var startY=_sp[0]||new Date().getFullYear();
  var startM=_sp[1]||new Date().getMonth()+1;

  function monthLabel(y,m,offset){var d=new Date(y,m-1+offset,1);return MESES_SHORT[d.getMonth()]+'-'+String(d.getFullYear()).slice(2);}

  const debtData=debts.map(function(a){
    var bal=Math.abs(getBalance(a.id));
    var rate=parseFloat(a.tae)||0;
    var monthly=parseFloat(a.monthlyPayment)||(bal*0.03);
    var r=rate/100/12;
    var cuotas=0;
    if(r>0&&monthly>r*bal&&bal>0){cuotas=Math.ceil(-Math.log(1-r*bal/monthly)/Math.log(1+r));}
    else if(monthly>0&&bal>0){cuotas=Math.ceil(bal/monthly);}
    var subtypeLabel=a.subtype==='tc'?'Tarjeta Crédito':a.subtype==='credito'?'Crédito libre':'Préstamo';
    var bk=getBank(a.bankEntity,a.currency||S.currency);
    var color=(bk?bk.color:null)||a.color||'#64748B';
    return{id:a.id,name:a.name,balance:bal,rate:rate,monthly:monthly,cuotas:cuotas,subtypeLabel:subtypeLabel,color:color};
  }).filter(function(d){return d.balance>0;});

  if(!debtData.length)return '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Todas las deudas están saldadas</div></div>';

  var avalanche=[].concat(debtData).sort(function(a,b){return b.rate-a.rate;});
  var snowball=[].concat(debtData).sort(function(a,b){return a.balance-b.balance;});
  var ordered=metodo==='nieve'?snowball:avalanche; // default avalanche for calc even if not shown
  var mColor=metodo==='nieve'?'#7461EF':'var(--primary)';

  function simulate(ord, extraAmt){
    var xAmt=extraAmt||0;
    var ds=ord.map(function(d){return{id:d.id,bal:d.balance,monthly:d.monthly,rate:d.rate};});
    var months=0;var totalInt=0;var payoffMonth={};
    while(ds.some(function(d){return d.bal>0;})&&months<600){
      months++;
      var freed=xAmt;
      ds.forEach(function(d){
        if(d.bal<=0)return;
        var intAmt=d.bal*(d.rate/100/12);
        var minPay=Math.min(d.bal+intAmt,d.monthly);
        var capital=Math.max(0,minPay-intAmt);
        totalInt+=intAmt;
        d.bal=Math.max(0,d.bal-capital);
        if(d.bal<=0){payoffMonth[d.id]=months;freed+=d.monthly;}
      });
      for(var i=0;i<ds.length;i++){
        var d=ds[i];
        if(d.bal>0&&freed>0){
          var apply=Math.min(freed,d.bal);
          freed-=apply;d.bal-=apply;
          if(d.bal<=0){payoffMonth[d.id]=months;freed+=d.monthly;}
        }
      }
    }
    return{months:months,totalInt:totalInt,payoffMonth:payoffMonth};
  }

  // Simulate: main method with extra, alt method with extra, main method WITHOUT extra (for extraTip)
  var rMain=simulate(ordered, extra);
  var rAlt=simulate(metodo==='avalancha'?snowball:avalanche, extra);
  var rBase=extra>0?simulate(ordered, 0):null; // baseline without extra payment
  var interestSavings=Math.abs(rMain.totalInt-rAlt.totalInt);
  var vsMonths=Math.abs(rMain.months-rAlt.months);         // diff between methods
  var extraMonthSaved=rBase?Math.max(0,rBase.months-rMain.months):0; // months saved by extra
  var extraIntSaved=rBase?Math.max(0,rBase.totalInt-rMain.totalInt):0;
  var isBetter=rMain.totalInt<=rAlt.totalInt;

  // ── Amortization table (Excel-style) ──
  var tableHtml='';
  if(rMain.months>0&&rMain.months<=120){
    // Re-simulate collecting monthly snapshots
    var tDs=ordered.map(function(d){return{id:d.id,name:d.name,bal:d.balance,monthly:d.monthly,rate:d.rate,color:d.color};});
    var tMonths=0;var tRows=[];
    while(tDs.some(function(d){return d.bal>0;})&&tMonths<120){
      tMonths++;
      var freed=extra;var rowTotalPay=0;var rowTotalInt=0;var cells=[];
      tDs.forEach(function(d){
        if(d.bal<=0){cells.push({pay:0,int:0,bal:0,done:true});return;}
        var intAmt=d.bal*(d.rate/100/12);
        var minPay=Math.min(d.bal+intAmt,d.monthly);
        var capital=Math.max(0,minPay-intAmt);
        var actualPay=Math.min(minPay,d.bal+intAmt);
        rowTotalInt+=intAmt;rowTotalPay+=actualPay;
        d.bal=Math.max(0,d.bal-capital);
        if(d.bal<=0)freed+=d.monthly;
        cells.push({pay:actualPay,int:intAmt,bal:d.bal,done:d.bal<=0});
      });
      // Apply freed to first active
      for(var ti=0;ti<tDs.length;ti++){
        var td=tDs[ti];
        if(td.bal>0&&freed>0){
          var tapply=Math.min(freed,td.bal);
          freed-=tapply;td.bal-=tapply;rowTotalPay+=tapply;
          if(td.bal<=0){cells[ti].done=true;freed+=td.monthly;}
          cells[ti].bal=td.bal;
        }
      }
      tRows.push({month:tMonths,cells:cells,totalPay:rowTotalPay,totalInt:rowTotalInt});
    }

    // Build table HTML
    var tHead='<tr style="background:var(--surface3)">'
      +'<th style="padding:7px 10px;font-size:10px;font-weight:700;color:var(--text3);text-align:left;white-space:nowrap;position:sticky;left:0;background:var(--surface3);z-index:2;min-width:52px">MES</th>';
    ordered.forEach(function(d){
      tHead+='<th style="padding:7px 8px;font-size:10px;font-weight:700;color:'+d.color+';text-align:right;white-space:nowrap;min-width:90px;border-left:1px solid var(--border)">'+d.name+'</th>';
    });
    tHead+='<th style="padding:7px 8px;font-size:10px;font-weight:700;color:var(--text3);text-align:right;white-space:nowrap;min-width:80px;border-left:2px solid var(--border)">TOTAL</th></tr>';

    var tBody='';
    tRows.forEach(function(r){
      var isLast=r.month===rMain.months;
      var rowBg=isLast?'background:rgba(0,212,170,.08)':'';
      tBody+='<tr style="border-bottom:1px solid var(--border);'+rowBg+'">'
        +'<td style="padding:6px 10px;font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;position:sticky;left:0;background:'+(isLast?'rgba(0,212,170,.1)':'var(--surface)')+';z-index:1">'+monthLabel(startY,startM,r.month-1)+'</td>';
      r.cells.forEach(function(c){
        if(c.done&&c.pay===0){
          tBody+='<td style="padding:6px 8px;text-align:center;border-left:1px solid var(--border)"><span style="font-size:14px">✅</span></td>';
        } else {
          tBody+='<td style="padding:6px 8px;text-align:right;border-left:1px solid var(--border)">'
            +'<div style="font-size:11px;font-weight:700;color:var(--text)">'+fmt(c.pay)+'</div>'
            +'<div style="font-size:9px;color:var(--text3)">int: '+fmt(c.int)+'</div>'
            +'<div style="font-size:9px;color:var(--danger)">saldo: '+fmt(c.bal)+'</div>'
          +'</td>';
        }
      });
      tBody+='<td style="padding:6px 8px;text-align:right;font-size:11px;font-weight:700;border-left:2px solid var(--border);color:'+(isLast?'var(--success)':'var(--text)')+'">'+fmt(r.totalPay)+'</td>'
      +'</tr>';
    });

    tableHtml='<div class="card" style="margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:4px">📊 Tabla de amortización</div>'
      +'<div style="font-size:11px;color:var(--text2);margin-bottom:12px">Pago · Interés · Saldo por mes</div>'
      +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border)">'
        +'<table style="width:100%;border-collapse:collapse;font-family:var(--font)">'
          +'<thead>'+tHead+'</thead>'
          +'<tbody>'+tBody+'</tbody>'
        +'</table>'
      +'</div>'
    +'</div>';
  }

  var endDate=new Date(startY,startM-1+rMain.months,1);
  var endMonthStr=endDate.toLocaleString('es',{month:'short',year:'numeric'});
  var totalDebt=debtData.reduce(function(s,d){return s+d.balance;},0);
  var totalMonthly=debtData.reduce(function(s,d){return s+d.monthly;},0);
  var allRatesZero=debtData.every(function(d){return d.rate===0;});

  // ── Debt rows ──
  var debtRows='';
  debtData.forEach(function(d){
    debtRows+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">'
      +'<div style="width:10px;height:44px;border-radius:4px;background:'+d.color+';flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+d.name+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">'+d.subtypeLabel+'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;text-align:right;flex-shrink:0">'
        +'<div><div style="font-size:9px;color:var(--text3)">SALDO</div><div style="font-size:12px;font-weight:700;color:var(--danger)">'+fmt(d.balance)+'</div></div>'
        +'<div><div style="font-size:9px;color:var(--text3)">CUOTAS</div><div style="font-size:12px;font-weight:700">'+(d.cuotas>0?d.cuotas:'—')+'</div></div>'
        +'<div><div style="font-size:9px;color:var(--text3)">TASA</div><div style="font-size:12px;font-weight:700;color:var(--warning)">'+(d.rate>0?d.rate+'%':'—')+'</div></div>'
        +'<div><div style="font-size:9px;color:var(--text3)">CUOTA MÍN.</div><div style="font-size:12px;font-weight:700;color:var(--text2)">'+fmt(d.monthly)+'</div></div>'
      +'</div>'
    +'</div>';
  });

  // ── Order rows ──
  var orderRows='';
  ordered.forEach(function(d,i){
    orderRows+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:'+mColor+';color:white;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>'
      +'<div style="flex:1">'
        +'<div style="font-size:13px;font-weight:700">'+d.name+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+d.subtypeLabel+'</div>'
      +'</div>'
      +'<div style="text-align:right">'
        +'<div style="font-size:12px;font-weight:700;color:var(--warning)">'+(d.rate>0?d.rate+'% anual':'Sin tasa')+'</div>'
        +'<div style="font-size:12px;color:var(--danger);font-weight:600">'+fmt(d.balance)+'</div>'
      +'</div>'
    +'</div>';
  });

  // ── Gantt ──
  var ganttHtml='';
  var totalMonths=rMain.months;
  if(totalMonths>0&&totalMonths<=120){
    // Simple start/end header instead of overcrowded axis
    var axis='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<div style="width:90px;flex-shrink:0"></div>'
      +'<div style="flex:1;display:flex;justify-content:space-between">'
        +'<span style="font-size:10px;color:var(--text3);font-weight:600">▶ '+monthLabel(startY,startM,0)+'</span>'
        +'<span style="font-size:10px;color:var(--success);font-weight:600">'+monthLabel(startY,startM,totalMonths-1)+' 🏁</span>'
      +'</div>'
      +'<div style="width:40px;flex-shrink:0"></div>'
    +'</div>';
    var bars='';
    ordered.forEach(function(d){
      var payoff=rMain.payoffMonth[d.id]||totalMonths;
      var pctWidth=(payoff/totalMonths*100).toFixed(1);
      bars+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
        +'<div style="width:90px;font-size:10px;color:var(--text2);flex-shrink:0;text-align:right;line-height:1.2;padding-right:4px">'+d.name+'</div>'
        +'<div style="flex:1;height:22px;background:var(--surface3);border-radius:5px;position:relative;overflow:hidden">'
          +'<div style="position:absolute;left:0;width:'+pctWidth+'%;height:100%;background:'+d.color+';border-radius:5px;opacity:.85;display:flex;align-items:center;justify-content:center">'
            +(payoff>=3?'<span style="font-size:9px;color:white;font-weight:700;padding:0 4px">'+payoff+'m</span>':'')
          +'</div>'
        +'</div>'
        +'<div style="width:40px;font-size:10px;color:var(--text3);flex-shrink:0">'+monthLabel(startY,startM,payoff-1)+'</div>'
      +'</div>';
    });
    var legend='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px">';
    ordered.forEach(function(d){
      legend+='<div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:'+d.color+'"></div><span style="font-size:10px;color:var(--text2)">'+d.name+'</span></div>';
    });
    legend+='</div>';
    ganttHtml='<div class="card" style="margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:14px">📊 Plan de pago visual</div>'
      +axis+bars+legend
    +'</div>';
  }

  var ratesWarning=allRatesZero
    ?'<div style="background:rgba(245,158,11,.1);border-left:3px solid var(--warning);border-radius:4px;padding:9px 12px;font-size:12px;color:var(--text2);margin-bottom:14px">⚠️ <strong>Sin tasas de interés:</strong> edita cada deuda y agrega el % TAE para resultados precisos.</div>'
    :'';
  var extraTip=extra>0
    ?'<div style="background:rgba(0,212,170,.08);border-left:3px solid var(--primary);border-radius:4px;padding:9px 12px;font-size:12px;color:var(--text2);margin-bottom:12px">💡 Con el abono extra de <strong style="color:var(--primary)">'+fmt(extra)+'/mes</strong> terminas <strong style="color:var(--primary)">'+extraMonthSaved+'</strong> mes'+(extraMonthSaved===1?'':'es')+' antes y ahorras <strong style="color:var(--success)">'+fmt(extraIntSaved)+'</strong> en intereses.</div>'
    :'';

  return ratesWarning
    // 1 METHOD SELECTOR
    +'<div class="card" style="margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:4px">¿Bajo qué método quieres atacar tus deudas?</div>'
      +'<div style="font-size:11px;color:var(--text2);margin-bottom:12px">Elige una estrategia para ver tu plan personalizado</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'

        +'</button>'
        +'<button onclick="setEstrategiaMetodo(\'nieve\')" style="padding:14px 8px;border-radius:12px;border:2px solid '+(metodo==='nieve'?'#7461EF':'var(--border)')+';background:'+(metodo==='nieve'?'rgba(116,97,239,.12)':'var(--surface2)')+';color:'+(metodo==='nieve'?'#7461EF':'var(--text)')+';cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;text-align:center;line-height:1.5">'
          +'❄️ Bola de nieve<br><span style="font-size:10px;font-weight:400;opacity:.7">Menor saldo primero</span>'
        +'</button>'
      +'</div>'
    +'</div>'
    // 1b EXPLANATION — solo cuando hay método seleccionado
    +(metodo
      ?'<div style="background:'+(metodo==='avalancha'?'rgba(0,212,170,.07)':'rgba(116,97,239,.07)')+';border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid '+(metodo==='avalancha'?'var(--primary)':'#7461EF')+'33">'
          +'<div style="font-size:22px;margin-bottom:6px">'+(metodo==='avalancha'?'🌊':'❄️')+'</div>'
          +'<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:'+(metodo==='avalancha'?'var(--primary)':'#7461EF')+'">'+(metodo==='avalancha'?'Método Avalancha':'Método Bola de nieve')+'</div>'
          +(metodo==='avalancha'
            ?'<div style="font-size:12px;color:var(--text2);line-height:1.6">Pagas primero la deuda con la <strong>tasa de interés más alta</strong>. Una vez la liquidas, ese dinero lo atacas a la siguiente. Matemáticamente es la estrategia más eficiente: pagarás <strong>menos intereses en total</strong> y terminarás antes. Ideal si eres disciplinado y buscas el menor costo financiero posible.</div>'
            :'<div style="font-size:12px;color:var(--text2);line-height:1.6">Pagas primero la deuda con el <strong>saldo más pequeño</strong>. Al verla desaparecer rápido, obtienes una victoria psicológica que te mantiene motivado. La cuota liberada se suma al ataque de la siguiente deuda — como una bola de nieve que crece. Ideal si necesitas motivación y ver resultados rápido.</div>'
          )
        +'</div>'
      :'')
    // 2 DEBT LIST (siempre visible)
    +'<div class="card" style="margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:4px">📋 Listado de deudas</div>'

    +(metodo?(

          +'</div>'
        +'</div>'
        +extraTip
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
          +'<div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center">'
            +'<div style="font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.5px">TERMINARÍAS EN</div>'
            +'<div style="font-size:26px;font-weight:800;color:'+mColor+'">'+rMain.months+'</div>'

            +'<div style="font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.5px">MES FINAL</div>'

            +'<div style="font-size:9px;color:var(--text3);margin-top:2px">costo total del crédito</div>'

          +'<div style="background:'+(isBetter?'rgba(0,212,170,.1)':'rgba(239,68,68,.08)')+';border-radius:10px;padding:12px;text-align:center;border:1px solid '+(isBetter?'var(--primary)':'var(--danger)')+'33">'

            +'<div style="font-size:9px;color:'+(isBetter?'var(--success)':'var(--danger)')+';margin-top:2px">'+vsMonths+'m '+(isBetter?'más rápido con este método':'más lento con este método')+'</div>'
          +'</div>'
        +'</div>'
      +'</div>'
      // 5 GANTT
      +ganttHtml
      // 6 AMORTIZATION TABLE
      +tableHtml
    ):'');
}

function saveProfile(){
  if(!S.profile)S.profile={};
  const g=(id)=>document.getElementById(id)?.value||'';
  // Required field validation
  const reqName=g('cfg-name').trim();
  const reqEmail=g('cfg-email').trim();
  const reqPhone=g('cfg-phone').trim();
  const reqCountry=g('cfg-country').trim();
  const reqResidence=g('cfg-residence').trim();
  const reqGoal=g('cfg-goal').trim();
  if(!reqName){toast('⚠️ El nombre es obligatorio');document.getElementById('cfg-name')?.focus();return;}
  if(!reqEmail){toast('⚠️ El correo es obligatorio');document.getElementById('cfg-email')?.focus();return;}
  if(!reqPhone){toast('⚠️ El teléfono es obligatorio');document.getElementById('cfg-phone')?.focus();return;}
  if(!reqCountry){toast('⚠️ El país de origen es obligatorio');return;}
  if(!reqResidence){toast('⚠️ El país de residencia es obligatorio');return;}
  if(!reqGoal){toast('⚠️ El objetivo financiero es obligatorio');return;}
  S.profile.name=g('cfg-name');S.profile.email=g('cfg-email');
  S.profile.birthdate=g('cfg-birthdate');
  S.profile.phone=g('cfg-phone');S.profile.phoneCode=g('cfg-phone-code');
  S.profile.country=g('cfg-country');
  S.profile.residence=g('cfg-residence');
  S.profile.occupation=g('cfg-occupation');S.profile.marital=g('cfg-marital');
  S.profile.marital=g('cfg-marital');S.profile.financialGoal=g('cfg-goal');
  // Auto-set currencies based on countries
  const countryCurrency = COUNTRY_DATA ? Object.fromEntries(Object.entries(COUNTRY_DATA).map(([k,v])=>[k,v.cur])) : {};
  const originCur = countryCurrency[S.profile.country] || '';
  const residenceCur = countryCurrency[S.profile.residence] || '';
  const newCurs = [];
  // Residence currency is primary (first)
  if(residenceCur && Object.keys(CURRENCY_META).includes(residenceCur)) newCurs.push(residenceCur);
  if(originCur && originCur !== residenceCur && Object.keys(CURRENCY_META).includes(originCur)) newCurs.push(originCur);
  // Limit to 2, keep existing if countries not mapped
  if(newCurs.length > 0){
    S.currencies = newCurs.slice(0,2);
    S.currency = newCurs[0];
    refreshCurrencyToggle();
  }
  saveState();updateDrawerProfile();
  toast('Perfil guardado ✓');
  closeProfilePage();
}

    case'filterMovimientos':return drag+buildFilterModal();

    case'debtPayment':return drag+buildDebtPaymentModal(data);
    case'subAccount':{const parentAcc=S.accounts.find(a=>a.id===data.parentId);if(parentAcc&&(parentAcc.protected||parentAcc.subtype==='efectivo')){toast('Esta cuenta no puede tener bolsillos');return'';}return drag+buildSubAccountModal(data);}
    default:return drag+'<div class="modal-body">Sin contenido</div>';
  }
}

function checkTcAccount(accId,txType){
  const acc=getAcc(accId);

function setTxType(t){
  document.getElementById('tx-type').value=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  const map={gasto:'exp',ingreso:'inc',transferencia:'tra'};
  document.querySelector('.type-btn.'+map[t])?.classList.add('active');
  document.getElementById('tx-fields-normal').classList.toggle('hidden',t==='transferencia');
  document.getElementById('tx-fields-transfer').classList.toggle('hidden',t!=='transferencia');
  const catSel=document.getElementById('tx-cat');
  if(catSel)catSel.innerHTML=catOptions(t==='transferencia'?'':t);

function updateTxAccountsByCur(cur){
  const acc=document.getElementById('tx-account');
  const from=document.getElementById('tx-from-acc');
  const to=document.getElementById('tx-to-acc');
  const opts=accountOptionsByCur(cur,'');
  if(acc)acc.innerHTML=opts;
  if(from)from.innerHTML=opts;
  if(to)to.innerHTML=opts;
  const grp=document.getElementById('tx-installments-group');
  if(grp)grp.classList.add('hidden');

let _savingTx=false;
function saveTx(){
  if(_savingTx)return;_savingTx=true;setTimeout(()=>_savingTx=false,2000);
  const type=document.getElementById('tx-type')?.value;
  const amount=parseFloat(document.getElementById('tx-amount')?.value);
  const date=document.getElementById('tx-date')?.value;
  if(!amount||amount<=0){_savingTx=false;toast('Ingresa un monto válido');return;}
  if(!date){_savingTx=false;toast('Selecciona una fecha');return;}
  const id=document.getElementById('tx-id')?.value;
  const existing=id?S.transactions.find(t=>t.id===id):null;
  const tx={id:existing?existing.id:uid(),type,amount,currency:document.getElementById('tx-currency')?.value||S.currency,date,description:document.getElementById('tx-desc')?.value||''};
  if(type==='transferencia'){
    tx.accountId=resolveAccId(document.getElementById('tx-from-acc')?.value||'');
    tx.toAccountId=resolveAccId(document.getElementById('tx-to-acc')?.value||'');
    if(!tx.accountId||!tx.toAccountId){toast('Selecciona ambas cuentas');return;}
    if(tx.accountId===tx.toAccountId){toast('Las cuentas deben ser diferentes');return;}
  }else{
    tx.accountId=resolveAccId(document.getElementById('tx-account')?.value||'');
    tx.categoryId=document.getElementById('tx-cat')?.value||'';
    tx.subcategoryId=document.getElementById('tx-sub')?.value||'';
    tx.paymentMethod=document.getElementById('tx-payment')?.value||'';
    const acc=getAcc(tx.accountId);
    if(acc&&acc.subtype==='tc'&&type==='gasto'){
      const inst=parseInt(document.getElementById('tx-installments')?.value)||1;
      if(inst>1)tx.installments=inst;
    }
  }
  if(existing){const idx=S.transactions.findIndex(t=>t.id===id);S.transactions[idx]=tx;toast('Actualizado ✓');}
  else{S.transactions.push(tx);toast('Registrado ✓');}
  saveState();closeModal();renderPage(S.currentPage);
}
function editTx(id){
  openModal('transaction',{id:id});
}
function deleteTx(id){
  confirmDialog('🗑️','¿Eliminar movimiento?','Esta acción no se puede deshacer.',()=>{
    const tx=S.transactions.find(t=>t.id===id);
    if(tx){
      // If this transaction was a goal savings deposit, reduce goal.current
      if(tx.type==='ingreso'&&tx.description&&tx.description.startsWith('Ahorro:')){
        const gName=tx.description.replace('Ahorro:','').trim();
        const g=S.goals.find(g=>g.name===gName||(tx.description&&tx.description.includes(g.name)));
        if(g)g.current=Math.max(0,(parseFloat(g.current)||0)-(parseFloat(tx.amount)||0));
      }
      if(tx.type==='gasto'&&tx.description&&tx.description.startsWith('Ahorro →')){
        const gName=tx.description.replace('Ahorro →','').trim();
        const g=S.goals.find(g=>g.name===gName);
        if(g)g.current=Math.max(0,(parseFloat(g.current)||0)-(parseFloat(tx.amount)||0));
      }
    }
    S.transactions=S.transactions.filter(t=>t.id!==id);
    saveState();closeModal();renderPage(S.currentPage);toast('Eliminado');
  });
}

// ─── BALANCE DISTRIBUTION MODAL ───
function buildBalanceDistModal(){
  const cur=S.currency;
  const accs=S.accounts.filter(a=>a.type==='activo'&&(a.currency||cur)===cur);
  // Total disponible = balance total - lo ahorrado en metas
  const totalGoalSaved=S.goals.filter(g=>(g.currency||cur)===cur).reduce((s,g)=>s+(parseFloat(g.current)||0),0);
  const totalBal=accs.reduce((s,a)=>s+Math.max(0,getBalance(a.id)),0);
  const totalDisp=Math.max(0,totalBal-totalGoalSaved);

  // For each account, calculate its "available" portion
  // Strategy: subtract goal savings proportionally from accounts,
  // but simpler: show each account balance minus its share of goal savings
  // Actually simplest & most correct: show each account's real balance,
  // but label the total as "Disponible" and note that savings are excluded.
  // The disponible value is totalBal - totalGoalSaved.
  // We show accounts at their real balances but the total shown = disponible.

  const sorted=[...accs].map(a=>({...a,bal:Math.max(0,getBalance(a.id))}))
    .sort((a,b)=>b.bal-a.bal)
    .filter(a=>a.bal>0);

  // Build goal savings note
  const goalsNote=totalGoalSaved>0?
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);opacity:.7">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0"></div>
        <div style="font-size:13px;font-weight:600;color:var(--text2)">🎯 Ahorrado en metas</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:700;color:var(--primary)">−${fmt(totalGoalSaved,cur)}</div>
        <div style="font-size:11px;color:var(--text3)">no disponible</div>
      </div>
    </div>`:'';

  let donutPaths='',listItems='';let offset=0;
  const r=54,cx=64,cy=64,circ=2*Math.PI*r;

  // If there are goal savings, add them as a "locked" segment in the donut
  if(totalGoalSaved>0&&totalBal>0){
    const goalPct=Math.min(1,totalGoalSaved/totalBal);
    const goalDash=goalPct*circ;
    donutPaths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--primary)" stroke-width="20" stroke-dasharray="${goalDash} ${circ-goalDash}" stroke-dashoffset="0" stroke-opacity="0.3" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=goalDash;
  }

  sorted.forEach((a,i)=>{
    const pct=totalBal>0?a.bal/totalBal:0;const dash=pct*circ;
    const b=getBank(a.bankEntity,a.currency||cur);
    const color=b?b.color:COLORS_PALETTE[i%COLORS_PALETTE.length];
    donutPaths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="20" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=dash;
    // Show % of disponible, not of total
    const pctDisp=totalDisp>0?Math.round(a.bal/totalBal*(totalDisp>0?totalBal/totalDisp:1)*100):0;
    listItems+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
      ${bankBadge(a.bankEntity,a.currency||cur,36)}
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${a.name}</div></div>
      <div style="text-align:right"><div style="font-size:14px;font-weight:700">${fmt(a.bal,a.currency||cur)}</div><div style="font-size:11px;color:var(--text2)">${totalBal>0?Math.round(a.bal/totalBal*100):0}%</div></div>
    </div>`;
  });

  return`<div class="modal-header"><div class="modal-title">💎 Total disponible</div><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div style="text-align:center;margin-bottom:12px">
      <svg width="128" height="128" viewBox="0 0 128 128" style="display:block;margin:0 auto">
        <circle cx="64" cy="64" r="54" fill="none" stroke="var(--surface3)" stroke-width="20"/>
        ${donutPaths}
        <text x="64" y="58" text-anchor="middle" fill="var(--text2)" font-size="9">Disponible</text>
        <text x="64" y="74" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="bold">${fmt(totalDisp,cur)}</text>
      </svg>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">Balance: ${fmt(totalBal,cur)} · Ahorrado: ${fmt(totalGoalSaved,cur)}</div>
    </div>
    ${goalsNote}
    ${listItems||'<div style="color:var(--text2);font-size:13px;text-align:center;padding:16px">Sin cuentas activas con saldo</div>'}
  </div>`;
}

      ℹ️ Se creará: <strong>1 gasto</strong> en la cuenta origen y <strong>1 ingreso</strong> en la cuenta de deuda para reflejar la reducción del saldo.
    </div>

// Helper: find category by name or fallback
function getAutoCategory(prefName,prefType){
  return S.categories.find(c=>c.name===prefName)
    ||S.categories.find(c=>c.type===prefType)
    ||S.categories[0]||null;
}
function getAutoSubcategory(catId,prefName){
  return S.subcategories.find(s=>s.categoryId===catId&&s.name===prefName)||null;
}

function saveDebtPayment(){
  const debtId=document.getElementById('dp-debt-id')?.value;
  const amount=parseFloat(document.getElementById('dp-amount')?.value);
  const fromAccId=resolveAccId(document.getElementById('dp-from-acc')?.value);
  const date=document.getElementById('dp-date')?.value;
  if(!amount||amount<=0){toast('Ingresa un monto válido');return;}
  if(!fromAccId){toast('Selecciona la cuenta origen');return;}
  const debtAcc=S.accounts.find(a=>a.id===debtId);if(!debtAcc)return;
  const cur=debtAcc.currency||S.currency;
  // Auto-assign category: look for "Hogar" or any gasto cat with "deuda"/"pago" in name, fallback to first gasto
  const payCat=S.categories.find(c=>c.name==='Pagos')||S.categories.find(c=>c.name==='Hogar')||getAutoCategory('','gasto');
  const paySub=payCat?getAutoSubcategory(payCat.id,'Deudas')||getAutoSubcategory(payCat.id,'Pagos')||null:null;
  // Gasto en cuenta origen (sale dinero del activo)
  S.transactions.push({id:uid(),type:'gasto',accountId:fromAccId,categoryId:payCat?payCat.id:'',subcategoryId:paySub?paySub.id:'',amount,currency:cur,date,description:'Pago deuda: '+debtAcc.name,paymentMethod:''});
  // Ingreso en cuenta pasiva (reduce la deuda)
  S.transactions.push({id:uid(),type:'ingreso',accountId:debtId,categoryId:payCat?payCat.id:'',subcategoryId:paySub?paySub.id:'',amount,currency:cur,date,description:'Abono: '+debtAcc.name,paymentMethod:''});
  saveState();closeModal();renderPage('deudas');toast(`Pago de ${fmt(amount,cur)} registrado ✓`);
}

function saveAddToGoal(){
  const goalId=document.getElementById('atg-goal-id')?.value;
  const amount=parseFloat(document.getElementById('atg-amount')?.value);
  const date=document.getElementById('atg-date')?.value;
  const fromAccId=resolveAccId(document.getElementById('atg-from-account')?.value);
  const toAccId=resolveAccId(document.getElementById('atg-to-account')?.value);
  if(!amount||amount<=0){toast('Ingresa un monto válido');return;}
  if(!date){toast('Selecciona una fecha');return;}
  if(!fromAccId){toast('Selecciona cuenta origen');return;}
  if(!toAccId){toast('Selecciona cuenta destino');return;}
  if(fromAccId===toAccId){toast('Las cuentas deben ser diferentes');return;}
  const g=S.goals.find(x=>x.id===goalId);if(!g)return;
  const cur=g.currency||S.currency;
  // Use goal's preset category, or fall back to atg-cat selector
  const catId=(g.categoryId)||document.getElementById('atg-cat')?.value||getAutoCategory('Ahorros','gasto')?.id||'';
  const subId=(g.subcategoryId)||document.getElementById('atg-sub')?.value||'';
  const payMethod=document.getElementById('atg-payment')?.value||'';
  S.transactions.push({id:uid(),type:'gasto',accountId:fromAccId,categoryId:catId,subcategoryId:subId,amount,currency:cur,date,description:'Ahorro → '+g.name,paymentMethod:payMethod});
  S.transactions.push({id:uid(),type:'ingreso',accountId:toAccId,categoryId:catId,subcategoryId:subId,amount,currency:cur,date,description:'Ahorro: '+g.name,paymentMethod:payMethod});
  g.current=(parseFloat(g.current)||0)+amount;
  saveState();closeModal();renderPage('metas');

}

function toggleAccCard(cardId,event){
  // Don't toggle if clicking inside actions panel or on a button
  if(event&&(event.target.tagName==='BUTTON'||event.target.tagName==='SELECT'||event.target.closest('#'+cardId+'-actions')))return;
  const el=document.getElementById(cardId+'-actions');
  if(!el)return;
  const isOpen=el.style.display==='block';
  document.querySelectorAll('[id$="-actions"]').forEach(e=>e.style.display='none');
  if(!isOpen)el.style.display='block';
}
function getAccIcon(a){
  if(!a)return '💳';
  if(a.id&&a.id.startsWith('efectivo-')||a.subtype==='efectivo')return '💵';
  if(a.subtype==='digital')return '📱';
  if(a.subtype==='inversion')return '📈';
  if(a.subtype==='tc')return '💳';
  if(a.subtype==='credito')return '💰';
  if(a.subtype==='prestamo')return '🏦';
  if(a.type==='activo')return '🏦';
  return '💸';
}
function accountOptionsByCur(cur,selectedId){
  const accs=S.accounts.filter(a=>(a.currency||S.currency)===cur);
  let opts='<option value="">Seleccionar cuenta</option>';
  accs.forEach(a=>{
    const icon=getAccIcon(a);
    opts+=`<option value="${a.id}" ${a.id===selectedId?'selected':''}>${icon} ${a.name}</option>`;
    if(a.type==='activo'&&a.subAccounts&&a.subAccounts.length){
      a.subAccounts.forEach(sb=>{
        const key=a.id+'|'+sb.id;
        opts+=`<option value="${key}" ${key===selectedId?'selected':''}>&nbsp;&nbsp;↳ ${sb.icon||'🐷'} ${sb.name} (${a.name})</option>`;
      });
    }
  });
  return opts;
}
function toggleAutoPayment(){
  const el=document.getElementById('auto-toggle');const h=document.getElementById('pay-is-auto');
  if(!el||!h)return;
  const isOn=h.value==='1';h.value=isOn?'0':'1';
  el.style.background=isOn?'var(--surface3)':'var(--primary)';
  el.querySelector('div').style.left=isOn?'3px':'23px';
}
function savePayment(){
  const name=document.getElementById('pay-name')?.value?.trim();const amount=parseFloat(document.getElementById('pay-amount')?.value);const nextDate=document.getElementById('pay-next')?.value;
  if(!name){toast('Ingresa un nombre');return;}if(!amount||amount<=0){toast('Ingresa un monto válido');return;}if(!nextDate){toast('Selecciona fecha');return;}
  const id=document.getElementById('pay-id')?.value;const existing=id?S.scheduledPayments.find(p=>p.id===id):null;
  const pay={id:existing?existing.id:uid(),name,amount,currency:document.getElementById('pay-currency')?.value||S.currency,categoryId:document.getElementById('pay-cat')?.value||'',subcategoryId:document.getElementById('pay-sub')?.value||'',frequency:document.getElementById('pay-freq')?.value||'Mensual',nextDate,accountId:document.getElementById('pay-account')?.value||'',isAuto:document.getElementById('pay-is-auto')?.value==='1',color:document.getElementById('pay-color-val')?.value||COLORS_PALETTE[0]};
  if(existing){const idx=S.scheduledPayments.findIndex(p=>p.id===id);S.scheduledPayments[idx]=pay;toast('Actualizado ✓');}else{S.scheduledPayments.push(pay);toast('Pago programado ✓');}

}

function renderListas(){
  const lists = S.shoppingLists||[];
  return `

      <button class="btn btn-primary btn-sm" onclick="openModal('newList',{})">+ Nueva lista</button>

      const tipo = LISTA_TIPOS.find(t=>t.id===l.type)||LISTA_TIPOS[5];

          </div>
        </div>
        <div style="height:6px;background:var(--surface3);border-radius:99px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:${pct===100?'var(--success)':'var(--primary)'};width:${pct}%;transition:width .3s"></div>
        </div>
      </div>`;
    }).join('')}
  `;
}

// ══ HELPER: get sections for a list (includes user-created ones) ══
function getListSections(l){
  var base = LIST_SECTIONS[l.type]||[];
  // Add any custom sections that exist in items but not in base
  var extra = [];
  (l.items||[]).forEach(function(i){
    if(i.section && base.indexOf(i.section)<0 && extra.indexOf(i.section)<0) extra.push(i.section);
  });
  // Also include manually added sections stored on list
  (l.customSections||[]).forEach(function(s){
    if(base.indexOf(s)<0 && extra.indexOf(s)<0) extra.push(s);
  });
  return base.concat(extra);
}

// ══ RENDER LIST ITEMS — ticked items sink to bottom, section select-all ══
function renderListItems(l){
  var items = l.items||[];
  var container = document.getElementById('list-items-container');
  if(!container) return;
  var done = items.filter(function(i){return i.done;}).length;
  var cntEl = document.getElementById('list-summary-cnt');
  if(cntEl) cntEl.textContent = done+'/'+items.length;
  if(!items.length){
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Lista vacía</div><div class="empty-desc">Agrega ítems abajo</div></div>';
    return;
  }
  var html = '';
  var sections = getListSections(l);

  if(sections.length){
    var pendingBySection = {}, doneBySection = {};
    sections.forEach(function(s){ pendingBySection[s]=[]; doneBySection[s]=[]; });
    var pendingNoSection = [], doneNoSection = [];

    items.forEach(function(i){
      var sec = i.section||'';
      var inSections = sec && sections.indexOf(sec)>=0;
      if(i.done){
        if(inSections) doneBySection[sec].push(i);
        else doneNoSection.push(i);
      } else {
        if(inSections) pendingBySection[sec].push(i);
        else pendingNoSection.push(i);
      }
    });

    // Render sections that have at least 1 pending item
    sections.forEach(function(sec){
      var pending = pendingBySection[sec]||[];
      var done_s  = doneBySection[sec]||[];
      if(!pending.length && !done_s.length) return;
      if(!pending.length) return; // all done → goes to floatingDone below
      var q="'";
      var total = pending.length + done_s.length;
      var doneCount = done_s.length;
      html += '<div style="margin-top:8px">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px;border-bottom:1px solid var(--border)">'
        +'<span style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px">'+sec+'</span>'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-size:11px;color:var(--text3)">'+doneCount+'/'+total+'</span>'
        +'<button onclick="toggleSection('+q+l.id+q+','+q+sec+q+')" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;padding:2px 8px;cursor:pointer;font-family:var(--font)">☑ Todo</button>'
        +'</div></div>';
      pending.forEach(function(i){ html += buildListItemHTML(l.id, i); });
      html += '</div>';
    });

    // Pending items without a section
    if(pendingNoSection.length){
      html += '<div style="margin-top:8px"><div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;padding:8px 0 4px;border-bottom:1px solid var(--border)">📦 Otros</div>';
      pendingNoSection.forEach(function(i){ html += buildListItemHTML(l.id, i); });
      html += '</div>';
    }

    // ALL done items go to floating zone (individual ticked OR full section ticked)
    var floatingDone = [];
    sections.forEach(function(sec){
      floatingDone = floatingDone.concat(doneBySection[sec]||[]);
    });
    floatingDone = floatingDone.concat(doneNoSection);
    if(floatingDone.length){
      html += '<div style="margin-top:12px;opacity:.65"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:6px 0;border-top:1px dashed var(--border)">✓ Tachados</div>';
      floatingDone.forEach(function(i){ html += buildListItemHTML(l.id, i); });
      html += '</div>';
    }

  } else {
    // No sections — pending first, done at bottom
    var pending = items.filter(function(i){return !i.done;});
    var doneAll = items.filter(function(i){return i.done;});
    pending.forEach(function(i){ html += buildListItemHTML(l.id, i); });
    if(doneAll.length){
      html += '<div style="margin-top:12px;opacity:.65"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:6px 0;border-top:1px dashed var(--border)">✓ Tachados</div>';
      doneAll.forEach(function(i){ html += buildListItemHTML(l.id, i); });
      html += '</div>';
    }
  }
  container.innerHTML = html;
}

// ══ TOGGLE ALL ITEMS IN A SECTION ══
function toggleSection(listId, section){
  var l = (S.shoppingLists||[]).find(function(x){return x.id===listId;});
  if(!l) return;
  var secItems = (l.items||[]).filter(function(i){return i.section===section;});
  var allDone = secItems.every(function(i){return i.done;});
  secItems.forEach(function(i){i.done = !allDone;});
  saveState();
  renderListItems(l);
}

// ══ LIMPIAR = RESTORE (uncheck ticked items) ══
function clearDoneItems(listId){
  var l = (S.shoppingLists||[]).find(function(x){return x.id===listId;});
  if(!l) return;
  (l.items||[]).forEach(function(i){ i.done = false; });
  saveState();
  renderListItems(l);
}

function editListItem(listId, itemId){
  var el=document.getElementById('li-'+itemId);
  if(!el)return;
  var nameDiv=el.querySelector('div[style*="flex:1"]');
  if(!nameDiv)return;
  var current=nameDiv.textContent;
  var inp=document.createElement('input');
  inp.type='text';
  inp.value=current;
  inp.style.cssText='flex:1;padding:3px 8px;border-radius:6px;border:1.5px solid var(--primary);background:var(--surface);font-size:14px;font-weight:500;color:var(--text);font-family:var(--font);outline:none;min-width:0';
  var done=false;
  function commit(){
    if(done)return;
    done=true;
    var val=inp.value.trim();
    var l=(S.shoppingLists||[]).find(function(x){return x.id===listId;});
    if(!l)return;
    if(val){
      var item=(l.items||[]).find(function(i){return i.id===itemId;});
      if(item){item.name=val;saveState();}
    }
    renderListItems(l);
  }
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){done=true;renderListItems((S.shoppingLists||[]).find(function(x){return x.id===listId;}));}
  });
  inp.addEventListener('blur',commit);
  nameDiv.parentNode.replaceChild(inp,nameDiv);
  inp.focus();inp.select();
}

function toggleListItem(listId,itemId){var l=(S.shoppingLists||[]).find(function(x){return x.id===listId;});if(!l)return;var item=(l.items||[]).find(function(i){return i.id===itemId;});if(!item)return;item.done=!item.done;saveState();renderListItems(l);}
function removeListItem(listId,itemId){var l=(S.shoppingLists||[]).find(function(x){return x.id===listId;});if(!l)return;l.items=(l.items||[]).filter(function(i){return i.id!==itemId;});saveState();renderListItems(l);}

    html+='<div class="card" style="margin-bottom:12px;border-left:4px solid '+tipo.color+'" onclick="openModal(&apos;editInvestment&apos;,{id:&apos;'+inv.id+'&apos;})">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
      +'<div style="width:44px;height:44px;border-radius:12px;background:'+tipo.color+'22;display:flex;align-items:center;justify-content:center;font-size:22px">'+tipo.icon+'</div>'
      +'<div style="flex:1"><div style="font-size:15px;font-weight:700">'+inv.name+'</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+tipo.name+(inv.ticker?' · '+inv.ticker:'')+'</div>'+cdtInfo+'</div>'
      +'<div style="text-align:right"><div style="font-size:16px;font-weight:800">'+fmt(cur)+'</div>'
      +'<div style="font-size:12px;font-weight:700;color:'+(isPos?'var(--success)':'var(--danger)')+')">'+(isPos?'+':'')+fmt(gain)+' ('+gainP+'%)</div></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;color:var(--text2)">'
      +'<div>💰 Capital: <strong>'+fmt(cap)+'</strong></div>'
      +'<div>📅 Desde: <strong>'+(inv.startDate||'—')+'</strong></div>'
      +'</div></div>';
  });
  return html;
}
function buildInvExtraFields(type,inv){
  if(type==='acciones'||type==='cripto'){
    return '<div class="form-row"><div class="form-group"><label class="form-label">Ticker / Símbolo</label><input class="form-input" type="text" id="inv-ticker" placeholder="Ej: AAPL, BTC" value="'+(inv?inv.ticker||'':'')+'"></div><div class="form-group"><label class="form-label">Cantidad</label><input class="form-input" type="number" id="inv-qty" placeholder="Ej: 10" value="'+(inv?inv.qty||'':'')+'"></div></div>';
  }
  if(type==='cdt'){
    return '<div class="form-row"><div class="form-group"><label class="form-label">Tasa anual (%)</label><input class="form-input" type="number" id="inv-rate" placeholder="Ej: 12.5" step="0.01" value="'+(inv?inv.rate||'':'')+'"></div><div class="form-group"><label class="form-label">Fecha vencimiento</label><input class="form-input" type="date" id="inv-end" value="'+(inv?inv.endDate||'':'')+'"></div></div>';
  }
  if(type==='inmueble'){
    return '<div class="form-row"><div class="form-group"><label class="form-label">Renta mensual</label><input class="form-input" type="number" id="inv-rent" placeholder="0 si no renta" value="'+(inv?inv.rent||'':'')+'"></div><div class="form-group"><label class="form-label">Dirección</label><input class="form-input" type="text" id="inv-address" placeholder="Opcional" value="'+(inv?inv.address||'':'')+'"></div></div>';
  }
  if(type==='negocio'){
    return '<div class="form-row"><div class="form-group"><label class="form-label">Retorno mensual</label><input class="form-input" type="number" id="inv-monthly" placeholder="0.00" value="'+(inv?inv.monthlyReturn||'':'')+'"></div><div class="form-group"><label class="form-label">Participación (%)</label><input class="form-input" type="number" id="inv-share" placeholder="Ej: 50" value="'+(inv?inv.share||'':'')+'"></div></div>';
  }
  return '';
}
function buildNewInvestmentModal(data){
  var inv=data.id?(S.investments||[]).find(function(x){return x.id===data.id;}):null;
  var isEdit=!!inv;
  var defType=inv?inv.type:'acciones';
  var q="'";
  var deleteBtn=isEdit?('<button class="btn btn-danger" onclick="deleteInvestment('+q+inv.id+q+')">Eliminar</button>'):'';
  return '<div class="modal-header"><div class="modal-title">'+(isEdit?'Editar':'Nueva')+' inversión</div><button class="modal-close" onclick="closeModal()">×</button></div>'
    +'<div class="modal-body">'
    +'<input type="hidden" id="inv-id" value="'+(inv?inv.id:'')+'">'
    +'<div class="form-group"><label class="form-label">Nombre</label><input class="form-input" type="text" id="inv-name" placeholder="Ej: Apple, FONDO ABC..." value="'+(inv?inv.name:'')+'"></div>'
    +'<div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="inv-type" onchange="updateInvFields(this.value)">'
    +INV_TYPES.map(function(t){return '<option value="'+t.id+'" '+(defType===t.id?'selected':'')+'>'+t.icon+' '+t.name+'</option>';}).join('')
    +'</select></div>'
    +'<div id="inv-extra-fields">'+buildInvExtraFields(defType,inv)+'</div>'
    +'<div class="form-row"><div class="form-group"><label class="form-label">Capital invertido</label><input class="form-input" type="number" id="inv-capital" placeholder="0.00" value="'+(inv?inv.capital:'')+'" step="0.01"></div>'
    +'<div class="form-group"><label class="form-label">Valor actual</label><input class="form-input" type="number" id="inv-current" placeholder="= capital si no cambió" value="'+(inv?inv.currentValue:'')+'" step="0.01"></div></div>'
    +'<div class="form-row"><div class="form-group"><label class="form-label">Fecha inicio</label><input class="form-input" type="date" id="inv-start" value="'+(inv?inv.startDate:todayStr())+'"></div>'
    +'<div class="form-group"><label class="form-label">Moneda</label><select class="form-select" id="inv-currency">'+buildCurrencyOptions(inv?inv.currency:S.currency)+'</select></div></div>'
    +'<div class="form-group"><label class="form-label">Notas</label><input class="form-input" type="text" id="inv-notes" placeholder="Observaciones..." value="'+(inv?inv.notes||'':'')+'"></div>'
    +'<div class="btn-row">'+deleteBtn+'<button class="btn btn-primary" onclick="saveInvestment()">'+(isEdit?'Guardar':'Registrar')+'</button></div>'
    +'</div>';
}




function buildNewListModal(data){
  return '<div class="modal-header"><div class="modal-title">Nueva lista</div><button class="modal-close" onclick="closeModal()">×</button></div>'
    +'<div class="modal-body">'
    +'<div class="form-group"><label class="form-label" style="margin-bottom:8px">¿Qué tipo de lista?</label>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +LISTA_TIPOS.map(function(t){var q="'";var sel=t.id==='supermercado';return '<button onclick="selectListType('+q+t.id+q+')" id="lt-'+t.id+'" style="padding:12px 8px;border-radius:10px;border:2px solid '+(sel?'var(--primary)':'var(--border)')+';background:'+(sel?'rgba(0,212,170,.12)':'var(--surface2)')+';color:'+(sel?'var(--primary)':'var(--text)')+';cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.15s">'+t.icon+' '+t.name+'</button>';}).join('')
    +'</div><input type="hidden" id="nl-type" value="supermercado"></div>'
    +'<button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="saveNewList()">Crear lista</button>'
    +'</div>';
}
function selectListType(typeId){
  document.getElementById('nl-type').value=typeId;
  LISTA_TIPOS.forEach(function(t){
    var btn=document.getElementById('lt-'+t.id);
    if(btn){btn.style.borderColor=t.id===typeId?'var(--primary)':'var(--border)';btn.style.background=t.id===typeId?'rgba(0,212,170,.12)':'var(--surface2)';btn.style.color=t.id===typeId?'var(--primary)':'var(--text)';}
  });
}
function saveNewList(){
  var type=document.getElementById('nl-type')&&document.getElementById('nl-type').value||'supermercado';
  var tipo=LISTA_TIPOS.find(function(t){return t.id===type;})||LISTA_TIPOS[5];
  if(!S.shoppingLists)S.shoppingLists=[];
  var exists=S.shoppingLists.find(function(l){return l.type===type;});
  if(exists&&type!=='custom'){toast('Ya tienes una lista de '+tipo.name);closeModal();openListDetail(exists.id);return;}
  var items=(DEFAULT_LIST_ITEMS[type]||[]).map(function(i){return {id:uid(),name:i.name,done:false,section:i.section||''};});
  var name=type==='custom'?('Lista '+(S.shoppingLists.filter(function(l){return l.type==='custom';}).length+1)):tipo.name;
  S.shoppingLists.push({id:uid(),name:name,type:type,color:tipo.color,items:items,createdAt:todayStr()});
  saveState();closeModal();renderPage('listas');toast('Lista creada ✓');
}
function deleteList(id){
  confirmDialog('🗑️','¿Eliminar lista?','',function(){
    S.shoppingLists=(S.shoppingLists||[]).filter(function(x){return x.id!==id;});
    saveState();renderPage('listas');toast('Lista eliminada');
  });
}
function shareList(listId){
  var l=(S.shoppingLists||[]).find(function(x){return x.id===listId;});
  if(!l)return;
  var text='📋 *'+l.name+'*\n\n';
  (l.items||[]).forEach(function(i){text+=(i.done?'✅':'⬜')+' '+i.name+'\n';});
  if(navigator.share){navigator.share({title:l.name,text:text});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast('Lista copiada ✓');});}
}
function closeListDetail(){
  var el=document.getElementById('list-detail-overlay');
  if(el)el.remove();
  renderPage('listas');
}




</script>
</body>
</html>
