.color-grid{display:flex;flex-wrap:wrap;gap:10px;padding:6px 0}
.color-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s;flex-shrink:0;position:relative}
.color-opt.selected{border-color:white!important;box-shadow:0 0 0 3px var(--primary),0 2px 8px rgba(0,0,0,.4);transform:scale(1.2)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px}
.search-bar input{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.search-bar input::placeholder{color:var(--text3)}
.cat-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--card-shadow)}
.cat-group-header{display:flex;align-items:center;justify-content:space-between;padding:14px}
.cat-group-left{display:flex;align-items:center;gap:10px}
.subcat-list{border-top:1px solid var(--border)}
.subcat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 24px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
.subcat-item:last-child{border-bottom:none}
.btn-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:6px;line-height:1}
.empty-state{text-align:center;padding:48px 24px}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--text2);line-height:1.5}
.goal-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;box-shadow:var(--card-shadow)}
.sched-item{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--card-shadow)}
.sched-overdue{border-color:var(--danger)!important}
.sched-today{border-color:var(--warning)!important}
.sched-soon{border-color:rgba(245,158,11,.4)!important}
.debt-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;box-shadow:var(--card-shadow)}
.config-item{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;box-shadow:var(--card-shadow)}
.config-item-left{display:flex;align-items:center;gap:12px}
.config-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.currency-toggle{display:flex;background:var(--surface2);border-radius:99px;padding:3px;border:1px solid var(--border)}
.cur-btn{padding:5px 11px;border-radius:99px;border:none;background:none;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.15s}
.cur-btn.active{background:var(--primary);color:#0A0F1E}
.hidden{display:none!important}
.alert-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--danger);display:flex;align-items:center;gap:8px}
.warn-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--warning);display:flex;align-items:center;gap:8px}
.exchange-widget{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(116,97,239,.08));border:1px solid rgba(0,212,170,.2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:4px}
.exchange-widget-row{display:flex;align-items:center;gap:8px}
.exchange-widget-time{font-size:10px;color:var(--text3);padding-left:2px}
.bank-badge{height:44px;width:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;letter-spacing:-.5px;flex-shrink:0}
.summary-totals{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;margin-bottom:14px;display:flex;justify-content:space-between;gap:4px;box-shadow:var(--card-shadow)}
.summary-total-item{text-align:center;flex:1;min-width:0}
.summary-total-label{font-size:9px;color:var(--text2);margin-bottom:3px;white-space:nowrap}
.summary-total-val{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.period-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.period-selector::-webkit-scrollbar{display:none}
.period-btn{padding:6px 12px;border-radius:99px;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font);font-weight:600;transition:.15s;flex-shrink:0}
.period-btn.active{background:var(--primary);border-color:var(--primary);color:#0A0F1E}
.theme-toggle{width:36px;height:20px;background:var(--surface3);border-radius:99px;border:1px solid var(--border);cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.theme-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--text2);border-radius:50%;transition:.2s;font-size:9px;display:flex;align-items:center;justify-content:center}
[data-theme="light"] .theme-knob{left:18px;background:var(--warning)}

@keyframes bsFadeIn{from{opacity:0}to{opacity:1}}
@keyframes bsSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes fadeInPage{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes bsSlideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
.bs-item{padding:13px 12px;border-radius:10px;cursor:pointer;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.bs-item:active{background:rgba(0,212,170,.1)!important}
.bs-trigger{border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:0 14px;transition:background .1s;box-sizing:border-box;height:48px;width:100%}
.bs-trigger:active{background:var(--surface2)}

function loadState(){
  try{
    const saved=localStorage.getItem('finanziaState3');
    if(saved){const p=JSON.parse(saved);Object.assign(S,p);}
    else{S.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));S.subcategories=JSON.parse(JSON.stringify(DEFAULT_SUBS));}
  }catch(e){S.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));S.subcategories=JSON.parse(JSON.stringify(DEFAULT_SUBS));}
  // Migrate: if categories use old IDs (c1,c2...) replace with new DEFAULT_CATS
  const needsCatReset=!S.categories||!S.categories.length||S.categories.length>30||(S.categories[0]&&S.categories[0].id&&S.categories[0].id.match(/^c\d+$/))||!!(S.categories.find(function(cat){return cat.name==='Bonificaciones'||cat.name==='Paquete TV/Internet/Teléfono';}));
  if(needsCatReset){S.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));S.subcategories=JSON.parse(JSON.stringify(DEFAULT_SUBS));}
  // Ensure protected Efectivo account exists
  // FIRST: migrate legacy efectivo-default
  const legacyEf=S.accounts.find(a=>a.id==='efectivo-default');
  if(legacyEf){
    if(!S.accounts.find(a=>a.id==='efectivo-PLN')){
      legacyEf.id='efectivo-PLN';legacyEf.currency='PLN';
      legacyEf.protected=true;legacyEf.subtype='efectivo';legacyEf.subAccounts=[];
    } else {
      S.accounts=S.accounts.filter(a=>a.id!=='efectivo-default');
    }
  }
  // THEN: ensure one Efectivo per configured currency
  const curs=S.currencies&&S.currencies.length?S.currencies:[];
  if(!curs.length){return;} // no currencies yet — efectivo accounts created when user sets up profile
  curs.forEach(cur=>{
    const efId='efectivo-'+cur;
    const efAcc=S.accounts.find(a=>a.id===efId);
    if(!efAcc){
      S.accounts.unshift({id:efId,name:'Efectivo',type:'activo',subtype:'efectivo',currency:cur,bankEntity:'',initialBalance:0,icon:'💵',color:'#10B981',protected:true,subAccounts:[]});
    } else {
      efAcc.protected=true;efAcc.subtype='efectivo';efAcc.subAccounts=[];
    }
  });
  // Remove any duplicate efectivos (same currency, keep first)
  const seenEf=new Set();
  S.accounts=S.accounts.filter(a=>{
    if(a.subtype!=='efectivo')return true;
    const key='ef-'+a.currency;
    if(seenEf.has(key))return false;
    seenEf.add(key);return true;
  });
  if(!S.movFilter)S.movFilter={tab:'todos',search:'',dateFrom:'',dateTo:'',catId:'',accountId:'',payMethod:''};
  if(!S.analysisPeriod)S.analysisPeriod='Mensual';
  if(!S.analysisYear)S.analysisYear=new Date().getFullYear();
  if(!S.analysisPeriodSub)S.analysisPeriodSub='anual';if(!S.analysisYear)S.analysisYear=new Date().getFullYear();
  if(!S.exchangeRate)S.exchangeRate={PLN_COP:1200,COP_PLN:0.000833,lastUpdated:''};
  if(!S.theme)S.theme='auto';
  // language and weekStart stay empty until user chooses
  // currencies stay empty until user sets up profile
  applyThemeMode();
  // Update drawer profile
  updateDrawerProfile();
}
function toggleDrawerGroup(groupId, labelEl){
  var el=document.getElementById(groupId);
  if(!el)return;
  var isCollapsed=el.style.display==='none';
  el.style.display=isCollapsed?'block':'none';
  var arrow=labelEl?labelEl.querySelector('.dgl-arrow'):null;
  if(arrow)arrow.style.transform=isCollapsed?'rotate(0deg)':'rotate(-90deg)';
}
function updateDrawerProfile(){
  const name=S.profile&&S.profile.name?S.profile.name:'Mi Perfil';
  const email=S.profile&&S.profile.email?S.profile.email:'Toca para configurar';
  const photo=S.profile&&S.profile.photo?S.profile.photo:'';
  const nameEl=document.getElementById('drawer-profile-name');
  const emailEl=document.getElementById('drawer-profile-email');
  const avatarEl=document.getElementById('drawer-avatar');
  if(nameEl)nameEl.textContent=name;
  if(emailEl)emailEl.textContent=email;
  if(avatarEl){
    if(photo){avatarEl.innerHTML=`<img src="${photo}" alt="foto">`;}
    else{const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);avatarEl.innerHTML=`<span style="font-size:16px;font-weight:700;color:white">${initials!=='MI'?initials:'👤'}</span>`;}
  }
}

function applyThemeMode(){
  let effective=S.theme;
  if(S.theme==='auto'){
    effective=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  }
  document.documentElement.setAttribute('data-theme',effective);
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=effective==='dark'?'☀️':'🌙';
}
function buildNumFormatCaps(){
  var opts=[['auto','Automático'],['2','Con decimales'],['0','Sin decimales']];
  var cur=S.numFormat||'auto';
  return opts.map(function(o){
    var isOn=cur===o[0];
    return '<button onclick="setNumFormat(\''+o[0]+'\')" style="flex:1;padding:8px 4px;border-radius:50px;border:none;background:'+(isOn?'var(--primary)':'transparent')+';color:'+(isOn?'white':'var(--text2)')+';font-size:12px;font-weight:'+(isOn?'700':'500')+';cursor:pointer;font-family:var(--font);transition:.15s">'+o[1]+'</button>';
  }).join('');
}
function buildNumFormatExample(){
  var n=1500000;
  var d=S.numFormat==='0'?0:2;
  try{
    var meta=getCurrencyMeta(S.currency||'COP');
    var str=n.toLocaleString(meta.locale,{minimumFractionDigits:d,maximumFractionDigits:d});
    return meta.pos==='before'?meta.sym+str:str+' '+meta.sym;
  }catch(e){return n.toFixed(d);}
}
function setNumFormat(val){
  S.numFormat=val;
  saveState();
  renderPage('configuracion');
}
function setTheme(val){
  S.theme=val;
  applyThemeMode();
  togglePPick('theme-picker');
  saveState();
  renderPage('configuracion');
}
function toggleTheme(){
  const effective=S.theme==='auto'
    ?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')
    :S.theme;
  setTheme(effective==='dark'?'light':'dark');
}

async function fetchExchangeRate(){
  try{
    const curs=S.currencies||[];
    if(curs.length<2){
      const el=document.getElementById('exchange-widget');
      if(el)renderExchangeWidget(el);
      return;
    }
    const base=curs[0];
    const r=await fetch(`https://open.er-api.com/v6/latest/${base}`);
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(d.rates){
      if(!S.exchangeRate)S.exchangeRate={};
      S.exchangeRate.base=base;
      S.exchangeRate.rates=d.rates;
      S.exchangeRate.lastUpdated=new Date().toLocaleString('es');
      saveState();
      const el=document.getElementById('exchange-widget');
      if(el)renderExchangeWidget(el);
    }
  }catch(e){
    const el=document.getElementById('exchange-widget');
    if(el)renderExchangeWidget(el);

function renderExchangeWidget(el){
  if(!el)return;
  const curs=S.currencies||[];
  if(curs.length<2){
    el.innerHTML=`<div class="exchange-widget-row"><span style="font-size:14px">💱</span><span style="font-size:11px;color:var(--text2)">Para ver tipo de cambio, selecciona 2 monedas en <button onclick="navigate('configuracion')" style="background:none;border:none;color:var(--primary);font-weight:700;cursor:pointer;font-family:var(--font);font-size:11px">Configuración</button></span></div>`;
    return;
  }
  const r=S.exchangeRate||{};
  if(!r.rates||!r.base){
    el.innerHTML=`<div class="exchange-widget-row"><span>💱</span><span style="font-size:12px;color:var(--text2)">⏳ Consultando tipo de cambio...</span></div>`;
    return;
  }
  // Get the two selected currencies  
  const cur1=S.currency;
  const cur2=curs.find(c=>c!==cur1)||curs[0];
  // Calculate rates from base
  const base=r.base;
  const rates=r.rates;
  let rate1to2,rate2to1;
  if(cur1===base){
    rate1to2=rates[cur2]||1;
  } else if(cur2===base){
    rate1to2=1/(rates[cur1]||1);
  } else {
    // Cross rate
    rate1to2=(rates[cur2]||1)/(rates[cur1]||1);
  }
  rate2to1=rate1to2?1/rate1to2:0;
  const m1=getCurrencyMeta(cur1);
  const m2=getCurrencyMeta(cur2);
  const r1str=rate1to2>=1?rate1to2.toLocaleString('es',{maximumFractionDigits:4}):rate1to2.toFixed(6);
  const r2str=rate2to1>=1?rate2to1.toLocaleString('es',{maximumFractionDigits:4}):rate2to1.toFixed(6);
  el.innerHTML=`
    <div class="exchange-widget-row">
      <span style="font-size:13px">💱</span>
      <span style="font-size:12px;color:var(--text)">1 <strong>${cur1}</strong> = <strong style="color:var(--primary)">${r1str} ${cur2}</strong></span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px">(1 ${cur2} = ${r2str} ${cur1})</span>
    </div>
    <div class="exchange-widget-time">${r.lastUpdated?'🕐 '+r.lastUpdated:'⏳ Sin datos'}</div>`;
}

function buildCurrencyOptions(selected){
  const curs=S.currencies&&S.currencies.length?S.currencies:[];
  if(!curs.length)return '<option value="">Sin moneda</option>';
  if(curs.length===1)return `<option value="${curs[0]}">${curs[0]}</option>`;
  return curs.map(c=>`<option value="${c}" ${c===selected?'selected':''}>${c}</option>`).join('');
}
function getCurrencyMeta(code){return CURRENCY_META[code]||{sym:code,locale:'en-US',pos:'before'};}
function fmt(amount,cur){
  const code=cur||S.currency||'';
  const n=parseFloat(amount)||0;
  // Determine decimals: user preference overrides currency default
  const noDec=(['JPY','KRW','CLP','PYG'].includes(code));
  let decimals;
  if(S.numFormat==='0')decimals=0;
  else if(S.numFormat==='2')decimals=2;
  else decimals=noDec?0:2; // auto (default)
  if(!code)return n.toLocaleString('es-CO',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  const meta=getCurrencyMeta(code);
  let numStr;
  try{numStr=n.toLocaleString(meta.locale,{minimumFractionDigits:decimals,maximumFractionDigits:decimals});}
  catch(e){numStr=n.toFixed(decimals);}
  return meta.pos==='before'?meta.sym+numStr:numStr+' '+meta.sym;
}
function setCurrency(c){
  S.currency=c;
  document.querySelectorAll('.cur-btn').forEach(b=>b.classList.toggle('active',b.dataset.cur===c));
  saveState();renderPage(S.currentPage);
  reformatNumFields();
}
function refreshCurrencyToggle(){
  const toggle=document.getElementById('currency-toggle');
  if(!toggle)return;
  const curs=S.currencies&&S.currencies.length?S.currencies:[];
  if(!curs.length){toggle.innerHTML='<span style="color:var(--text3);font-size:12px;padding:4px 8px">—</span>';return;}
  toggle.innerHTML=curs.map(c=>`<button class="cur-btn ${c===S.currency?'active':''}" data-cur="${c}" onclick="setCurrency('${c}')">${c}</button>`).join('');
  // Make sure current currency is valid
  if(!curs.includes(S.currency)){S.currency=curs[0];saveState();}
}

  if(page==='cuentas')S._cuentasGrupo='';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  S.currentPage=page;
  document.getElementById('page-'+page).classList.add('active');

  renderPage(page);
  closeDrawer();
  refreshCurrencyToggle();

  sheet.innerHTML=buildModal(type,data||{});
  root.classList.add('active');
}

}

const getAcc=id=>{
  if(!id)return null;
  if(id.includes('|')){const[pid]=id.split('|');return S.accounts.find(a=>a.id===pid)||null;}
  return S.accounts.find(a=>a.id===id)||null;
};
// Get actual account ID from potentially pipe-formatted id (for transactions)
function resolveAccId(id){
  if(!id)return id;
  if(id.includes('|'))return id.split('|')[0];
  return id;
}
const getCat=id=>S.categories.find(c=>c.id===id);
const getSub=id=>S.subcategories.find(s=>s.id===id);
const getBank=(bankId,cur)=>{const l=cur==='PLN'?BANKS_PLN:BANKS_COP;return l.find(b=>b.id===bankId)||null;}

function bankBadge(bankId,cur,size=44,acc){
  const b=getBank(bankId,cur);
  if(!b){
    // Use account's icon/subtype to pick the right emoji
    const emoji=acc?(acc.subtype==='efectivo'?'💵':acc.subtype==='digital'?'📱':acc.subtype==='inversion'?'📈':acc.icon||'🏦'):'🏦';
    return `<div style="width:${size}px;height:${size}px;border-radius:${size*.27}px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:${size*.44}px">${emoji}</div>`;
  }
  const fs=b.abbr.length>3?size*.22:size*.25;
  return `<div class="bank-badge" style="width:${size}px;height:${size}px;background:${b.color};border-radius:${size*.27}px;font-size:${fs}px">${b.abbr}</div>`;
}

function getBalance(accountId){
  const acc=getAcc(accountId);if(!acc)return 0;
  let bal=parseFloat(acc.initialBalance)||0;
  // Sub-account balances only for activos
  if(acc.type==='activo'&&acc.subAccounts&&acc.subAccounts.length){
    acc.subAccounts.forEach(s=>bal+=(parseFloat(s.balance)||0));
  }
  const isPasivo=acc.type==='pasivo';
  S.transactions.filter(t=>t.currency===(acc.currency||S.currency)).forEach(t=>{
    const amt=parseFloat(t.amount)||0;
    if(t.type==='transferencia'){
      // Transfers: each side handled exactly once
      if(t.accountId===accountId)bal-=amt;
      else if(t.toAccountId===accountId){
        if(isPasivo)bal-=amt; // payment reduces debt
        else bal+=amt;
      }
    } else if(t.accountId===accountId){
      if(!isPasivo){
        if(t.type==='ingreso')bal+=amt;
        else if(t.type==='gasto')bal-=amt;
      } else {
        // Pasivo: gasto (purchase) ADDS to debt, ingreso (payment) REDUCES it
        if(t.type==='gasto')bal+=amt;
        else if(t.type==='ingreso')bal-=amt;
      }
    }
  });
  return bal;
}
function getTotalBalance(){
  return S.accounts.filter(a=>a.type==='activo'&&(a.currency||S.currency)===S.currency).reduce((s,a)=>s+getBalance(a.id),0);
}
function getNetWorth(){
  const assets=S.accounts.filter(a=>a.type==='activo'&&(a.currency||S.currency)===S.currency&&!a.excludeFromTotal).reduce((s,a)=>s+getBalance(a.id),0);
  const liabilities=S.accounts.filter(a=>a.type==='pasivo'&&(a.currency||S.currency)===S.currency&&!a.excludeFromTotal).reduce((s,a)=>s+Math.abs(getBalance(a.id)),0);
  return{assets,liabilities,net:assets-liabilities};
}

function getAnalysisPeriodRange(){
  const yr=S.analysisYear||new Date().getFullYear();
  const sub=S.analysisPeriodSub||'anual';
  const from=new Date(yr,0,1,0,0,0,0);
  const to=new Date(yr,11,31,23,59,59,999);
  if(sub==='anual'){return{from,to};}
  if(sub==='q1'){return{from:new Date(yr,0,1),to:new Date(yr,2,31,23,59,59)};}
  if(sub==='q2'){return{from:new Date(yr,3,1),to:new Date(yr,5,30,23,59,59)};}
  if(sub==='q3'){return{from:new Date(yr,6,1),to:new Date(yr,8,30,23,59,59)};}
  if(sub==='q4'){return{from:new Date(yr,9,1),to:new Date(yr,11,31,23,59,59)};}
  if(sub==='sem1'){return{from:new Date(yr,0,1),to:new Date(yr,5,30,23,59,59)};}
  if(sub==='sem2'){return{from:new Date(yr,6,1),to:new Date(yr,11,31,23,59,59)};}
  if(sub==='7d'){const f=new Date();f.setDate(f.getDate()-7);return{from:f,to:new Date()};}
  if(sub==='30d'){const f=new Date();f.setDate(f.getDate()-30);return{from:f,to:new Date()};}
  if(sub==='90d'){const f=new Date();f.setDate(f.getDate()-90);return{from:f,to:new Date()};}
  // Month: '01'-'12'
  const m=parseInt(sub)-1;
  if(!isNaN(m)&&m>=0&&m<=11){
    const daysInMonth=new Date(yr,m+1,0).getDate();
    return{from:new Date(yr,m,1,0,0,0),to:new Date(yr,m,daysInMonth,23,59,59)};
  }
  return{from,to};
}
function getPeriodRange(period){
  const now=new Date();const from=new Date();const to=new Date();
  to.setHours(23,59,59,999);
  switch(period){
    case'Diario':from.setHours(0,0,0,0);break;
    case'Semanal':from.setDate(now.getDate()-7);break;
    case'Quincenal':from.setDate(now.getDate()-15);break;
    case'Mensual':from.setDate(1);from.setHours(0,0,0,0);break;
    case'Bimestral':from.setMonth(now.getMonth()-2,1);break;
    case'Trimestral':from.setMonth(now.getMonth()-3,1);break;
    case'Semestral':from.setMonth(now.getMonth()-6,1);break;
    case'Anual':from.setMonth(0,1);from.setHours(0,0,0,0);break;
    default:from.setDate(1);from.setHours(0,0,0,0);
  }
  return{from,to};
}

function getMonthTotals(period){
  period=period||'Mensual';
  const{from,to}=getPeriodRange(period);
  const txs=S.transactions.filter(t=>{
    const d=new Date(t.date);
    return t.currency===S.currency&&d>=from&&d<=to;
  });
  // Exclude internal transfers: transactions whose description starts with 'Ahorro →'/'Ahorro:' or are paired transfers
  // Exclude internal movements from INCOME (keep goal savings as EXPENSE - user is correct)
  const isInternalIncome=(t)=>{
    if(!t.description)return false;
    const d=t.description;
    // These are internal credits that don't represent real new money coming in
    return d.startsWith('Ahorro:')||d.startsWith('AUTO:')||d.startsWith('Abono:');
  };
  // Exclude from expense: only the paying side of debt payments (the income to the debt account)
  // Goal savings expenses (Ahorro →) ARE real expenses - user is correct
  const isInternalExpense=(t)=>{
    if(!t.description)return false;
    const d=t.description;
    return d.startsWith('Pago deuda:')||d.startsWith('AUTO:');
  };
  const inc=txs.filter(t=>t.type==='ingreso'&&!isInternalIncome(t)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const exp=txs.filter(t=>t.type==='gasto'&&!isInternalExpense(t)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  return{inc,exp};
}

function getBudgetSpent(b){
  const now=new Date();
  return S.transactions.filter(t=>t.type==='gasto'&&t.categoryId===b.categoryId&&
    (!b.subcategoryId||t.subcategoryId===b.subcategoryId)&&
    t.currency===(b.currency||S.currency)&&
    (()=>{const d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();})()
  ).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
}

function daysUntil(dateStr){
  if(!dateStr)return 999;
  const d=new Date(dateStr);const now=new Date();
  d.setHours(0,0,0,0);now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
function todayStr(){return new Date().toISOString().split('T')[0];}

function subOptions(catId,selSubId){
  const subs=S.subcategories.filter(s=>s.categoryId===catId);
  return '<option value="">Sin subcategoría</option>'+subs.map(s=>`<option value="${s.id}" ${s.id===selSubId?'selected':''}>${s.icon} ${s.name}</option>`).join('');
}

  const el=document.getElementById(targetId);if(el)el.innerHTML=subOptions(catId,selectedSubId||'');

function accountOptions(filterCur){
  const cur=filterCur||S.currency;
  const accs=S.accounts.filter(a=>(a.currency||S.currency)===cur);
  return '<option value="">Seleccionar cuenta</option>'+accs.map(a=>`<option value="${a.id}">${a.icon||'💳'} ${a.name}</option>`).join('');

function catOptions(type,selectedId){
  let cats=S.categories;
  if(type==='gasto')cats=cats.filter(c=>c.type!=='ingreso');

}

  var descs={'notifPayments':'Recordatorio antes de que venza un pago','notifBudget':'Cuando llegues al 80% o 100% del presupuesto','notifGoal':'Celebración al completar una meta de ahorro','notifWeekly':'Resumen de gastos cada lunes','notifMonthly':'Balance de ingresos vs gastos al cierre del mes','notifDebt':'Cuando una deuda supere el 40% de tus ingresos'};

function toggleNotifPref(key){

function requestNotifPerm(){
  if(!('Notification'in window)){toast('Notificaciones no disponibles en este navegador');return;}
  if(Notification.permission==='granted'){toast('✅ Notificaciones ya están activas');return;}
  if(Notification.permission==='denied'){
    // Show instructions to unblock
    confirmDialog('🔔','Notificaciones bloqueadas',
      'Para activarlas: en Chrome toca el ícono 🔒 en la barra de dirección → Configuración del sitio → Notificaciones → Permitir. Luego vuelve aquí y toca de nuevo.',
      ()=>{},'Entendido','btn-primary');
    return;
  }
  // 'default' - request permission
  Notification.requestPermission().then(result=>{
    if(result==='granted'){toast('🔔 Notificaciones activadas ✓');}
    else if(result==='denied'){toast('Notificaciones bloqueadas en el navegador');}
    renderPage('configuracion');
  });
}
function sendNotif(title,body){
  if('Notification'in window&&Notification.permission==='granted'){
    try{new Notification(title,{body,icon:'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E💰%3C/text%3E%3C/svg%3E'});}catch(e){}
  }
}
function checkAutoPayments(){
  const today=todayStr();
  S.scheduledPayments.forEach(p=>{
    if(p.isAuto&&p.nextDate===today){
      const alreadyDone=S.transactions.some(t=>t.description==='AUTO:'+p.id&&t.date===today);
      if(!alreadyDone){
        const tx={id:uid(),type:'gasto',accountId:p.accountId||'',categoryId:p.categoryId||'',subcategoryId:p.subcategoryId||'',amount:p.amount,currency:p.currency||S.currency,date:today,description:'AUTO:'+p.id,paymentMethod:''};
        S.transactions.push(tx);
        sendNotif('💳 Pago automático',`${p.name} — ${fmt(p.amount,p.currency||S.currency)}`);
        advancePayment(p);
        toast('Auto-pago: '+p.name);
      }
    }
    if(p.nextDate<=today&&!p.isAuto){
      sendNotif('⚠️ Pago pendiente',`${p.name} venció el ${p.nextDate}`);
    }
  });
  saveState();
}
function advancePayment(p){
  const d=new Date(p.nextDate);
  const freq=p.frequency;
  if(freq==='Diario')d.setDate(d.getDate()+1);
  else if(freq==='Semanal')d.setDate(d.getDate()+7);
  else if(freq==='Quincenal')d.setDate(d.getDate()+15);
  else if(freq==='Mensual')d.setMonth(d.getMonth()+1);
  else if(freq==='Bimestral')d.setMonth(d.getMonth()+2);
  else if(freq==='Trimestral')d.setMonth(d.getMonth()+3);
  else if(freq==='Semestral')d.setMonth(d.getMonth()+6);
  else if(freq==='Anual')d.setFullYear(d.getFullYear()+1);
  p.nextDate=d.toISOString().split('T')[0];
}

function renderRule502030(){
  const{inc}=getMonthTotals();
  if(inc<=0)return`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="card-title" style="margin:0">📊 Regla 50/30/20</div>
      <div style="font-size:10px;color:var(--text3)">este mes</div>
    </div>
    <div style="font-size:12px;color:var(--text2);padding:8px 0">Registra ingresos este mes para ver tu distribución ideal vs. real.</div>
  </div>`;

  // Classify transactions by nature
  const txs=S.transactions.filter(t=>{
    const d=new Date(t.date);const now=new Date();
    return t.currency===S.currency&&t.type==='gasto'&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  let nec=0,des=0,aho=0;
  txs.forEach(t=>{
    const cat=getCat(t.categoryId);
    const nature=cat?cat.nature:'deseos';
    const amt=parseFloat(t.amount)||0;
    if(nature==='necesidades')nec+=amt;
    else if(nature==='deseos')des+=amt;
    else if(nature==='ahorros')aho+=amt;
  });

  const idealNec=inc*0.5, idealDes=inc*0.3, idealAho=inc*0.2;
  const rows=[
    {label:'🔴 NECESIDADES',ideal:idealNec,real:nec,idealPct:50,color:'#EF4444'},
    {label:'🟡 DESEOS',ideal:idealDes,real:des,idealPct:30,color:'#F59E0B'},
    {label:'🟢 AHORROS',ideal:idealAho,real:aho,idealPct:20,color:'#10B981'},
  ];

  const rowsHtml=rows.map(r=>{
    const realPct=inc>0?Math.round(r.real/inc*100):0;
    const diff=r.ideal-r.real;
    const over=diff<0;
    const obsLabel=over?`⚠ +${fmt(Math.abs(diff))}`:diff===0?'✓ Exacto':`✓ −${fmt(diff)}`;
    const obsColor=over?'var(--danger)':'var(--success)';
    const barPct=Math.min(100,r.ideal>0?Math.round(r.real/r.ideal*100):0);
    const barColor=over?'var(--danger)':realPct>=r.idealPct*0.9?'var(--success)':'var(--warning)';
    return`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:12px;font-weight:700">${r.label}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;text-align:center">
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">IDEAL</div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">${r.idealPct}%</div>
          <div style="font-size:10px;color:var(--text2)">${fmt(r.ideal)}</div>
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">REAL</div>
          <div style="font-size:12px;font-weight:700;color:${r.color}">${realPct}%</div>
          <div style="font-size:10px;color:var(--text2)">${fmt(r.real)}</div>
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">OBSERVACIÓN</div>
          <div style="font-size:11px;font-weight:700;color:${obsColor}">${obsLabel}</div>
          <div style="font-size:10px;color:var(--text2)">${over?'Excedido':'Disponible'}</div>
        </div>
      </div>
      <div style="height:8px;background:var(--surface3);border-radius:99px;overflow:hidden">
        <div style="height:100%;border-radius:99px;background:${barColor};width:${barPct}%;transition:width .4s"></div>
      </div>
    </div>`;
  }).join('');

  const necPct=inc>0?Math.round(nec/inc*100):0;
  const desPct=inc>0?Math.round(des/inc*100):0;
  const ahoPct=inc>0?Math.round(aho/inc*100):0;
  const necOK=necPct<=50,desOK=desPct<=30,ahoOK=ahoPct>=20;

  const collapsedHtml=`<div style="display:flex;gap:12px;align-items:center;margin-top:4px">
    <div style="display:flex;align-items:center;gap:4px"><span style="color:${necOK?'var(--success)':'var(--danger)'}">🔴</span><span style="font-size:11px;font-weight:700;color:${necOK?'var(--success)':'var(--danger)'}">${necPct}%</span></div>
    <div style="display:flex;align-items:center;gap:4px"><span style="color:${desOK?'var(--success)':'var(--warning)'}">🟡</span><span style="font-size:11px;font-weight:700;color:${desOK?'var(--success)':'var(--warning)'}">${desPct}%</span></div>
    <div style="display:flex;align-items:center;gap:4px"><span style="color:${ahoOK?'var(--success)':'var(--danger)'}">🟢</span><span style="font-size:11px;font-weight:700;color:${ahoOK?'var(--success)':'var(--danger)'}">${ahoPct}%</span></div>
    <span style="font-size:10px;color:var(--text3);margin-left:4px">${necOK&&desOK&&ahoOK?'✓ Todo OK':'⚠ Revisar'}</span>
  </div>`;

  return`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleRule502030()">

      <span id="rule-arrow" style="color:var(--text3);font-size:12px;transition:transform .2s">▼</span>
    </div>
    <div id="rule-collapsed" style="display:none">${collapsedHtml}</div>
    <div id="rule-expanded">
      <div style="font-size:10px;color:var(--text3);margin:4px 0 12px">Ingresos del mes: <strong style="color:var(--text)">${fmt(inc)}</strong></div>
      ${rowsHtml}
    </div>
  </div>`;
}
function toggleRule502030(){
  const exp=document.getElementById('rule-expanded');
  const col=document.getElementById('rule-collapsed');
  const arrow=document.getElementById('rule-arrow');
  if(!exp||!col)return;
  const isOpen=exp.style.display!=='none';
  exp.style.display=isOpen?'none':'block';
  col.style.display=isOpen?'flex':'none';
  if(arrow)arrow.style.transform=isOpen?'rotate(-90deg)':'';
}

// DASHBOARD
// ════════════════════════════════════════════════════════════
function renderDashboard(){
  const{inc,exp}=getMonthTotals();
  const bal=getTotalBalance();
  const savings=inc-exp;
  const savingsRate=inc>0?Math.round(savings/inc*100):0;
  const urgentPayments=S.scheduledPayments.filter(p=>daysUntil(p.nextDate)<=3&&daysUntil(p.nextDate)>=0);
  const overduePayments=S.scheduledPayments.filter(p=>daysUntil(p.nextDate)<0);
  const budgets=S.budgets.filter(b=>(b.currency||S.currency)===S.currency).slice(0,3);
  const recentTxs=[...S.transactions].filter(t=>t.currency===S.currency).sort((a,b)=>{const dd=new Date(b.date)-new Date(a.date);if(dd!==0)return dd;return b.id>a.id?1:-1;}).slice(0,5);

  const budgetHtml=budgets.length?budgets.map(b=>{
    const spent=getBudgetSpent(b);
    const pct=Math.min(100,b.amount>0?Math.round(spent/b.amount*100):0);
    const cat=getCat(b.categoryId);
    const color=pct>=90?'var(--danger)':pct>=70?'var(--warning)':'var(--primary)';
    return`<div class="budget-item"><div class="budget-header"><span class="budget-name">${cat?cat.icon+' '+cat.name:'Sin cat.'}</span><span class="budget-amounts">${fmt(spent)}/${fmt(b.amount)}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  }).join(''):'<div style="color:var(--text2);font-size:13px">Sin presupuestos</div>';

  const alertHtml=[
    ...overduePayments.map(p=>`<div class="alert-banner">🚨 <span><strong>${p.name}</strong> venció hace ${Math.abs(daysUntil(p.nextDate))} días — ${fmt(p.amount,p.currency)}</span></div>`),
    ...urgentPayments.map(p=>`<div class="${daysUntil(p.nextDate)===0?'alert-banner':'warn-banner'}">${daysUntil(p.nextDate)===0?'⚠️':'🔔'} <span><strong>${p.name}</strong> ${daysUntil(p.nextDate)===0?'vence HOY':'vence en '+daysUntil(p.nextDate)+' días'} — ${fmt(p.amount,p.currency)}</span></div>`)
  ].join('');

  const totalGoalSavings=S.goals.filter(g=>(g.currency||S.currency)===S.currency).reduce((s,g)=>s+(parseFloat(g.current)||0),0);
  return`
    ${alertHtml}
    <div id="exchange-widget" class="exchange-widget"></div>
    <div class="balance-card">
      <div class="balance-label">Balance total (${S.currency})</div>
      <div class="balance-amount">${fmt(bal)}</div>
      <div class="balance-row">
        <div class="balance-stat"><div class="balance-stat-label">↑ Ingresos mes</div><div class="balance-stat-val inc">${fmt(inc)}</div></div>
        <div class="balance-stat"><div class="balance-stat-label">↓ Gastos mes</div><div class="balance-stat-val exp">${fmt(exp)}</div></div>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi-card" style="cursor:pointer" onclick="openModal('balanceDistribution',{})">
        <div class="kpi-label">💎 Total disponible</div>
        <div class="kpi-val" style="font-size:13px;color:var(--primary)">${fmt(bal-totalGoalSavings>=0?bal-totalGoalSavings:0)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">👆 ver distribución</div>
      </div>
      <div class="kpi-card" style="cursor:pointer" onclick="navigate('metas')">
        <div class="kpi-label">🎯 Total ahorrado</div>
        <div class="kpi-val" style="font-size:13px;color:var(--success)">${fmt(totalGoalSavings)}</div>
        <div style="font-size:10px;color:${savingsRate<=0?'var(--text3)':savingsRate>=20?'var(--success)':savingsRate>=10?'var(--warning)':'var(--danger)'};margin-top:2px">${savingsRate<=0?'—':savingsRate+'% del ingreso'}</div>
      </div>
      <div class="kpi-card" style="cursor:pointer" onclick="navigate('deudas')">
        <div class="kpi-label">💸 Total deudas</div>
        <div class="kpi-val" style="font-size:13px;color:var(--danger)">${fmt(S.accounts.filter(a=>a.type==='pasivo'&&(a.currency||S.currency)===S.currency).reduce((s,a)=>s+Math.abs(getBalance(a.id)),0))}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">👆 ver deudas</div>
      </div>
      <div class="kpi-card" style="cursor:pointer" onclick="navigate('cuentas')">
        <div class="kpi-label">💳 Cuentas activas</div>
        <div class="kpi-val">${S.accounts.filter(a=>a.type==='activo'&&(a.currency||S.currency)===S.currency).length}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">👆 ver cuentas</div>
      </div>
    </div>
    <div style="margin-top:20px">${renderRule502030()}</div>
    <div class="section-header"><div class="section-title">📊 ${t('budgets')}</div><button class="btn-text" onclick="navigate('presupuestos')">Ver todos</button></div>
    <div class="card">${budgetHtml}</div>
    <div class="section-header"><div class="section-title">📋 ${t('recentMovements')}</div><button class="btn-text" onclick="navigate('movimientos')">Ver todos</button></div>
    ${recentTxs.length?recentTxs.map(txRow).join(''):'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sin movimientos</div><div class="empty-desc">Toca + para registrar</div></div>'}
  `;
}

// TX ROW
// ════════════════════════════════════════════════════════════
function txRow(t){
  const cat=getCat(t.categoryId);const sub=getSub(t.subcategoryId);const acc=getAcc(t.accountId);
  const icon=t.type==='transferencia'?'↔️':(cat?cat.icon:'📦');
  const color=t.type==='transferencia'?'var(--secondary)':(cat?cat.color:'#64748B');
  const sign=t.type==='ingreso'?'+':t.type==='gasto'?'−':'↔';
  const cls=t.type==='ingreso'?'inc':t.type==='gasto'?'exp':'tra';
  const name=t.type==='transferencia'?`${getAcc(t.accountId)?.name||'?'} → ${getAcc(t.toAccountId)?.name||'?'}`:(cat?cat.name:'Sin categoría');
  const subName=sub?sub.name:(acc?acc.name:'');
  return`<div class="tx-item" onclick="openModal('viewTx',{id:'${t.id}'})">
    <div class="tx-icon" style="background:${color}22">${icon}</div>
    <div class="tx-info"><div class="tx-name">${name}</div><div class="tx-sub">${subName?subName+' · ':''}${t.date}${t.paymentMethod?' · '+t.paymentMethod:''}</div></div>
    <div class="tx-amount ${cls}">${sign}${fmt(t.amount,t.currency)}</div>
  </div>`;
}

// MOVIMIENTOS
// ════════════════════════════════════════════════════════════
function renderMovimientos(){
  const f=S.movFilter;
  let txs=[...S.transactions].filter(t=>t.currency===S.currency).sort((a,b)=>{const dd=new Date(b.date)-new Date(a.date);if(dd!==0)return dd;return b.id>a.id?1:-1;});
  if(f.tab!=='todos')txs=txs.filter(t=>t.type===f.tab);
  if(f.search){const q=f.search.toLowerCase();txs=txs.filter(t=>{const cat=getCat(t.categoryId);const acc=getAcc(t.accountId);return(cat&&cat.name.toLowerCase().includes(q))||(acc&&acc.name.toLowerCase().includes(q))||(t.description&&t.description.toLowerCase().includes(q));});}
  if(f.dateFrom)txs=txs.filter(t=>t.date>=f.dateFrom);
  if(f.dateTo)txs=txs.filter(t=>t.date<=f.dateTo);
  if(f.catId)txs=txs.filter(t=>t.categoryId===f.catId);
  if(f.accountId)txs=txs.filter(t=>t.accountId===f.accountId||t.toAccountId===f.accountId);
  if(f.payMethod)txs=txs.filter(t=>t.paymentMethod===f.payMethod);
  const hasFilters=f.dateFrom||f.dateTo||f.catId||f.accountId||f.payMethod;
  const total=txs.reduce((s,t)=>{const v=parseFloat(t.amount)||0;return t.type==='ingreso'?s+v:t.type==='gasto'?s-v:s;},0);
  return`
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Buscar..." value="${f.search}" oninput="S.movFilter.search=this.value;renderPage('movimientos')">
      <button style="background:none;border:none;color:${hasFilters?'var(--primary)':'var(--text3)'};font-size:13px;cursor:pointer;font-weight:700" onclick="openModal('filterMovimientos',{})">⚙ Filtros${hasFilters?' •':''}</button>
    </div>
    ${f.dateFrom||f.dateTo?`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">📅 ${f.dateFrom||'inicio'} → ${f.dateTo||'hoy'} <button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px" onclick="S.movFilter.dateFrom='';S.movFilter.dateTo='';renderPage('movimientos')">✕</button></div>`:''}
    <div class="chip-row" style="margin-bottom:10px">
      ${['todos','ingreso','gasto','transferencia'].map(tab=>`<button class="chip ${f.tab===tab?'active':''}" onclick="S.movFilter.tab='${tab}';renderPage('movimientos')">${tab==='todos'?'Todos':tab==='ingreso'?'Ingresos':tab==='gasto'?'Gastos':'Transferencias'}</button>`).join('')}
    </div>
    ${txs.length>0?`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${txs.length} movimientos · Balance: <span style="color:${total>=0?'var(--success)':'var(--danger)'};font-weight:700">${fmt(total)}</span></div>`:''}
    ${txs.length?txs.map(txRow).join(''):'<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Sin resultados</div><div class="empty-desc">Ajusta los filtros</div></div>'}
  `;
}

function getSubInfo(subId){
  for(var i=0;i<ACC_GROUPS.length;i++){
    var found=ACC_GROUPS[i].subs.find(function(s){return s.id===subId;});
    if(found)return {sub:found,grp:ACC_GROUPS[i]};
  }
  return null;
}

function _accMatchesGrp(a,grpId,cur){
  if((a.currency||cur)!==cur)return false;
  if(a._grpId===grpId)return true;
  if(grpId==='banco'&&a.subtype==='banco')return true;
  if(grpId==='efectivo'&&a.subtype==='efectivo')return true;
  if(grpId==='virtual'&&a.subtype==='digital')return true;
  if(grpId==='inversion'&&a.subtype==='inversion')return true;
  if(grpId==='tc'&&a.subtype==='tc')return true;
  if(grpId==='prestamo'&&(a.subtype==='credito'||a.subtype==='prestamo'))return true;
  return false;
}

function accCardNew(a,cur){

  var grpColor2=grpColor+'BB';
  var isActivo=a.type==='activo';

  var days=a.paymentDate?(function(){var now=new Date();var d=new Date(now.getFullYear(),now.getMonth(),a.paymentDate);if(d<now)d.setMonth(d.getMonth()+1);return Math.round((d-now)/86400000);})():null;
  var urgentOutline=days!==null&&days<=3?'outline:2px solid '+(days===0?'var(--danger)':'var(--warning)'):'';

    +S.transactions.filter(function(t){return t.type==='transferencia'&&t.currency===(a.currency||cur);}).reduce(function(s,t){if(t.toAccountId===a.id)return s+(parseFloat(t.amount)||0);if(t.accountId===a.id)return s-(parseFloat(t.amount)||0);return s;},0);
  var isTcCard=a._grpId==='tc'&&a.tcLimit;

  var editSub=a._subId||'ahorro';

  var subListHtml='';
  if(subs.length){
    var sl='<div style="margin-bottom:10px"><div style="font-size:10px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Bolsillos \xb7 '+fmt(subTotal,a.currency||cur)+'</div>';
    subs.forEach(function(sb){
      sl+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer" onclick="openModal(\'subAccount\',{parentId:\''+a.id+'\',subId:\''+sb.id+'\'})">'
        +'<div style="width:24px;height:24px;border-radius:6px;background:'+(sb.color||'var(--primary)')+'44;display:flex;align-items:center;justify-content:center;font-size:12px">'+(sb.icon||'&#128055;')+'</div>'
        +'<div style="flex:1;font-size:12px;font-weight:600;color:white">'+sb.name+'</div>'
        +'<div style="font-size:12px;font-weight:700;color:'+(sb.color||'#6FFFDF')+'">'+fmt(sb.balance||0,a.currency||cur)+'</div>'
        +'</div>';
    });
    sl+='<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:4px">Cuenta: '+fmt(mainBal,a.currency||cur)+'</div></div>';
    subListHtml=sl;
  }
  var actionsHtml;
  if(isActivo){
    actionsHtml=subListHtml
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +'<button style="flex:1;min-width:80px;padding:9px 6px;border-radius:10px;border:none;background:rgba(59,130,246,.4);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)" onclick="viewAccountMovements(\''+a.id+'\')">&#128203; Movimientos</button>'
        +'<button style="flex:1;min-width:70px;padding:9px 6px;border-radius:10px;border:none;background:rgba(255,255,255,.2);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)" onclick="event.stopPropagation();openFormCuenta(\''+editGrp+'\',\''+editSub+'\',\''+a.id+'\')">&#9998;&#65039; Editar</button>'
        +(a.subtype!=='efectivo'&&!a.protected?'<button style="flex:1;min-width:80px;padding:9px 6px;border-radius:10px;border:none;background:rgba(0,212,170,.25);color:#6FFFDF;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)" onclick="openModal(\'subAccount\',{parentId:\''+a.id+'\'})">&#65291; Bolsillo</button>':'')
      +'</div>';
  } else {
    actionsHtml='<div style="display:flex;gap:6px">'
      +'<button style="flex:1;padding:9px;border-radius:10px;border:none;background:rgba(59,130,246,.4);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)" onclick="viewAccountMovements(\''+a.id+'\')">&#128203; Movimientos</button>'
      +'<button style="flex:1;padding:9px;border-radius:10px;border:none;background:rgba(255,255,255,.2);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)" onclick="event.stopPropagation();openFormCuenta(\''+editGrp+'\',\''+editSub+'\',\''+a.id+'\')">&#9998;&#65039; Editar cuenta</button>'
      +'</div>';
  }
  return '<div class="account-card" style="background:linear-gradient(135deg,'+grpColor+','+grpColor2+');'+urgentOutline+'" onclick="toggleAccCard(\''+cardId+'\',event)">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'
      +'<div style="display:flex;align-items:center;gap:12px">'
        +(a.bankEntity?bankBadge(a.bankEntity,a.currency||cur,44,a):'<div style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px">'+(info&&info.sub?info.sub.icon:'&#128179;')+'</div>')
        +'<div>'
          +'<div style="font-size:15px;font-weight:800;color:white;text-shadow:0 1px 3px rgba(0,0,0,.4)">'+a.name+'</div>'
          +'<div style="font-size:11px;color:rgba(255,255,255,.7)">'+(a.bankEntity?(function(){var b=getBank(a.bankEntity,a.currency||cur);return b?b.name:'Sin entidad';})():'Sin entidad')+' \xb7 '+(a.currency||cur)+'</div>'
          +(info?'<div style="font-size:10px;color:rgba(255,255,255,.5)">'+info.sub.label+'</div>':'')
        +'</div>'
      +'</div>'
      +'<div style="text-align:right">'
        +(days!==null&&days<=5?'<div style="font-size:11px;color:'+(days<=2?'#FF8080':'#FFD080')+';font-weight:700">&#9888; Pago '+(days===0?'HOY':days+'d')+'</div>':'')
        +'<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:4px">toca para opciones</div>'
      +'</div>'
    +'</div>'
    +'<div style="font-size:26px;font-weight:800;color:white;text-shadow:0 2px 8px rgba(0,0,0,.4);letter-spacing:-.5px">'+fmt(Math.abs(bal),a.currency||cur)+'</div>'
    +(isTcCard?'<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:4px"><span>Usado</span><span>'+Math.min(100,a.tcLimit>0?Math.round(bal/a.tcLimit*100):0)+'% de '+fmt(a.tcLimit,a.currency||cur)+'</span></div><div style="height:6px;background:rgba(255,255,255,.2);border-radius:99px"><div style="height:100%;border-radius:99px;background:'+(a.tcLimit>0&&bal/a.tcLimit>0.8?'#FF8080':'#6FFFDF')+';width:'+Math.min(100,a.tcLimit>0?Math.round(bal/a.tcLimit*100):0)+'%"></div></div></div>':'')
    +'<div id="'+cardId+'-actions" style="display:none;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)">'+actionsHtml+'</div>'
    +'</div>';
}
function openFormCuenta(grpId,subId,accId){
  S._fcData={grpId:grpId||'', subId:subId||'', id:accId||'', step:1, fields:{}};
  navigate('form-cuenta');
}
function fcNext(){
  if(!fcValidateStep())return;
  fcSaveStepFields();
  S._fcData.step=(S._fcData.step||1)+1;
  renderPage('form-cuenta');
  var ht=document.getElementById('header-title');
  if(ht)ht.textContent=S._fcData.id?'Editar cuenta':'Nueva cuenta';
}
function fcBack(){
  if((S._fcData.step||1)<=1){goBack();return;}
  S._fcData.step=(S._fcData.step||1)-1;
  renderPage('form-cuenta');
}
function fcValidateStep(){
  var step=S._fcData.step||1;
  var grpId=S._fcData.grpId||'';
  // Paso 1 siempre requiere nombre
  if(step===1){
    var nm=(document.getElementById('fc-name')||{}).value||'';
    if(!nm.trim()&&grpId!=='efectivo'){toast('Ingresa un nombre para la cuenta');return false;}
  }
  return true;
}
function fcSaveStepFields(){
  // Guardar todos los inputs del paso actual en S._fcData.fields
  var fields=S._fcData.fields||{};
  var ids=['fc-name','fc-currency','fc-bank','fc-balance','fc-tae','fc-tc-limit','fc-cut','fc-paydate',
           'fc-monthly','fc-credit-total','fc-broker','fc-value','fc-year','fc-color-val',
           'fc-digits','fc-ratio','fc-ratio-notif','fc-acreedor','fc-tel-acreedor','fc-email-acreedor'];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el)fields[id]=el.value||el.getAttribute('data-on')||'';
  });
  S._fcData.fields=fields;
}
function fcGetField(id,def){
  var f=S._fcData&&S._fcData.fields?S._fcData.fields[id]:'';
  return f!==undefined&&f!==''?f:(def||'');
}

function renderFormCuenta(){
  var data=S._fcData||{};
  var grpId=data.grpId||'';
  var subId=data.subId||'';
  var accId=data.id||'';
  var step=data.step||1;
  var acc=accId?S.accounts.find(function(a){return a.id===accId;}):null;
  var grp=ACC_GROUPS.find(function(g){return g.id===grpId;})||ACC_GROUPS[0];
  var sub=subId?grp.subs.find(function(s){return s.id===subId;}):null;
  var grpColor=grp.color||'#00D4AA';

  // Cuentas sin pasos (simples)
  var simple=['efectivo','virtual'];
  var isSimple=simple.indexOf(grpId)!==-1||grp.subs.length===1&&['efectivo','virtual'].indexOf(grpId)!==-1;

  // Definir pasos por tipo
  var stepDefs=fcGetSteps(grpId);
  var totalSteps=isSimple?1:stepDefs.length+1; // +1 = revisión

  // Si no hay subId y el grupo tiene múltiples, mostrar selector
  if(!subId&&grp.subs.length>1){
    var btns='';
    grp.subs.forEach(function(s){
      var oc='openFormCuenta(\''+grpId+'\',\''+s.id+'\')';
      btns+='<button onclick="'+oc+'" style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid '+grpColor+'44;border-radius:14px;cursor:pointer;font-family:var(--font);text-align:left;width:100%;margin-bottom:8px">'
        +'<div style="width:44px;height:44px;border-radius:11px;background:'+grpColor+'22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+s.icon+'</div>'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--text)">'+s.label+'</div></div>'
        +'<span style="color:var(--text3);font-size:20px">&#8250;</span>'
        +'</button>';
    });
    return '<div style="padding:4px 0 12px;text-align:center">'
        +'<div style="font-size:17px;font-weight:800;color:var(--text)">'+fcGroupTitle(grpId)+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column">'+btns+'</div>';
  }

  if(!sub&&grp.subs.length===1)sub=grp.subs[0];
  if(!subId&&sub)subId=sub.id;

  var html='<div style="padding-bottom:32px">';

  // ── Progreso (si multipantalla) ────────────────────────
  if(!isSimple&&totalSteps>1){
    var isReview=step>stepDefs.length;
    var displayStep=isReview?totalSteps:step;
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:20px">';
    for(var i=1;i<=totalSteps;i++){
      var active=i===displayStep;
      var done=i<displayStep;
      html+='<div style="flex:'+(active?'2':'1')+';height:4px;border-radius:2px;background:'+(done?'var(--primary)':active?'var(--primary)':'var(--border)')+';transition:.3s"></div>';
    }
    html+='</div>';
    var stepLabel=isReview?'Revisar y confirmar':(stepDefs[step-1]?stepDefs[step-1].label:'');
    html+='<div style="font-size:12px;color:var(--text3);margin-bottom:6px">Paso '+displayStep+' de '+totalSteps+'</div>';
    html+='<div style="font-size:17px;font-weight:800;color:var(--text);margin-bottom:16px">'+stepLabel+'</div>';
  } else {
    // Banner simple
    html+='<div style="display:flex;align-items:center;gap:12px;background:'+grpColor+'14;border:1px solid '+grpColor+'40;border-radius:14px;padding:14px 16px;margin-bottom:20px">'
      +'<div style="width:48px;height:48px;border-radius:13px;background:'+grpColor+'22;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">'+(sub?sub.icon:grp.icon)+'</div>'
      +'<div><div style="font-size:15px;font-weight:800;color:var(--text)">'+(sub?sub.label:grp.label)+'</div>'
      +'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+grp.label+' \xb7 '+(grp.type==='activo'?'Activo':'Pasivo')+'</div></div>'
      +'</div>';
  }

  html+='<input type="hidden" id="fc-id" value="'+(acc?acc.id||'':'')+'">'
    +'<input type="hidden" id="fc-grpid" value="'+grpId+'">'
    +'<input type="hidden" id="fc-subid" value="'+subId+'">';

  // ── Contenido del paso ─────────────────────────────────
  var isReview=(!isSimple)&&step>stepDefs.length;
  if(isReview){
    html+=fcBuildReview(grpId,subId,acc);
  } else {
    var stepIdx=isSimple?-1:(step-1);
    html+=fcBuildStepContent(grpId,subId,acc,stepIdx,isSimple);
  }

  // ── Botones de navegación ──────────────────────────────
  if(isSimple){
    html+='<div class="btn-row">'
      +(acc&&!acc.protected?'<button class="btn btn-danger" onclick="deleteAccountFC()">Eliminar</button>':'')
      +'<button class="btn btn-primary" onclick="saveAccountFC()">Guardar cuenta</button>'
      +'</div>';
  } else if(isReview){
    html+='<div class="btn-row">'
      +(acc&&!acc.protected?'<button class="btn btn-danger" onclick="deleteAccountFC()">Eliminar</button>':'')
      +'<button class="btn btn-primary" onclick="saveAccountFC()">&#10003; Confirmar y crear</button>'
      +'</div>';
    html+='<button onclick="fcBack()" style="width:100%;margin-top:8px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-family:var(--font)">&#8592; Volver a editar</button>';
  } else {
    var isLast=step===stepDefs.length;
    html+='<button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="fcNext()">'
      +(isLast?'Ver resumen':'Siguiente &#8250;')
      +'</button>';
    if(step>1){
      html+='<button onclick="fcBack()" style="width:100%;margin-top:8px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-family:var(--font)">&#8592; Atr\u00e1s</button>';
    }
  }

  html+='</div>';
  return html;
}

function fcGroupTitle(grpId){
  var t={tc:'Elige la franquicia de tu TC',prestamo:'Elige el cr\u00e9dito a registrar',informal:'Elige la deuda a registrar'};
  return t[grpId]||'Elige la cuenta a registrar';
}

function fcGetSteps(grpId){
  var steps={
    banco:[
      {label:'Informaci\u00f3n b\u00e1sica'},
      {label:'Detalles financieros'}
    ],
    inversion:[
      {label:'Informaci\u00f3n b\u00e1sica'},
      {label:'Detalles de inversi\u00f3n'}
    ],
    bien:[
      {label:'Informaci\u00f3n b\u00e1sica'},
      {label:'Valor del bien'}
    ],
    tc:[
      {label:'Informaci\u00f3n b\u00e1sica'},
      {label:'L\u00edmites y costos'},
      {label:'Fechas y alertas'}
    ],
    prestamo:[
      {label:'Informaci\u00f3n b\u00e1sica'},
      {label:'Detalles del cr\u00e9dito'},
      {label:'Condiciones de pago'}
    ],
    informal:[
      {label:'Datos del acreedor'},
      {label:'Detalles de la deuda'}
    ]
  };
  return steps[grpId]||[];
}

function fcBuildStepContent(grpId,subId,acc,stepIdx,isSimple){
  var f=fcGetField;
  var defCur=f('fc-currency',acc?acc.currency:S.currency);
  var defBank=f('fc-bank',acc?acc.bankEntity||'':'');
  var curHtml='<div class="form-group"><label class="form-label">Moneda</label>'
    +'<input type="hidden" id="fc-currency" value="'+defCur+'">'
    +'<div class="bs-trigger" onclick="showBS_fcCurrency()">'
      +'<div id="fc-currency-lbl" style="display:flex;align-items:center;gap:4px">'+buildCurTriggerLabel(defCur)+'</div>'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>'
    +'</div></div>';
  var banksList=defCur==='COP'?BANKS_COP:BANKS_PLN;
  var defBankName=defBank?(function(){var b=banksList.find(function(x){return x.id===defBank;});return b?b.abbr+' \xb7 '+b.name:defBank;})():'';
  var bankHtml='<div class="form-group"><label class="form-label">Entidad financiera <span style="color:var(--text3);font-weight:400">(opcional)</span></label>'
    +'<input type="hidden" id="fc-bank" value="'+defBank+'">'
    +'<div class="bs-trigger" onclick="showBS_fcBank()">'
      +'<span id="fc-bank-lbl" style="color:'+(defBank?'var(--text)':'var(--text3)')+';font-size:14px">'+(defBankName||'Sin entidad')+'</span>'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>'
    +'</div></div>';
  var balLabel=(function(){var m={tc:'Saldo actual (deuda)',prestamo:'Saldo actual (deuda)',informal:'Saldo actual (deuda)'};return m[grpId]||'Balance inicial';})();
  var defBal=f('fc-balance',acc&&acc.initialBalance?acc.initialBalance:'');
  var balHtml='<div class="form-group"><label class="form-label">'+balLabel+'</label>'
    +'<input class="form-input" type="text" inputmode="numeric" id="fc-balance" placeholder="0,00" oninput="numInputFC(this)" style="text-align:right" value="'+defBal+'">'
    +'</div>';
  var dayOpts='<option value="">Seleccionar</option>';
  for(var i=1;i<=31;i++)dayOpts+='<option value="'+i+'"'+(f('fc-paydate',acc?acc.paymentDate||'':'')==String(i)?' selected':'')+'>'+i+'</option>';
  var cutOpts='<option value="">Seleccionar</option>';
  for(var j=1;j<=31;j++)cutOpts+='<option value="'+j+'"'+(f('fc-cut',acc?acc.cutDate||'':'')==String(j)?' selected':'')+'>'+j+'</option>';

  // ── EFECTIVO / VIRTUAL (simple, 1 pantalla) ─────────
  if(isSimple){
    var nm=f('fc-name',acc?acc.name:(grpId==='efectivo'?'Efectivo':''));
    return '<div class="form-group"><label class="form-label">Nombre de la cuenta</label>'
      +'<input class="form-input" type="text" id="fc-name" '
      +(grpId==='efectivo'?'readonly style="opacity:.7;cursor:default" ':'')
      +'placeholder="Ej: '+(grpId==='efectivo'?'Efectivo':'Mi cuenta PayPal')+'" value="'+nm+'">'
      +'</div>'
      +curHtml+balHtml
      +buildAccToggleHTML(acc);
  }

  // ── BANCO ────────────────────────────────────────────
  if(grpId==='banco'){
    if(stepIdx===0){
      var nm=f('fc-name',acc?acc.name:'');
      var digits=f('fc-digits',acc?acc.lastDigits||'':'');
      return '<div class="form-group"><label class="form-label">Nombre de la cuenta</label>'
        +'<input class="form-input" type="text" id="fc-name" placeholder="Ej: Bancolombia Ahorros" value="'+nm+'"></div>'
        +curHtml+bankHtml
        +'<div class="form-group"><label class="form-label">\u00daltimos 4 d\u00edgitos <span style="color:var(--text3);font-weight:400">(opcional)</span></label>'
        +'<div style="font-size:11px;color:var(--text3);margin-bottom:6px">\ud83d\udd12 Por seguridad ingresa solo los \u00faltimos 4 d\u00edgitos de tu cuenta</div>'
        +'<input class="form-input" type="text" id="fc-digits" placeholder="ej: 4521" maxlength="4" value="'+digits+'"></div>';

        +buildAccToggleHTML(acc);

  // ── INVERSIÓN ────────────────────────────────────────
  if(grpId==='inversion'){
    if(stepIdx===0){

        +'<div class="form-group"><label class="form-label">Plataforma / Broker <span style="color:var(--text3);font-weight:400">(opcional)</span></label>'
        +'<input class="form-input" type="text" id="fc-broker" placeholder="Ej: Degiro, Fidelity" value="'+broker+'"></div>';

    if(stepIdx===1){
      var tae=f('fc-tae',acc?acc.tae||'':'');

function fcBuildReview(grpId,subId,acc){
  var f=fcGetField;
  var cur=f('fc-currency',S.currency);
  var meta=getCurrencyMeta(cur);
  var sym=meta?meta.sym:cur;
  function row(label,val){
    if(!val&&val!==0)return '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">'
      +'<span style="font-size:13px;color:var(--text2)">'+label+'</span>'
      +'<span style="font-size:14px;font-weight:600;color:var(--text)">'+val+'</span>'
      +'</div>';
  }
  var grp=ACC_GROUPS.find(function(g){return g.id===grpId;})||ACC_GROUPS[0];
  var sub=subId?grp.subs.find(function(s){return s.id===subId;}):null;
  var info=getSubInfo(subId);
  var grpColor=grp.color||'#00D4AA';
  var html='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
      +'<div style="width:44px;height:44px;border-radius:12px;background:'+grpColor+'22;display:flex;align-items:center;justify-content:center;font-size:22px">'+(sub?sub.icon:grp.icon)+'</div>'
      +'<div><div style="font-size:15px;font-weight:800;color:var(--text)">'+(f('fc-acreedor','')||f('fc-name','Sin nombre'))+'</div>'
      +'<div style="font-size:12px;color:var(--text3)">'+(sub?sub.label:grp.label)+' \xb7 '+(grp.type==='activo'?'Activo':'Pasivo')+'</div></div>'
    +'</div>';
  html+=row('Moneda',cur+' '+sym);
  var bal=f('fc-balance','');
  if(bal)html+=row('Saldo / Deuda',bal+' '+sym);
  var bank=f('fc-bank','');
  if(bank){var blist=cur==='COP'?BANKS_COP:BANKS_PLN;var b=blist.find(function(x){return x.id===bank;});if(b)html+=row('Entidad',b.name);}
  var digits=f('fc-digits','');if(digits)html+=row('Últimos 4 dígitos','****'+digits);
  var tae=f('fc-tae','');if(tae)html+=row('Tasa de interés',tae+'%');
  var lim=f('fc-tc-limit','');if(lim)html+=row('Límite de cupo',lim+' '+sym);
  var total=f('fc-credit-total','');if(total)html+=row('Monto original',total+' '+sym);
  var monthly=f('fc-monthly','');if(monthly)html+=row('Cuota mensual',monthly+' '+sym);
  var cut=f('fc-cut','');if(cut)html+=row('Día de corte','Día '+cut);
  var pay=f('fc-paydate','');if(pay)html+=row('Día de pago','Día '+pay);
  var ratio=f('fc-ratio','');if(ratio)html+=row('Ratio de utilización',ratio+'%');
  var acreedor=f('fc-acreedor','');if(acreedor)html+=row('Acreedor',acreedor);
  var tel=f('fc-tel-acreedor','');if(tel)html+=row('Teléfono acreedor',tel);
  var broker=f('fc-broker','');if(broker)html+=row('Plataforma/Broker',broker);
  var yr=f('fc-year','');if(yr)html+=row('Año adquisición',yr);
  html+='</div>';
  return html;
}

function toggleFcRatioNotif(el){
  var isOn=el.getAttribute('data-on')==='1';
  var newOn=!isOn;
  el.setAttribute('data-on',newOn?'1':'0');
  el.style.background=newOn?'var(--primary)':'var(--border)';
  var knob=el.querySelector('div');
  if(knob){knob.style.right=newOn?'2px':'';knob.style.left=newOn?'':'2px';}
}

function pickFotoAcreedor(){
  var wrap=document.getElementById('fc-acreedor-photo-wrap');
  var input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var src=ev.target.result;
      var hidden=document.getElementById('fc-foto-acreedor');
      if(hidden)hidden.value=src;
      var img=document.getElementById('fc-acreedor-img');
      if(img){img.src=src;img.style.width='100%';img.style.height='100%';img.style.objectFit='cover';img.style.borderRadius='50%';}
      // Sync nombre
      var acNm=document.getElementById('fc-acreedor');
      var nm=document.getElementById('fc-name');
      if(acNm&&nm)nm.value=acNm.value;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function saveAccountFC(){
  // Guardar campos actuales antes de procesar
  fcSaveStepFields();
  var f=fcGetField;
  var grpId=(document.getElementById('fc-grpid')||{}).value||'';
  var subId=(document.getElementById('fc-subid')||{}).value||'';
  var accId=(document.getElementById('fc-id')||{}).value||'';
  var existing=accId?S.accounts.find(function(a){return a.id===accId;}):null;
  var grp=ACC_GROUPS.find(function(g){return g.id===grpId;});
  if(!grp){toast('Tipo de cuenta no válido');return;}
  var actualSubId=subId||grp.subs[0].id;
  var info=getSubInfo(actualSubId);
  var legacySubtype=grpId==='tc'?'tc':grpId==='prestamo'||grpId==='informal'?'prestamo':grpId==='banco'?'banco':grpId==='efectivo'?'efectivo':grpId==='virtual'?'digital':grpId==='inversion'?'inversion':'activo';
  // Nombre: para informal usar fc-acreedor
  var nameRaw=grpId==='informal'?f('fc-acreedor',''):f('fc-name','');
  if(!nameRaw.trim()){toast('Ingresa el nombre de la cuenta');return;}
  var cur=f('fc-currency',S.currency);
  var toggleOn=f('fc-ratio-notif','1');
  var accInclude=f('acc-include','1');
  var acc={
    id:existing?existing.id:uid(),
    name:nameRaw.trim(),
    type:grp.type,
    subtype:legacySubtype,
    _grpId:grpId,
    _subId:actualSubId,
    currency:cur,
    bankEntity:f('fc-bank',''),
    initialBalance:parseNumSubs(f('fc-balance','0'),cur),
    icon:(info&&info.sub?info.sub.icon:'💳'),
    color:COLORS_PALETTE[grpId==='tc'?0:grpId==='prestamo'||grpId==='informal'?1:grpId==='banco'?5:grpId==='inversion'?7:grpId==='bien'?14:16],
    subAccounts:existing?existing.subAccounts||[]:[],
    excludeFromTotal:accInclude==='0',
    lastDigits:f('fc-digits',''),
    tae:parseFloat(f('fc-tae',''))||0
  };
  if(grpId==='tc'){
    acc.tcLimit=parseNumSubs(f('fc-tc-limit','0'),cur);
    acc.cutDate=parseInt(f('fc-cut',''))||0;
    acc.paymentDate=parseInt(f('fc-paydate',''))||0;
    acc.utilizationRatio=parseInt(f('fc-ratio','30'))||30;
    acc.utilizationNotif=f('fc-ratio-notif','1')==='1';
  } else if(grpId==='prestamo'){
    acc.creditTotal=parseNumSubs(f('fc-credit-total','0'),cur);
    acc.monthlyPayment=parseNumSubs(f('fc-monthly','0'),cur);
    acc.paymentDate=parseInt(f('fc-paydate',''))||0;
  } else if(grpId==='informal'){
    acc.creditTotal=parseNumSubs(f('fc-credit-total','0'),cur);
    acc.acreedor=f('fc-acreedor','');
    acc.telAcreedor=f('fc-tel-acreedor','');
    acc.emailAcreedor=f('fc-email-acreedor','');
    acc.fotoAcreedor=f('fc-foto-acreedor','');
    acc.deadline=f('fc-deadline','');
  } else if(grpId==='inversion'){
    acc.broker=f('fc-broker','');
  } else if(grpId==='bien'){
    acc.assetValue=parseNumSubs(f('fc-value','0'),cur);
    acc.acquireYear=parseInt(f('fc-year',''))||0;
  }
  if(existing){
    var idx=S.accounts.findIndex(function(a){return a.id===accId;});
    S.accounts[idx]=acc;
    toast('Cuenta actualizada ✓');
  } else {
    S.accounts.push(acc);
    toast('Cuenta creada ✓');
  }
  saveState();
  S._fcData={};
  S._cuentasGrupo=grpId;
  navigate('mis-cuentas');
}

function deleteAccountFC(){
  var accId=(document.getElementById('fc-id')||{}).value||'';
  var acc=accId?S.accounts.find(function(a){return a.id===accId;}):null;
  if(!acc){toast('Cuenta no encontrada');return;}
  if(acc.protected||acc.subtype==='efectivo'){toast('Esta cuenta no puede eliminarse');return;}
  var grpId=acc._grpId||'banco';
  confirmDialog('&#128465;&#65039;','Eliminar cuenta','Los movimientos asociados quedaran sin cuenta.',function(){
    S.accounts=S.accounts.filter(function(a){return a.id!==accId;});
    saveState();
    S._fcData={};
    S._cuentasGrupo=grpId;
    navigate('mis-cuentas');
    toast('Cuenta eliminada');
  });
}

function renderSuscripciones(){
  if(!S.subscriptions)S.subscriptions=[];
  var subs=S.subscriptions;
  var cur=S.currency;

  // Calcular total mensual
  var totalMes=subs.filter(function(s){return s.estado!=='pausada';}).reduce(function(acc,s){
    if(!s.monto)return acc;
    var m=parseFloat(s.monto)||0;
    if(s.ciclo==='anual')m=m/12;
    else if(s.ciclo==='semestral')m=m/6;
    else if(s.ciclo==='trimestral')m=m/3;
    else if(s.ciclo==='bimensual')m=m/2;
    else if(s.ciclo==='quincenal')m=m*2;
    else if(s.ciclo==='semanal')m=m*4.33;
    else if(s.ciclo==='diario')m=m*30;
    return acc+m;
  },0);

  // Próximas a vencer (dentro de 7 días)
  var hoy=new Date();
  var proximas=subs.filter(function(s){
    if(!s.diaCobro||s.estado==='pausada')return false;
    var d=new Date(hoy.getFullYear(),hoy.getMonth(),parseInt(s.diaCobro));
    if(d<hoy)d.setMonth(d.getMonth()+1);
    return Math.round((d-hoy)/86400000)<=7;
  }).length;

  var html='';

  // Resumen header
  html+='<div style="background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(116,97,239,.08));border:1px solid rgba(0,212,170,.2);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">'
    +'<div>'
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:2px">Total mensual activo</div>'
      +'<div style="font-size:24px;font-weight:800;color:var(--primary)">'+fmt(totalMes,cur)+'</div>'
    +'</div>'
    +(proximas>0?'<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:8px 14px;text-align:center">'
      +'<div style="font-size:20px">🔔</div>'
      +'<div style="font-size:11px;font-weight:700;color:var(--danger)">'+proximas+' vence'+(proximas>1?'n':'')+' esta semana</div>'
    +'</div>':'')
    +'</div>';

  html+='<div style="display:flex;justify-content:flex-end;margin-bottom:16px">'
    +'<button class="btn btn-primary btn-sm" onclick="openSubsModal({})">+ Nueva suscripción</button>'
    +'</div>';

  if(!subs.length){
    html+='<div class="empty-state"><div class="empty-icon">🔁</div>'
      +'<div class="empty-title">Sin suscripciones</div>'
      +'<div class="empty-desc">Registra tus servicios recurrentes</div></div>';
    return html;
  }

  // Agrupar por categoría
  var groups={};
  subs.forEach(function(s){
    var cat=s.categoria||'otro';
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(s);
  });

  Object.keys(groups).forEach(function(catId){
    var catInfo=SUBS_CATS.find(function(c){return c.id===catId;})||{label:catId,icon:'📦'};
    var catSubs=groups[catId];
    var catTotal=catSubs.filter(function(s){return s.estado!=='pausada';}).reduce(function(acc,s){
      var m=parseFloat(s.monto)||0;
      if(s.ciclo==='anual')m=m/12;
      if(s.ciclo==='semanal')m=m*4.33;
      return acc+(s.estado==='pausada'?0:m);
    },0);

    html+='<div style="margin-bottom:20px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +'<span style="font-size:16px">'+catInfo.icon+'</span>'
        +'<span style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'+catInfo.label+'</span>'
        +'<span style="margin-left:auto;font-size:12px;color:var(--text3)">'+fmt(catTotal,cur)+'/mes</span>'
      +'</div>';

    catSubs.forEach(function(s){
      var hoy=new Date();
      var dias=null;
      if(s.diaCobro){
        var d=new Date(hoy.getFullYear(),hoy.getMonth(),parseInt(s.diaCobro));
        if(d<hoy)d.setMonth(d.getMonth()+1);
        dias=Math.round((d-hoy)/86400000);
      }
      var pausada=s.estado==='pausada';
      var montoMes=parseFloat(s.monto)||0;
      if(s.ciclo==='anual')montoMes=montoMes/12;
      else if(s.ciclo==='semestral')montoMes=montoMes/6;
      else if(s.ciclo==='trimestral')montoMes=montoMes/3;
      else if(s.ciclo==='bimensual')montoMes=montoMes/2;
      else if(s.ciclo==='quincenal')montoMes=montoMes*2;
      else if(s.ciclo==='semanal')montoMes=montoMes*4.33;
      else if(s.ciclo==='diario')montoMes=montoMes*30;
      var urgente=!pausada&&dias!==null&&dias<=3;

      html+='<div onclick="openSubsModal({id:\''+s.id+'\'})" style="'
        +'background:var(--surface);border:1px solid '+(urgente?'var(--danger)':'var(--border)')+';'
        +'border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;'
        +'opacity:'+(pausada?'0.6':'1')+'">'
        +'<div style="display:flex;align-items:center;gap:12px">'
          +'<div style="width:44px;height:44px;border-radius:12px;background:rgba(0,212,170,.12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+catInfo.icon+'</div>'
          +'<div style="flex:1;min-width:0">'
            +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'
              +'<span style="font-size:14px;font-weight:700;color:var(--text)">'+s.nombre+'</span>'
              +(pausada?'<span style="font-size:10px;background:rgba(100,116,139,.2);color:var(--text3);border-radius:99px;padding:2px 8px">Pausada</span>':'')
            +'</div>'
            +'<div style="font-size:11px;color:var(--text3)">'
              +((function(){var lmap={diario:'Diario',semanal:'Semanal',quincenal:'Quincenal',mensual:'Mensual',bimensual:'Bimensual',trimestral:'Trimestral',semestral:'Semestral',anual:'Anual'};return (lmap[s.ciclo]||s.ciclo)+' · '+fmt(s.monto,s.moneda||cur)+(s.ciclo!=='mensual'?' · ~'+fmt(montoMes,s.moneda||cur)+'/mes':'');})())
              +(s.diaCobro?' · Día '+s.diaCobro:'')
            +'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0">'
            +'<div style="font-size:16px;font-weight:800;color:var(--primary)">'+fmt(s.ciclo==='anual'?montoMes:(parseFloat(s.monto)||0),s.moneda||cur)+'</div>'
            +'<div style="font-size:10px;color:var(--text3)">'+(s.ciclo==='anual'?'/mes est.':'/'+((s.ciclo||'mes').replace('ual','').replace('ana','em')))+'</div>'
            +(dias!==null&&!pausada?'<div style="font-size:10px;font-weight:700;color:'+(dias<=3?'var(--danger)':'var(--text3)')+'">'+( dias===0?'🔴 HOY':'⏱ '+dias+'d')+'</div>':'')
          +'</div>'
        +'</div>'
        +'</div>';
    });
    html+='</div>';
  });

  return html;
}

function renderBudgetGroups(budgets){
  var groups={};
  budgets.forEach(function(b){
    var catId=b.categoryId||'none';
    if(!groups[catId])groups[catId]=[];
    groups[catId].push(b);
  });
  return Object.keys(groups).map(function(catId){
    var grpBudgets=groups[catId];
    var cat=getCat(catId);
    var totalAmt=grpBudgets.reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0);
    var totalSpent=grpBudgets.reduce(function(s,b){return s+getBudgetSpent(b);},0);
    var totalPct=Math.min(100,totalAmt>0?Math.round(totalSpent/totalAmt*100):0);
    var color=totalPct>=90?'var(--danger)':totalPct>=70?'var(--warning)':'var(--primary)';
    var bColor=grpBudgets[0].color||'var(--primary)';
    var hasMultiple=grpBudgets.length>1||(grpBudgets.length===1&&grpBudgets[0].subcategoryId);
    var gId='bgrp-'+catId;
    var q="'";
    var onclickMain=hasMultiple
      ?'document.getElementById('+q+gId+q+').classList.toggle('+q+'hidden'+q+');this.querySelector('+q+'.bgrp-arrow'+q+').textContent=document.getElementById('+q+gId+q+').classList.contains('+q+'hidden'+q+')?'+q+'▶'+q+':'+q+'▼'+q
      :'openModal('+q+'budget'+q+',{id:'+q+grpBudgets[0].id+q+'})';
    var h='<div class="card" style="border-left:4px solid '+bColor+';margin-bottom:12px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer" onclick="'+onclickMain+'">'
      +'<div style="width:40px;height:40px;border-radius:10px;background:'+bColor+'22;display:flex;align-items:center;justify-content:center;font-size:20px">'+(cat?cat.icon:'📦')+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-size:14px;font-weight:700">'+(cat?cat.name:'Sin categoría')+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">'+grpBudgets.length+' presupuesto'+(grpBudgets.length>1?'s':'')+' · '+(grpBudgets[0].currency||S.currency)+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span class="badge" style="background:'+color+'22;color:'+color+'">'+totalPct+'%</span>'
      +(hasMultiple?'<span class="bgrp-arrow" style="color:var(--text3);font-size:12px">▶</span>':'')
      +'</div></div>'
      +'<div class="progress-bar" style="height:8px;margin-bottom:8px"><div class="progress-fill" style="width:'+totalPct+'%;background:'+color+'"></div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;text-align:center;margin-bottom:'+(hasMultiple?'8':'0')+'px">'
